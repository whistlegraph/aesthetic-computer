<?xml version="1.0" encoding="UTF-8"?>
<!-- Notepat tray icon: mini piano (3 white keys + 2 black keys between).
     Template image conventions: only black + alpha; macOS auto-inverts for dark menu bar. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Outer piano body -->
  <rect x="1" y="3" width="14" height="10" fill="none" stroke="black" stroke-width="1"/>
  <!-- White-key separators (vertical strokes inside the body) -->
  <line x1="5.67" y1="3" x2="5.67" y2="13" stroke="black" stroke-width="1"/>
  <line x1="10.33" y1="3" x2="10.33" y2="13" stroke="black" stroke-width="1"/>
  <!-- Black keys (solid filled rects) -->
  <rect x="3.67" y="3" width="2.5" height="5" fill="black"/>
  <rect x="9.33" y="3" width="2.5" height="5" fill="black"/>
</svg>

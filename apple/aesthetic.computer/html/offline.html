<!DOCTYPE html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <style>
      @font-face {
        font-family: 'ProggyClean';
        src: url('ProggyClean.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }

      html {
        background-color: rgb(32, 32, 32);
        margin: 0;
        padding: 8px;
        height: calc(100% - 16px);
      }

      body {
        font-family: ProggyClean, monospace;
        background-color: rgb(60, 55, 70);
        overflow: hidden;
        -webkit-text-size-adjust: none;
        -webkit-user-select: none;
        user-select: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4vw;
        width: 100%;
        height: 100%;
        margin: 0;
      }

      .word {
        color: yellow;
        background-color: red;
        padding: 2vw 2vw 1vw 2vw;
        font-size: 0;
      }
      .word span {
        font-size: 15vw;
      }

      button {
        font-family: ProggyClean, monospace;
        font-size: 6vw;
        color: black;
        background-color: yellow;
        border: 0;
        padding: 2vw 5vw 1.4vw 5vw;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      button:active {
        background-color: white;
      }

      .hint {
        color: rgba(255, 255, 255, 0.55);
        font-size: 4vw;
        text-align: center;
        max-width: 80%;
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <div class="word">
      <span>O</span>
      <span>F</span>
      <span>F</span>
      <span>L</span>
      <span>I</span>
      <span>N</span>
      <span>E</span>
    </div>
    <button id="retry" type="button">Tap to retry</button>
    <div class="hint">
      The app will reconnect automatically when the network comes back.
    </div>
    <script>
      // Tell the native host to attempt the live URL even if its path
      // monitor still reads offline (the monitor can lag a few seconds
      // behind a real reconnect, especially on cell handoffs).
      const btn = document.getElementById("retry");
      btn.addEventListener("click", () => {
        btn.disabled = true;
        btn.textContent = "Retrying…";
        try {
          window.webkit?.messageHandlers?.iOSApp?.postMessage(
            JSON.stringify({ type: "reload-online" })
          );
        } catch (err) {
          // No native bridge (running outside the app) — just reload.
          window.location.reload();
        }
        // Re-enable after a moment so a second tap is possible if the
        // first retry didn't actually swap the view.
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = "Tap to retry";
        }, 4000);
      });
    </script>
  </body>
</html>

<html lang="en">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thomas Lawson — Artwork Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff9ef;
    --fg: #222222;
    --muted: #6f6f6f;
    --border: #e8e2d6;
    --accent: #0170B9;
    --card-bg: #ffffff;
    --font: "Poppins", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--fg);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  header a {
    display: block;
    line-height: 0;
  }
  header .logo {
    height: 40px;
    width: auto;
  }
  header .page-title {
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  header .sub {
    color: var(--muted);
    font-size: 0.78rem;
    margin-left: auto;
    font-weight: 300;
  }

  /* Filters */
  .filters {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1rem 2rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .filters label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .filters select, .filters input {
    font-family: var(--font);
    font-size: 0.8rem;
    font-weight: 300;
    padding: 0.4rem 0.7rem;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--card-bg);
    color: var(--fg);
    outline: none;
  }
  .filters select:focus, .filters input:focus {
    border-color: var(--accent);
  }
  .filters input[type="search"] {
    width: 220px;
  }
  .count {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* Tabs */
  .tabs {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .tabs button {
    font-family: var(--font);
    font-size: 0.78rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0.8rem 1.4rem;
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tabs button.active {
    color: var(--fg);
    border-bottom-color: var(--accent);
    font-weight: 500;
  }
  .tabs button:hover { color: var(--fg); }

  /* Grid */
  .grid {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.8rem;
  }

  /* Card */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
    cursor: pointer;
  }
  .card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    transform: translateY(-2px);
  }
  .card .img-wrap {
    width: 100%;
    aspect-ratio: 1;
    overflow: hidden;
    background: #f5f0e6;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.75rem;
  }
  .card .img-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .card .info {
    padding: 0.8rem 1rem 1rem;
    border-top: 1px solid var(--border);
  }
  .card .info h3 {
    font-size: 0.82rem;
    font-weight: 500;
    line-height: 1.35;
    margin-bottom: 0.2rem;
    color: var(--fg);
  }
  .card .info .year {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 300;
  }
  .card .info .medium {
    font-size: 0.73rem;
    color: var(--muted);
    margin-top: 0.2rem;
    font-style: italic;
    font-weight: 300;
  }
  .card .info .dims {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.1rem;
    font-weight: 300;
  }
  .card .info .tags {
    margin-top: 0.4rem;
    display: flex;
    gap: 0.3rem;
    flex-wrap: wrap;
  }
  .card .info .tag {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.15rem 0.45rem;
    background: #f5f0e6;
    border-radius: 2px;
    color: var(--muted);
    font-weight: 400;
  }

  /* Writings list */
  .writings-list {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
  }
  .writing-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 1rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    align-items: baseline;
  }
  .writing-row .w-title {
    font-size: 0.85rem;
    font-weight: 400;
  }
  .writing-row .w-pub {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    font-weight: 300;
  }
  .writing-row .w-year {
    font-size: 0.8rem;
    color: var(--muted);
    min-width: 3rem;
    text-align: right;
    font-weight: 300;
  }

  /* Exhibitions */
  .exhibitions-grid {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
  }
  .exhibition-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1.2rem;
  }
  .exhibition-card h3 {
    font-size: 0.88rem;
    font-weight: 500;
    margin-bottom: 0.3rem;
  }
  .exhibition-card .e-year {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 300;
  }
  .exhibition-card .e-images {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.6rem;
    overflow-x: auto;
  }
  .exhibition-card .e-images img {
    height: 60px;
    border-radius: 2px;
    object-fit: cover;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
  }
  .lightbox .lb-info {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    color: #ccc;
    text-align: center;
    font-size: 0.85rem;
    max-width: 600px;
  }
  .lightbox .lb-info h3 {
    color: #fff;
    font-size: 1rem;
    margin-bottom: 0.3rem;
  }

  @media (max-width: 640px) {
    header { padding: 1.2rem 1rem; }
    .filters { padding: 0.8rem 1rem; }
    .tabs { padding: 0 1rem; }
    .grid { padding: 1rem; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
    .writings-list { padding: 1rem; }
    .writing-row { grid-template-columns: 1fr auto; }
    .writing-row .w-pub { display: none; }
  }
</style>
</head>

// --- State ---
let currentTab = "artworks";
let filters = { period: "", section: "", series: "", search: "" };
let wFilters = { category: "", search: "" };

// --- Init ---
function init() {
  const c = CATALOG;
  document.getElementById("stats").textContent =
    c.artworks.length + " artworks · " +
    c.writings.length + " writings · " +
    c.exhibitions.length + " exhibitions · " +
    "b. " + c.artist.born + ", " + c.artist.birthplace;

  // Populate filter dropdowns
  const periods = [...new Set(c.artworks.map(a => a.period).filter(Boolean))].sort();
  const sections = [...new Set(c.artworks.map(a => a.section))];
  const seriesList = [...new Set(c.artworks.map(a => a.series).filter(Boolean))].sort();
  const wCats = [...new Set(c.writings.map(w => w.category))].sort();

  populateSelect("filter-period", periods);
  populateSelect("filter-section", sections);
  populateSelect("filter-series", seriesList);
  populateSelect("filter-w-cat", wCats);

  // Event listeners
  document.getElementById("filter-period").onchange = e => { filters.period = e.target.value; renderArtworks(); };
  document.getElementById("filter-section").onchange = e => { filters.section = e.target.value; renderArtworks(); };
  document.getElementById("filter-series").onchange = e => { filters.series = e.target.value; renderArtworks(); };
  document.getElementById("filter-search").oninput = e => { filters.search = e.target.value.toLowerCase(); renderArtworks(); };
  document.getElementById("filter-w-cat").onchange = e => { wFilters.category = e.target.value; renderWritings(); };
  document.getElementById("filter-w-search").oninput = e => { wFilters.search = e.target.value.toLowerCase(); renderWritings(); };

  // Tabs
  document.getElementById("tabs").onclick = e => {
    const btn = e.target.closest("button");
    if (!btn) return;
    currentTab = btn.dataset.tab;
    document.querySelectorAll(".tabs button").forEach(b => b.classList.toggle("active", b === btn));
    document.getElementById("artworks-view").style.display = currentTab === "artworks" ? "" : "none";
    document.getElementById("writings-view").style.display = currentTab === "writings" ? "" : "none";
    document.getElementById("exhibitions-view").style.display = currentTab === "exhibitions" ? "" : "none";
  };

  // Lightbox
  const lb = document.getElementById("lightbox");
  lb.onclick = () => lb.classList.remove("open");

  renderArtworks();
  renderWritings();
  renderExhibitions();
}

function populateSelect(id, values) {
  const sel = document.getElementById(id);
  for (const v of values) {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    sel.appendChild(opt);
  }
}

// --- Render Artworks ---
function renderArtworks() {
  const grid = document.getElementById("artwork-grid");
  let artworks = CATALOG.artworks;

  if (filters.period) artworks = artworks.filter(a => a.period === filters.period);
  if (filters.section) artworks = artworks.filter(a => a.section === filters.section);
  if (filters.series) artworks = artworks.filter(a => a.series === filters.series);
  if (filters.search) artworks = artworks.filter(a => a.title.toLowerCase().includes(filters.search));

  document.getElementById("artwork-count").textContent = artworks.length + " works";

  grid.innerHTML = artworks.map(a => {
    const img = a.images[0];
    const thumbUrl = makeThumb(img.url);
    const yearStr = a.year ? a.year + (a.yearEnd ? "–" + a.yearEnd : "") : "";
    const mediumStr = a.medium ? '<div class="medium">' + esc(a.medium) + '</div>' : "";
    const dimsStr = a.dimensions ? '<div class="dims">' + formatDims(a.dimensions) + '</div>' : "";
    // Source page tag
    const sourceLabel = a.section === "in-the-studio"
      ? "Studio " + (a.period || "")
      : a.tags.length ? a.tags[0] : "Beyond the Studio";
    const allTags = [sourceLabel];
    if (a.series) allTags.push(a.series);

    const tagsStr = '<div class="tags">' +
      allTags.map(t => '<span class="tag">' + esc(t) + '</span>').join("") +
      '</div>';

    return '<div class="card" data-slug="' + a.slug + '" onclick="openLightbox(this)"' +
      ' data-full="' + esc(img.url) + '"' +
      ' data-title="' + esc(a.title) + '"' +
      ' data-detail="' + esc([yearStr, a.medium, a.dimensions ? formatDims(a.dimensions) : ""].filter(Boolean).join(" · ")) + '">' +
      '<div class="img-wrap"><img src="' + esc(thumbUrl) + '" alt="' + esc(a.title) + '" loading="lazy"></div>' +
      '<div class="info">' +
        '<h3><em>' + esc(a.title) + '</em></h3>' +
        (yearStr ? '<div class="year">' + yearStr + '</div>' : '') +
        mediumStr + dimsStr + tagsStr +
      '</div></div>';
  }).join("");
}

function makeThumb(url) {
  // Use full-res URL directly — WP doesn't generate square thumbs
  return url;
}

function formatDims(d) {
  if (!d) return "";
  if (d.text) return d.text;
  let s = d.width + " × " + d.height;
  if (d.depth) s += " × " + d.depth;
  s += " " + d.unit + ".";
  return s;
}

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function openLightbox(card) {
  const lb = document.getElementById("lightbox");
  document.getElementById("lb-img").src = card.dataset.full;
  document.getElementById("lb-title").innerHTML = "<em>" + esc(card.dataset.title) + "</em>";
  document.getElementById("lb-detail").textContent = card.dataset.detail;
  lb.classList.add("open");
}

// --- Render Writings ---
function renderWritings() {
  const list = document.getElementById("writings-list");
  let writings = CATALOG.writings;

  if (wFilters.category) writings = writings.filter(w => w.category === wFilters.category);
  if (wFilters.search) writings = writings.filter(w => w.title.toLowerCase().includes(wFilters.search));

  document.getElementById("writing-count").textContent = writings.length + " entries";

  list.innerHTML = writings.map(w => {
    const pub = [w.publication, w.issue].filter(Boolean).join(", ");
    return '<div class="writing-row">' +
      '<div class="w-title">' + esc(w.title) + '</div>' +
      '<div class="w-pub">' + esc(pub) + '</div>' +
      '<div class="w-year">' + (w.year || "") + '</div>' +
    '</div>';
  }).join("");
}

// --- Render Exhibitions ---
function renderExhibitions() {
  const grid = document.getElementById("exhibitions-grid");
  grid.innerHTML = CATALOG.exhibitions.map(e => {
    const imgs = e.images.slice(0, 6).map(i =>
      '<img src="' + esc(makeThumb(i.url)) + '" alt="" loading="lazy">'
    ).join("");
    return '<div class="exhibition-card">' +
      '<h3>' + esc(e.title) + '</h3>' +
      '<div class="e-year">' + (e.year || "") + '</div>' +
      (imgs ? '<div class="e-images">' + imgs + '</div>' : '') +
    '</div>';
  }).join("");
}

init();
</script>

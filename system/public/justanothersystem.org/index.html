<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>justanothersystem.org — Jeffrey Alan Scudder</title>
  <meta name="author" content="Jeffrey Alan Scudder">
  <meta name="description" content="justanothersystem.org — Recent paintings by Jeffrey Alan Scudder.">
  <link rel="icon" href="https://aesthetic.computer/favicon.ico">

  <!-- Social sharing meta tags -->
  <meta property="og:title" content="justanothersystem.org" />
  <meta property="og:description" content="Recent paintings by Jeffrey Alan Scudder." />
  <meta property="og:url" content="https://justanothersystem.org" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="justanothersystem.org" />
  <meta name="twitter:description" content="Recent paintings by Jeffrey Alan Scudder." />
  <meta name="twitter:site" content="@whistlegraph" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');

    :root {
      --bg: #000;
      --fg: #f0f0f0;
      --dim: #666;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--bg);
      color: var(--fg);
    }

    /* Slideshow fills the viewport */
    .slideshow {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.6s ease-in-out;
      will-change: opacity, transform;
    }

    .slide.active {
      opacity: 1;
    }

    .slide img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.05) saturate(1.08);
      image-rendering: -webkit-optimize-contrast;
    }

    /* Ken Burns animations — 4 variations */
    @keyframes kb-a {
      0%   { transform: scale(1.0) translate(0%, 0%); }
      100% { transform: scale(1.15) translate(2%, 1.5%); }
    }

    @keyframes kb-b {
      0%   { transform: scale(1.15) translate(2%, -1%); }
      100% { transform: scale(1.0) translate(-1%, 1%); }
    }

    @keyframes kb-c {
      0%   { transform: scale(1.0) translate(-1.5%, 1%); }
      100% { transform: scale(1.12) translate(1%, -1.5%); }
    }

    @keyframes kb-d {
      0%   { transform: scale(1.12) translate(1%, 1.5%); }
      100% { transform: scale(1.0) translate(-2%, -1%); }
    }

    .slide.kb-a img { animation: kb-a 8s ease-in-out both; }
    .slide.kb-b img { animation: kb-b 8s ease-in-out both; }
    .slide.kb-c img { animation: kb-c 8s ease-in-out both; }
    .slide.kb-d img { animation: kb-d 8s ease-in-out both; }

    /* Header overlay */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
      padding: 1.5rem;
    }

    .overlay a,
    .overlay button {
      pointer-events: auto;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .site-title {
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.4);
    }

    .site-title a {
      color: var(--fg);
      text-decoration: none;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--fg);
      text-shadow: 0 2px 8px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.4);
    }

    .subtitle a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
    }

    .subtitle a:hover {
      border-color: var(--fg);
    }

    nav {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
    }

    nav a {
      color: var(--dim);
      text-decoration: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--fg);
    }

    /* Bottom bar: counter + progress */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .counter {
      font-size: 1rem;
      color: var(--fg);
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      font-variant-numeric: tabular-nums;
    }

    .location {
      font-size: 1.1rem;
      color: var(--fg);
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      text-align: right;
      transition: opacity 0.8s ease;
    }

    .location:empty {
      opacity: 0;
    }

    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 2px;
      background: rgba(255,255,255,0.3);
      transition: width linear;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="slideshow" id="slideshow"></div>

  <div class="overlay">
    <div class="top-bar">
      <div>
        <h1 class="site-title"><a href="/">justanothersystem.org</a></h1>
        <p class="subtitle">Stretched paintings and drawings by <a href="/bio">Jeffrey Alan Scudder</a></p>
      </div>
    </div>
    <div class="bottom-bar">
      <span class="counter" id="counter"></span>
      <span class="location" id="location"></span>
    </div>
  </div>

  <div class="progress-bar" id="progressBar"></div>

  <script>
    const ASSET_BASE = '/assets/justanothersystem/slideshow/';
    const MANIFEST_URL = ASSET_BASE + 'manifest.json';
    const SLIDE_DURATION = 6000; // ms per slide
    const KB_CLASSES = ['kb-a', 'kb-b', 'kb-c', 'kb-d'];

    const slideshowEl = document.getElementById('slideshow');
    const counterEl = document.getElementById('counter');
    const locationEl = document.getElementById('location');
    const progressBar = document.getElementById('progressBar');

    let slides = [];
    let currentIndex = 0;
    let slideTimer = null;

    // Shuffle array in place (Fisher-Yates)
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-');
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${months[parseInt(m, 10) - 1]} ${parseInt(d, 10)}, ${y}`;
    }

    async function init() {
      try {
        const res = await fetch(MANIFEST_URL);
        const data = await res.json();
        slides = shuffle([...data.images]);
      } catch (e) {
        console.error('Failed to load manifest:', e);
        return;
      }

      if (slides.length === 0) return;

      // Create two slide elements for crossfade
      for (let i = 0; i < 2; i++) {
        const slide = document.createElement('div');
        slide.className = 'slide';
        slide.innerHTML = '<img>';
        slideshowEl.appendChild(slide);
      }

      showSlide(0);
    }

    function showSlide(index) {
      currentIndex = index % slides.length;
      const slideEls = slideshowEl.querySelectorAll('.slide');
      const activeSlot = currentIndex % 2;
      const inactiveSlot = 1 - activeSlot;

      const activeSlide = slideEls[activeSlot];
      const inactiveSlide = slideEls[inactiveSlot];

      const entry = slides[currentIndex];
      const filename = typeof entry === 'string' ? entry : entry.file;

      // Load image into the active slot
      const img = activeSlide.querySelector('img');
      img.src = ASSET_BASE + filename;

      // Assign a Ken Burns class
      KB_CLASSES.forEach(c => activeSlide.classList.remove(c));
      activeSlide.classList.add(KB_CLASSES[currentIndex % KB_CLASSES.length]);

      // Crossfade
      activeSlide.classList.add('active');
      inactiveSlide.classList.remove('active');

      // Update counter
      counterEl.textContent = `${currentIndex + 1} / ${slides.length}`;

      // Update location/date
      const parts = [];
      if (entry.place) parts.push(entry.place);
      if (entry.date) parts.push(formatDate(entry.date));
      locationEl.textContent = parts.join(' \u2014 ');

      // Progress bar
      startProgress();

      // Preload next image
      const nextIndex = (currentIndex + 1) % slides.length;
      const nextEntry = slides[nextIndex];
      const nextFile = typeof nextEntry === 'string' ? nextEntry : nextEntry.file;
      const preload = new Image();
      preload.src = ASSET_BASE + nextFile;

      // Schedule next slide (stop after showing all once)
      clearTimeout(slideTimer);
      if (currentIndex + 1 < slides.length) {
        slideTimer = setTimeout(() => showSlide(currentIndex + 1), SLIDE_DURATION);
      }
    }

    function startProgress() {
      progressBar.style.transition = 'none';
      progressBar.style.width = '0%';
      // Force reflow
      progressBar.offsetWidth;
      progressBar.style.transition = `width ${SLIDE_DURATION}ms linear`;
      progressBar.style.width = '100%';
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        clearTimeout(slideTimer);
        if (currentIndex + 1 < slides.length) showSlide(currentIndex + 1);
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        clearTimeout(slideTimer);
        if (currentIndex > 0) showSlide(currentIndex - 1);
      }
    });

    // Touch swipe navigation
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) {
        clearTimeout(slideTimer);
        if (dx < 0 && currentIndex + 1 < slides.length) {
          showSlide(currentIndex + 1);
        } else if (dx > 0 && currentIndex > 0) {
          showSlide(currentIndex - 1);
        }
      }
    }, { passive: true });

    init();
  </script>
</body>
</html>

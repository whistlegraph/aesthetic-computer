        // ===== RENDER =====
        const SECTIONS = [
            { id: 'active',  title: 'Active proposals',  color: 'cyan',   blurb: 'Live public previews. Going to submit.' },
            { id: 'submitted', title: 'Submitted',       color: 'green',  blurb: 'Submitted; awaiting decision.' },
            { id: 'verify',  title: 'Verify submission', color: 'red',    blurb: 'Deadline already passed; draft was ready but submission status is unconfirmed.' },
            { id: 'open',    title: 'Open windows',      color: 'pink',   blurb: 'Sorted by closest deadline first.' },
            { id: 'rolling', title: 'Rolling',           color: 'cyan',   blurb: 'Submit any time.' },
            { id: 'funding', title: 'Funding sources',   color: 'purple', blurb: 'Grants and travel awards.' },
            { id: 'decided', title: 'Decided',           color: 'red',    blurb: 'Submitted and resolved.' },
            { id: 'passed',  title: 'Recently passed',   color: 'gold',   blurb: 'Track for the next call.' },
        ];

        function daysBetween(a, b) {
            const ms = b.getTime() - a.getTime();
            return Math.round(ms / (1000 * 60 * 60 * 24));
        }

        function fmtDate(iso) {
            const d = new Date(iso + 'T12:00:00Z');
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
        }

        function countdown(iso) {
            if (!iso) return { label: 'rolling', cls: 'rolling' };
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const target = new Date(iso + 'T23:59:59Z');
            const days = daysBetween(today, target);
            if (days < 0) return { label: `${-days}d ago`, cls: 'passed' };
            if (days === 0) return { label: 'today', cls: 'urgent' };
            if (days <= 7) return { label: `${days}d`, cls: 'urgent' };
            if (days <= 30) return { label: `${days}d`, cls: 'soon' };
            return { label: `${days}d`, cls: 'ok' };
        }

        function render() {
            const today = new Date();
            const asOf = today.toISOString().slice(0, 10);
            document.getElementById('as-of').textContent = `as of ${asOf}`;

            if (REVIEW_MODE) {
                const banner = document.createElement('div');
                banner.className = 'review-banner';
                banner.innerHTML = `Review mode on. Draft links open files in VS Code via <code>vscode://</code>. Append <code>?review</code> to bookmark.`;
                document.getElementById('as-of').after(banner);
            }

            const root = document.getElementById('sections');

            // Sort within sections
            const active = DEADLINES.filter(d => d.section === 'active').sort((a, b) => a.deadline.localeCompare(b.deadline));
            const submitted = DEADLINES.filter(d => d.section === 'submitted').sort((a, b) => b.deadline.localeCompare(a.deadline));
            const open = DEADLINES.filter(d => d.section === 'open').sort((a, b) => a.deadline.localeCompare(b.deadline));
            const passed = DEADLINES.filter(d => d.section === 'passed').sort((a, b) => b.deadline.localeCompare(a.deadline));
            const verify = DEADLINES.filter(d => d.section === 'verify').sort((a, b) => a.deadline.localeCompare(b.deadline));
            const decided = DEADLINES.filter(d => d.section === 'decided').sort((a, b) => b.deadline.localeCompare(a.deadline));
            const rolling = DEADLINES.filter(d => d.section === 'rolling');
            const funding = DEADLINES.filter(d => d.section === 'funding');

            const bySection = { active, submitted, verify, open, rolling, funding, decided, passed };

            for (const sec of SECTIONS) {
                const items = bySection[sec.id] || [];
                if (items.length === 0) continue;
                const div = document.createElement('div');
                div.className = 'section';
                div.innerHTML = `
                    <div class="section-header" data-color="${sec.color}">
                        <h2>${sec.title}</h2>
                        <span class="blurb">${sec.blurb}</span>
                    </div>
                    <div class="rows"></div>
                `;
                const rows = div.querySelector('.rows');
                for (const item of items) {
                    rows.appendChild(renderRow(item));
                }
                root.appendChild(div);
            }
        }

        // Review mode: ?review on the URL surfaces vscode:// links to local
        // draft files in the vault. Off by default so the public page stays
        // clean (visitors don't see vault paths or which calls are drafted).
        const REVIEW_MODE = new URLSearchParams(location.search).has('review');
        const VAULT_GRANTS_PREFIX = '/Users/jas/aesthetic-computer/aesthetic-computer-vault/grants/';

        function renderRow(item) {
            const row = document.createElement('div');
            row.className = 'row';

            const venueText = item.venueUrl
                ? `<a href="${item.venueUrl}" target="_blank" rel="noopener">${item.venue}</a>`
                : item.venue;
            const trackText = item.track ? `<span class="track">${item.track}</span>` : '';

            const dateBlock = item.deadline
                ? `<span class="date">${fmtDate(item.deadline)}</span>${item.deadlineExtra ? ` <span class="when-extra">${item.deadlineExtra}</span>` : ''}${item.conference ? ` <span class="when-extra">${item.conference}</span>` : ''}`
                : (item.conference ? `<span class="when-extra">${item.conference}</span>` : '—');

            const cd = countdown(item.deadline);
            const statusBadge = item.statusLabel
                ? `<span class="status ${item.status || 'new'}">${item.statusLabel}</span>`
                : '';

            const draftLink = (REVIEW_MODE && item.draftPath)
                ? `<a class="draft-link" href="vscode://file${VAULT_GRANTS_PREFIX}${item.draftPath}">📝 review draft</a>`
                : '';

            const proposalLink = item.proposalUrl
                ? `<a class="proposal-link" href="${item.proposalUrl}" target="_blank" rel="noopener">▸ ${item.proposalLabel || 'view proposal'}</a>`
                : '';

            const hasNotes = item.notes || statusBadge || draftLink || proposalLink;
            row.innerHTML = `
                <div class="venue">${venueText}${trackText}</div>
                <div class="when">${dateBlock}</div>
                <div class="countdown ${cd.cls}">${cd.label}</div>
                ${hasNotes ? `<div class="notes">${statusBadge}${proposalLink}${draftLink}${item.notes || ''}</div>` : ''}
            `;
            return row;
        }

        // Theme toggle
        const root = document.documentElement;
        const saved = localStorage.getItem('papers-theme');
        if (saved === 'light') root.classList.add('light-mode');
        if (saved === 'dark') root.classList.add('dark-mode');
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isLight = root.classList.contains('light-mode')
                || (!root.classList.contains('dark-mode') && window.matchMedia('(prefers-color-scheme: light)').matches);
            root.classList.remove('light-mode', 'dark-mode');
            root.classList.add(isLight ? 'dark-mode' : 'light-mode');
            localStorage.setItem('papers-theme', isLight ? 'dark' : 'light');
        });

        render();
    </script>

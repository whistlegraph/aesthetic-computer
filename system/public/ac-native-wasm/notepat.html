false, y: false },\n  volume: { x: false, y: false },\n  drive:  { x: false, y: false },\n  wobble: { x: false, y: false },\n};\n\nfunction clampRange(value, min, max) {\n  return Math.max(min, Math.min(max, value));\n}\n\nfunction clamp01(value) {\n  return clampRange(value, 0, 1);\n}\n\nfunction pointInRect(x, y, rect) {\n  return !!rect &&\n    x >= rect.x && x < rect.x + rect.w &&\n    y >= rect.y && y < rect.y + rect.h;\n}\n\nfunction setEchoMixValue(value, sound, commit = true) {\n  const next = clamp01(value);\n  const changed = Math.abs(next - echoMix) > 0.0005;\n  echoMix = next;\n  if (commit) sound?.room?.setMix?.(echoMix);\n  return changed;\n}\n\nfunction setBitcrushMixValue(value, sound, commit = true) {\n  const next = clamp01(value);\n  const changed = Math.abs(next - bitcrushMix) > 0.0005;\n  bitcrushMix = next;\n  if (commit) sound?.glitch?.setMix?.(bitcrushMix);\n  return changed;\n}\n\nfunction setMasterVolMixValue(value, sound, commit = true) {\n  // Slider range 0..1 maps to audio gain 0..2 so the UI stays in the\n  // same 0..100% pattern as the other FX rows. 50% = unity, 100% = 2x.\n  const next = clamp01(value);\n  const changed = Math.abs(next - masterVolMix) > 0.0005;\n  masterVolMix = next;\n  if (commit) sound?.volume?.setMix?.(masterVolMix * 2);\n  return changed;\n}\n\nfunction setDriveMixValue(value, sound, commit = true) {\n  const next = clamp01(value);\n  const changed = Math.abs(next - driveMix) > 0.0005;\n  driveMix = next;\n  if (commit) sound?.drive?.setMix?.(driveMix);\n  return changed;\n}\n\nfunction setWobbleMixValue(value, sound, commit = true) {\n  const next = clamp01(value);\n  const changed = Math.abs(next - wobbleMix) > 0.0005;\n  wobbleMix = next;\n  if (commit) sound?.wobble?.setMix?.(wobbleMix);\n  return changed;\n}\n\nfunction applyPitchShiftToActiveSounds(force = false) {\n  const ep = effectivePitchShift();\n  if (!force && Math.abs(ep - lastAppliedPitch) <= 0.001) return false;\n  lastAppliedPitch = ep;\n  const factor = Math.pow(2, ep);\n  for (const k of Object.keys(sounds)) {\n    const s = sounds[k];\n    if (s && s.synth && s.baseFreq) {\n      if (s.isSample) s.synth.update({ tone: s.baseFreq * factor, base: SAMPLE_BASE_FREQ });\n      else s.synth.update({ tone: s.baseFreq * factor });\n    }\n  }\n  updateReversePlaybackPitch();\n  updateActivePercussionVoices(force);\n  return true;\n}\n\nfunction setPitchShiftValue(value, force = true) {\n  const next = clampRange(value, -1, 1);\n  const changed = Math.abs(next - pitchShift) > 0.0005;\n  pitchShift = next;\n  if (force) applyPitchShiftToActiveSounds(true);\n  return changed;\n}\n\nfunction toggleTrackpadBinding(effect, axis) {\n  if (!trackpadEffectBindings[effect]) return;\n  trackpadEffectBindings[effect][axis] = !trackpadEffectBindings[effect][axis];\n}\n\nfunction setEffectRowFromPointer(rowId, x, row, sound, commit = true) {\n  if (!row) return false;\n  const norm = clamp01((x - row.sliderX) / Math.max(1, row.sliderW));\n  if (rowId === \"fx\") {\n    fxMix = norm;\n    if (commit) sound?.fx?.setMix?.(fxMix);\n    return true;\n  }\n  if (rowId === \"echo\")   return setEchoMixValue(norm, sound, commit);\n  if (rowId === \"crush\")  return setBitcrushMixValue(norm, sound, commit);\n  if (rowId === \"pitch\")  return setPitchShiftValue(norm * 2 - 1, commit);\n  if (rowId === \"volume\") return setMasterVolMixValue(norm, sound, commit);\n  if (rowId === \"drive\")  return setDriveMixValue(norm, sound, commit);\n  if (rowId === \"wobble\") return setWobbleMixValue(norm, sound, commit);\n  return false;\n}\n\nfunction forEachActivePercussionHold(fn) {\n  const seen = new Set();\n  const now = Date.now();\n  ringingPercussionHolds = ringingPercussionHolds.filter((hold) => hold && (hold.ringUntil ?? 0) > now);\n  for (const hold of Object.values(activeDrumKeys)) {\n    if (!hold || seen.has(hold)) continue;\n    seen.add(hold);\n    fn(hold);\n  }\n  for (const entry of Object.values(touchNotes)) {\n    const hold = entry?.drumHold;\n    if (!hold || seen.has(hold)) continue;\n    seen.add(hold);\n    fn(hold);\n  }\n  for (const hold of ringingPercussionHolds) {\n    if (!hold || seen.has(hold)) continue;\n    seen.add(hold);\n    fn(hold);\n  }\n}\n\nfunction updateActivePercussionVoices(force = false) {\n  const nextPitchFactor = Math.pow(2, effectivePitchShift());\n  forEachActivePercussionHold((hold) => {\n    const master = masterForSide(hold.gridOffset ?? 0);\n    const nextVolume = (hold.baseVolume ?? hold.volume) * master;\n    if (!force &&\n        Math.abs(nextPitchFactor - (hold.lastAppliedPitchFactor ?? hold.pitchFactor ?? nextPitchFactor)) <= 0.001 &&\n        Math.abs(nextVolume - (hold.lastAppliedVolume ?? hold.volume ?? nextVolume)) <= 0.001) {\n      return;\n    }\n    hold.pitchFactor = nextPitchFactor;\n    hold.volume = nextVolume;\n    hold.lastAppliedPitchFactor = nextPitchFactor;\n    hold.lastAppliedVolume = nextVolume;\n    for (const entry of hold.voices || []) {\n      if (!entry?.handle?.update) continue;\n      const patch = {};\n      if (entry.baseTone !== undefined) patch.tone = entry.baseTone * nextPitchFactor;\n      if (entry.sampleBase !== undefined) patch.base = entry.sampleBase;\n      if (entry.baseVolumeUnit !== undefined) patch.volume = entry.baseVolumeUnit * nextVolume;\n      if (Object.keys(patch).length > 0) {\n        try { entry.handle.update(patch); } catch {}\n      }\n      if (entry.releaseBaseTone !== undefined) {\n        entry.releaseUpdate = { ...(entry.releaseUpdate || {}), tone: entry.releaseBaseTone * nextPitchFactor };\n      }\n      if (entry.releaseBaseVolumeUnit !== undefined) {\n        entry.releaseUpdate = { ...(entry.releaseUpdate || {}), volume: entry.releaseBaseVolumeUnit * nextVolume };\n      }\n    }\n  });\n}\n\n// Dark mode: auto based on LA time (7pm-7am)\n// UEFI clock is UTC; LA is UTC-7 (PDT) or UTC-8 (PST)\n// DST: second Sunday of March 2am → first Sunday of November 2am\nfunction getLAOffset() {\n  const now = new Date();\n  const y = now.getUTCFullYear(), m = now.getUTCMonth();\n  if (m > 2 && m < 10) return 7; // Apr-Oct: always PDT\n  if (m < 2 || m > 10) return 8; // Jan-Feb, Dec: always PST\n  // March (m=2): DST starts second Sunday at 2am UTC-8 (10am UTC)\n  if (m === 2) {\n    const d1 = new Date(Date.UTC(y, 2, 1)).getUTCDay(); // day-of-week of Mar 1\n    const secondSun = 8 + (7 - d1) % 7; // date of second Sunday\n    const dstStart = Date.UTC(y, 2, secondSun, 10); // 2am PST = 10am UTC\n    return now.getTime() >= dstStart ? 7 : 8;\n  }\n  // November (m=10): DST ends first Sunday at 2am UTC-7 (9am UTC)\n  const d1 = new Date(Date.UTC(y, 10, 1)).getUTCDay();\n  const firstSun = 1 + (7 - d1) % 7;\n  const dstEnd = Date.UTC(y, 10, firstSun, 9); // 2am PDT = 9am UTC\n  return now.getTime() < dstEnd ? 7 : 8;\n}\nfunction getLAHour() {\n  const now = new Date();\n  return (now.getUTCHours() - getLAOffset() + 24) % 24;\n}\nfunction isDark() {\n  const h = getLAHour();\n  return h >= 20 || h < 7; // dark after 8pm, light after 7am (LA time)\n}\nlet dark = isDark(); // auto: dark after 7pm LA time, light before\n\n// Background color — average of active notes, lerped\nlet bgColor = [0, 0, 0];\nlet bgTarget = dark ? [20, 20, 25] : [240, 238, 232];\n\n// === DRUM BACKGROUND FLASH ===\n// Tones paint the full-screen background from their note colors while held\n// (see the activeKeys loop in paint()). Drums are one-shots and don't live\n// in `sounds[key]`, so they need their own transient flash state. Each drum\n// hit pushes an entry here; paint() sums+decays them into the bg color so\n// a kick pulses orange, a ride pulses silver-blue, a crash pulses lavender,\n// etc. Rolls overlap because we keep up to 8 concurrent fading entries.\nconst DRUM_FLASH_LIFE = 14;  // ~230 ms at 60 fps\nlet drumFlashes = [];        // [{ color: [r,g,b], frame, life }]\n// Per-pad highlight: bumps to `frame + N` on hit so the pad outlines\n// itself bright for a few nto system.flashTargets\n\n// Auto-update: background check on WiFi connect, silent download+flash+reboot\n// states: \"idle\" | \"checking\" | \"downloading\" | \"flashing\" | \"rebooting\"\nlet autoUpdate = {\n  state: \"idle\",\n  fetchPending: false,  // true = fetchResult belongs to auto-update version check\n  rebootFrame: 0,\n  nextCheckFrame: 0,\n  availableVersion: \"\",\n  lastError: \"\",\n};\n\n// WiFi UI state\nlet wifiSelectedIdx = -1;\nlet wifiPassword = \"\";\nlet wifiPasswordMode = false;  // true = fullscreen password entry\nlet shiftHeld = false;\n\n// Analog keyboard (NuPhy Hall-Effect) detection. When a note-on event\n// arrives with an analog pressure value (0 < p < 1) that isn't the\n// default 1.0 stamped onto digital keypresses, we flag the session as\n// \"analog\". Rendered as a `nuphy` badge in the status bar so the user\n// knows velocity-sensitive play is active; stays sticky for 60 seconds\n// after the last analog press so a momentary digital press (e.g. the\n// laptop's built-in keyboard) doesn't flicker the badge off.\nlet lastAnalogKeyAt = 0;      // syncedNow() ms; 0 = never seen analog\nlet lastAnalogPressure = 0;   // last analog press value, for the debug gauge\n\n// AC chat: latest message fetched after WiFi connects\nlet acMsg = null;            // { from, text } once loaded\nlet lastSpokenMsgKey = \"\";   // \"from:text\" of last TTS'd message (avoid repeats on reconnect)\nlet wsStatus = \"\";           // \"connecting\" | \"connected\" | \"error\" | \"\"\nlet wsConnectGrace = 0;      // frames to wait before declaring error (race-condition guard)\nlet wsReconnectTimer = 0;   // frames until next reconnect attempt\nlet chatMuted = false;       // mute TTS for incoming chat messages\nlet wifiWasConnected = false;\nlet wifiConnectFrame = -9999; // frame when WiFi last connected (cooldown guard)\nlet lastBatPercent = -1;     // for battery change TTS\n\n// Auto-connect: try \"aesthetic.computer\" hotspot when not connected\nconst AC_SSID = \"aesthetic.computer\";\nconst AC_PASS = \"aesthetic.computer\";\n// Additional networks loaded from /mnt/wifi_creds.json\nlet autoConnectFrame = 0;    // counts frames; try every ~5s (300 frames)\nlet autoConnectBlink = 0;    // blink counter for antenna icon while polling\nlet autoConnectTry = 0;      // increments each attempt\nlet connectStartFrame = 0;   // frame when current connect began (for timeout)\n\n// Saved WiFi credentials — persisted to /mnt/wifi_creds.json (USB EFI partition)\nconst CREDS_PATH = \"/mnt/wifi_creds.json\";\nlet savedCreds = [];         // [{ssid, pass}, ...] loaded at boot\n\n// === DJ DECK (ported from dj.mjs) ===\n// Integrated turntable playback so notepat can layer melody/percussion\n// over a backing track, sync tempo, and scratch — all in one piece.\nconst DJ_AUDIO_EXTS = new Set([\"mp3\", \"wav\", \"flac\", \"ogg\", \"aac\", \"m4a\", \"opus\", \"wma\"]);\nlet djFiles = [];            // [{path, name}] discovered on USB\nlet djTrackIdx = 0;\nlet djMounted = false;\nlet djUsbConnected = false;\nlet djLastUsbCheckFrame = 0;\nconst DJ_USB_CHECK_ACTIVE_FRAMES = 180; // ~3s while a DJ USB is present\nconst DJ_USB_CHECK_IDLE_FRAMES = 900;   // ~15s when idle; F4 still forces an immediate rescan\nlet djMessage = \"\";\nlet djMessageFrame = 0;\nlet djAngle = 0;             // visual spin angle (not drawn big, just for strip)\nlet djDragging = false;      // true while user is scratching the deck strip\nlet djDragWasPlaying = false;\nlet djDragLastX = 0;\nlet djScratchSpeed = 0;\n// Tap-tempo state for syncing notepat metronome to the current track\nlet djTapTimes = [];         // last few tap timestamps (ms)\nlet djDerivedBPM = 0;        // 0 = not yet tapped, otherwise tapped BPM\n// Cached deck strip geometry from paint() for hit-testing in act()\nlet djStrip = null;          // { x, y, w, h, btnPlay, btnPrev, btnNext, btnScan, btnTap }\n\nfunction djIsAudio(name) {\n  if (name.startsWith(\".\")) return false;\n  const dot === \"boom_freq_end\") {\n    return val >= 1000 ? (val / 1000).toFixed(1) + \"k\" : Math.round(val);\n  }\n  if (key === \"bore_length_s\") return (val * 1000).toFixed(2) + \"ms\";\n  if (key === \"env_rate\") return Math.round(val);\n  if (Math.abs(val) < 10) return val.toFixed(2);\n  return Math.round(val);\n}\n\n// Build the override object for a (weapon, model) — only includes keys\n// the user has actually edited, so the C side only sees the deltas.\nfunction paramOverridesFor(weapon, model) {\n  const out = {};\n  const prefix = `${weapon}/${model}/`;\n  for (const k in WAR_PARAM_OVERRIDES) {\n    if (k.startsWith(prefix)) out[k.slice(prefix.length)] = WAR_PARAM_OVERRIDES[k];\n  }\n  return out;\n}\n\n// 3-char labels for tight pad rendering\nconst WAR_LABELS = {\n  c: \"PST\", d: \"RFL\", e: \"SHG\", f: \"SUP\",\n  g: \"SMG\", a: \"LMG\", b: \"SNP\",\n  \"c#\": \"GRN\", \"d#\": \"RPG\",\n  \"f#\": \"RLD\", \"g#\": \"CCK\", \"a#\": \"RIC\",\n};\n\n// Gunmetal / field palette — earthy khakis, rusts, steels, brass.\nconst WAR_COLORS = {\n  c:    [140, 140, 150], // pistol — gunmetal steel\n  d:    [ 90, 110,  70], // rifle — olive drab\n  e:    [120,  80,  60], // shotgun — brown + steel\n  f:    [ 70,  70,  80], // suppressed — matte black\n  g:    [150, 130,  90], // smg — khaki\n  a:    [100,  90,  60], // lmg — field green\n  b:    [180, 160, 110], // sniper — desert tan\n  \"c#\": [ 80,  90,  60], // grenade — dark olive\n  \"d#\": [200, 100,  60], // rpg — rust orange\n  \"f#\": [130, 130, 140], // reload — silver-gray\n  \"g#\": [160, 140, 100], // cock — brass\n  \"a#\": [210, 210, 230], // ricochet — metallic white\n};\n\n// Which weapons sustain while the key is held (release kills the voice).\nconst WAR_SUSTAIN = {\n  g: true,   // smg — full-auto, retriggers ~1000 RPM in audio.c\n  a: true,   // lmg — retriggers internally via audio.c retrig_period\n  b: true,   // sniper — long reverberant tail\n  \"c#\": true,// grenade — slow rumbling release\n  \"a#\": true,// ricochet — pitch drops on release (doppler)\n};\n\n// Finite durations for one-shot weapons (seconds). These control the\n// voice's auto-kill after the internal excitation has rung out. Longer\n// durations preserve the body-mode ring.\nconst WAR_DURATION = {\n  c:    0.30,  // pistol\n  d:    0.55,  // rifle\n  e:    0.80,  // shotgun\n  f:    0.20,  // suppressed\n  g:    0.18,  // smg\n  \"d#\": 2.50,  // rpg (motor burn + delayed boom)\n  \"f#\": 0.35,  // reload\n  \"g#\": 0.45,  // cock (rack + lock)\n};\n\n// Release fade on sustained weapons (seconds). Sniper/grenade fade\n// slowly so the tail is audible; SMG/LMG snap off faster (muzzle cut).\nconst WAR_RELEASE = {\n  g: 0.05,   // smg — snappy stop\n  a: 0.08,   // lmg — abrupt stop (muzzle cut)\n  b: 0.80,   // sniper — long reverberant fade\n  \"c#\": 1.20,// grenade — slow rumble-out\n  \"a#\": 0.35,// ricochet — natural decay after pitch drop\n};\n\n// Stochastic pad graphics (same format as PERCUSSION_NOTATION). These\n// are just visuals — the actual synth is the DWG. Each signature hints\n// at the weapon's spectral content so the pad communicates \"what fires\".\nconst WAR_NOTATION = {\n  c:    [[\"t\",1500,1.0],[\"n\",4000,0.55],[\"q\",8500,0.4]],           // pistol\n  d:    [[\"n\",5000,0.6],[\"t\",800,0.9],[\"q\",2400,0.5],[\"q\",6000,0.4]], // rifle\n  e:    [[\"n\",400,1.6],[\"n\",1200,1.2],[\"n\",3500,0.8]],             // shotgun\n  f:    [[\"n\",700,0.6],[\"s\",1500,0.3]],                             // suppressed\n  g:    [[\"n\",3000,0.5],[\"q\",1200,0.6],[\"q\",3500,0.5]],             // smg\n  a:    [[\"n\",1800,0.8],[\"t\",600,1.0],[\"q\",4500,0.4]],              // lmg\n  b:    [[\"s\",350,1.5],[\"s\",950,1.1],[\"n\",2800,0.7]],               // sniper\n  \"c#\": [[\"s\", 80,2.0],[\"n\",250,1.5],[\"n\",1200,1.0]],               // grenade\n  \"d#\": [[\"n\",600,2.0],[\"n\",2000,1.2]],                             // rpg\n  \"f#\": [[\"q\",2200,0.6],[\"q\",4500,0.5],[\"n\",8000,0.4]],             // reload\n  \"g#\": [[\"q\",1800,0.6],[\"q\",4200,0.5]],                            // cock\n  \"a#\": [[\"s\",3000,0.9],[\"s\",5500,0.7],[\"s\",9000,0.5]],             // ricochet\n};\n\n// === ZOO KIT ===\n// 12 animal calls synthesized with classic subtractive/FM recipes. Each\n// sound is 1-3 voices, pitch-envelope shaped. Animal calls rely heavily\n// on pitch modulation — bird chirps = fast descending pulses, cat meow =\n// two-peak pitch envelope (\"eow\", the 'm' is impossible in pure\n// subtractive), lion roar = noise + sub-saw, etc. (Classic synthesis\n// references: MOD WIGGLER analog-animal thread, Robert Rich's \"Bestiary\").\nconst ZOO_NAMES = {\n  c: \"dog\", d: \"cat\", e: \"cow\", f: \"sheep\",\n  g: \"bird\", a: \"pig\", b: \"lion\",\n  \"c#\": \"owl\", \"d#\": \"frog\",\n  \"f#\": \"horse\", \"g#\": \"snake\", \"a#\": \"whale\",\n};\nconst ZOO_LABELS = {\n  c: \"DOG\", d: \"CAT\", e: \"COW\", f: \"SHP\",\n  g: \"BRD\", a: \"PIG\", b: \"LION\",\n  \"c#\": \"OWL\", \"d#\": \"FRG\",\n  \"f#\": \"HRS\", \"g#\": \"SNK\", \"a#\": \"WHL\",\n};\nconst ZOO_COLORS = {\n  c:    [200, 130,  80], // dog — warm tan\n  d:    [230, 180, 220], // cat — pink\n  e:    [220, 200, 170], // cow — cream\n  f:    [240, 240, 220], // sheep — wool white\n  g:    [140, 220, 220], // bird — pale teal\n  a:    [240, 180, 180], // pig — pink-salmon\n  b:    [220, 170,  90], // lion — golden\n  \"c#\": [120, 120, 180], // owl — twilight blue\n  \"d#\": [140, 220, 140], // frog — green\n  \"f#\": [170, 120,  80], // horse — chestnut\n  \"g#\": [170, 230, 130], // snake — lime-olive\n  \"a#\": [100, 180, 230], // whale — ocean blue\n};\nconst ZOO_NOTATION = {\n  c:  [[\"w\",180,0.8],[\"n\",2500,0.3]],                    // dog\n  d:  [[\"s\",500,0.6],[\"s\",350,0.4]],                     // cat\n  e:  [[\"t\",90,1.2],[\"s\",45,0.8]],                       // cow\n  f:  [[\"t\",380,0.5]],                                   // sheep\n  g:  [[\"s\",2500,0.5],[\"s\",3500,0.4]],                   // bird\n  a:  [[\"w\",140,0.7],[\"w\",180,0.5]],                     // pig\n  b:  [[\"n\",400,1.0],[\"w\",70,1.2]],                      // lion\n  \"c#\": [[\"s\",320,0.6]],                                 // owl\n  \"d#\": [[\"w\",110,0.6]],                                 // frog\n  \"f#\": [[\"q\",450,0.5],[\"s\",500,0.3]],                   // horse\n  \"g#\": [[\"n\",2000,0.8]],                                // snake\n  \"a#\": [[\"s\",100,1.2]],                                 // whale\n};\n// Which zoo sounds sustain while held (release kills the voice).\nconst ZOO_SUSTAIN = {\n  \"g#\": true, // snake — long hiss\n};\nconst ZOO_DURATION = {\n  c: 0.12, d: 0.45, e: 0.60, f: 0.35,\n  g: 0.16, a: 0.25, b: 0.90,\n  \"c#\": 0.55, \"d#\": 0.18,\n  \"f#\": 0.55, \"a#\": 2.0,\n};\nconst ZOO_RELEASE = {\n  \"g#\": 0.25,\n};\n\n// Fire a zoo-kit animal sound. Classic subtractive recipes, one-shot or\n// sustained. `pitchFactor` scales all tonal voices so the kit bends\n// with octave/pitch like perc does.\nfunction playZoo(sound, letter, volume = 1.0, pan = 0, pitchFactor = 1.0, phase = \"both\", holdVoices = null) {\n  if (!sound?.synth) return;\n  if (phase === \"up\") return;\n  const v = Math.max(0.1, Math.min(2.2, volume));\n  const pf = Math.max(0.25, Math.min(4, pitchFactor));\n  const isLive = phase === \"down\" && Array.isArray(holdVoices);\n  const rj = (c, f) => c * (1 + (Math.random() - 0.5) * 2 * f);\n  const fire = (params, dur, sustainLen) => {\n    if (isLive && ZOO_SUSTAIN[letter]) {\n      const h = sound.synth({ ...params, duration: Infinity });\n      if (h) holdVoices.push({ handle: h, releaseFade: ZOO_RELEASE[letter] ?? 0.1 });\n    } else {\n      sound.synth({ ...params, duration: dur ?? sustainLen ?? 0.2 });\n    }\n  };\n  switch (letter) {\n    case \"c\": {\n      // DOG BARK — Bruce's Pure Data recipe + Farnell Ch. 52 formant\n      // frame. Primary energy 400-700 Hz (Indian wolf harmonic data,\n      // Sadhukhan PLOS One). Saw source sweeping 700 → 400 Hz over ~15 ms\n      // (approximated with 3 staggered voices) + narrow-band noise\n      // burst at ~200 Hz (simulating BPF Q≈1 throat resonance) +\n      // high-frequency noise crack on attack. Percussive envelope\n      // (<5 ms attack, 80-150 ms decay, zero sustain).\n      const p1 = 700 * pf, p2 = 500 * pf, p3 = 400 * pf;\n      sound.synth({ type: \"sawtooth\", tone: p1, duration: 0.012, volume: rj(0.80, 0.08) * v, attack: 0.001, decay: 0.011, pan });\n      sound.synth({ type: \"sawtooth\", tone: p2, duration: 0.040, volume: rj(0.72, 0.08) * v, attack: 0.008, decay: 0.032, pan });\n      sound.synth({ type: \"sawtooth\", tone: p3, duration: 0.100, volume: rj(0.68, 0.08) * v, attack: 0.022, decay: 0.080, pan });\n      // Throat resonance (approx. BPF-noise at ~200 Hz)\n      sound.synth({ type: \"triangle\", tone: 210 * pf, duration: 0.12, volume: rj(0.35, 0.08) * v, attack: 0.003, decay: 0.11, pan });\n      // High-freq click on attack\n      sound.synth({ type: \"noise\", tone: 2800 * pf, duration: 0.006, volume: 0.40 * v, attack: 0.0003, decay: 0.005, pan });\n      break;\n    }\n    case \"d\": {\n      // CAT MEOW — MeowSynth / Farnell vowel-interpolation recipe.\n      // Arched F0 rises from 500 → 750 Hz, then falls to 400 Hz —\n      // food-context meow, per Schötz & Eklund. Four staggered\n      // saw-ish stages approximate the pitch arch. Vowel transition\n      // from /e/ (F1=400, F2=1900) → /o/ (F1=500, F2=900) sketched\n      // with two parallel formant-tracker sine voices that also\n      // sweep. ADSR ~30 ms A, 400 ms R, total 500-700 ms.\n      const atkBase = 0.025;\n      sound.synth({ type: \"sawtooth\", tone: 500 * pf, duration: 0.18, volume: rj(0.45, 0.08) * v, attack: atkBase, decay: 0.14, pan });\n      sound.synth({ type: \"sawtooth\", tone: 700 * pf, duration: 0.18, volume: rj(0.50, 0.08) * v, attack: atkBase + 0.08, decay: 0.14, pan });\n      sound.synth({ type: \"sawtooth\", tone: 550 * pf, duration: 0.18, volume: rj(0.48, 0.08) * v, attack: atkBase + 0.22, decay: 0.16, pan });\n      sound.synth({ type: \"sawtooth\", tone: 400 * pf, duration: 0.24, volume: rj(0.40, 0.08) * v, attack: atkBase + 0.36, decay: 0.22, pan });\n      // F1 / F2 formant singers — sine voices sweeping from /e/ to /o/\n      sound.synth({ type: \"sine\", tone: 1900 * pf, duration: 0.22, volume: rj(0.15, 0.05) * v, attack: atkBase, decay: 0.18, pan });\n      sound.synth({ type: \"sine\", tone: 900 * pf,  duration: 0.28, volume: rj(0.18, 0.05) * v, attack: atkBase + 0.20, decay: 0.22, pan });\n      break;\n    }\n    case \"e\": {\n      // COW MOO — Green et al. formant measurements: F0 80-150 Hz,\n      // F1 ~790 Hz, F2 ~1942 Hz. Low F0 drifts slightly downward,\n      // F1 opens ~600 → ~900 Hz over the tail (\"mmm → ooo\"). Saw\n      // source for harmonic richness + slow sine LFO (via a detuned\n      // voice) for vocal-fold ripple.\n      const base = 110 * pf;\n      sound.synth({ type: \"sawtooth\", tone: base, duration: 1.4, volume: rj(0.70, 0.06) * v, attack: 0.08, decay: 1.0, pan });\n      sound.synth({ type: \"sawtooth\", tone: base * 0.93, duration: 1.4, volume: rj(0.45, 0.06) * v, attack: 0.10, decay: 1.0, pan });\n      // F1 — mouth-closed to mouth-open\n      sound.synth({ type: \"sine\", tone: 600 * pf, duration: 0.7, volume: rj(0.35, 0.05) * v, attack: 0.10, decay: 0.5, pan });\n      sound.synth({ type: \"sine\", tone: 900 * pf, duration: 0.9, volume: rj(0.30, 0.05) * v, attack: 0.50, decay: 0.7, pan });\n      // F2 always-on\n      sound.synth({ type: \"sine\", tone: 1942 * pf, duration: 1.3, volume: rj(0.10, 0.03) * v, attack: 0.12, decay: 1.0, pan });\n      break;\n    }\n    case \"f\": {\n      // SHEEP BAA — Briefer et al. *Current Biology* 2017: sheep\n      // vocalizations evolved a characteristic 5-8 Hz vibrato (±15%).\n      // Approximated with 6 staggered saw voices alternating between\n      // F0 and F0×1.15, ~50 ms each = 7 Hz vibrato. Base F0 ~280 Hz.\n      const base = 280 * pf;\n      const hi = base * 1.15;\n      const vibDur = 0.05;\n      for (let i = 0; i < 7; i++) {\n        const tone = (i & 1) ? hi : base;\n        sound.synth({ type: \"sawtooth\", tone, duration: vibDur + 0.03,\n          volume: rj(0.50, 0.08) * v,\n          attack: i * vibDur + 0.002, decay: vibDur + 0.02, pan });\n      }\n      // Lamb/nasal harmonic\n      sound.synth({ type: \"triangle\", tone: base * 2, duration: 0.5, volume: rj(0.18, 0.05) * v, attack: 0.01, decay: 0.45, pan });\n      break;\n    }\n    case \"g\": {\n      // BIRD CHIRP — Van Hunter Adams' Pico recipe: \"swoop + chirp\".\n      // Swoop = sine sinusoidal F0 contour 1740 → 2000 → 1740 Hz over\n      // 130 ms. Chirp = sine sweeping 2 → 7 kHz in 40-80 ms. Silence\n      // ~50 ms between primitives.\n      // Swoop approximation (3 stages around the peak)\n      sound.synth({ type: \"sine\", tone: 1740 * pf, duration: 0.045, volume: rj(0.52, 0.1) * v, attack: 0.002, decay: 0.04, pan });\n      sound.synth({ type: \"sine\", tone: 2000 * pf, duration: 0.045, volume: rj(0.58, 0.1) * v, attack: 0.045, decay: 0.04, pan });\n      sound.synth({ type: \"sine\", tone: 1740 * pf, duration: 0.045, volume: rj(0.52, 0.1) * v, attack: 0.090, decay: 0.04, pan });\n      // Chirp — 2 → 7 kHz exponential sweep in 60 ms (5 stages)\n      for (let i = 0; i < 5; i++) {\n        const t = i / 4;\n        const tone = 2000 * Math.pow(3.5, t) * pf; // 2k → 7k\n        sound.synth({ type: \"sine\", tone, duration: 0.012 + 0.015,\n          volume: rj(0.50 - t * 0.08, 0.1) * v,\n          attack: 0.20 + i * 0.012 + 0.0005,\n          decay: 0.012, pan });\n      }\n      break;\n    }\n    case \"a\": {\n      // PIG OINK — Garcia et al. ventricular-fold study: F0 bounces\n      // between grunt ~93 Hz (folds engaged) and squeal ~409 Hz\n      // (folds disengaged). Classic oink = two staccato bursts, 100 ms\n      // each, 80 ms gap. Random F0 toggle mimics chaos.\n      const grunt = 93 * pf, squeal = 300 * pf;\n      // Burst 1\n      sound.synth({ type: \"sawtooth\", tone: grunt, duration: 0.09, volume: rj(0.72, 0.08) * v, attack: 0.005, decay: 0.08, pan });\n      sound.synth({ type: \"sawtooth\", tone: squeal, duration: 0.04, volume: rj(0.50, 0.08) * v, attack: 0.03, decay: 0.03, pan });\n      // Gap + burst 2\n      sound.synth({ type: \"sawtooth\", tone: grunt * 1.05, duration: 0.09, volume: rj(0.68, 0.08) * v, attack: 0.18, decay: 0.08, pan });\n      sound.synth({ type: \"sawtooth\", tone: squeal * 0.92, duration: 0.04, volume: rj(0.48, 0.08) * v, attack: 0.21, decay: 0.03, pan });\n      // Breath noise\n      sound.synth({ type: \"noise\", tone: 800 * pf, duration: 0.25, volume: rj(0.15, 0.05) * v, attack: 0.01, decay: 0.23, pan });\n      break;\n    }\n    case \"b\": {\n      // LION ROAR — Klemuk et al. PLOS ONE + Anikin et al. RSB 2025.\n      // Two coupled oscillators + forced subharmonic at F0/2 produce\n      // the characteristic chaos. F0 ~130 Hz sliding down to ~90 Hz\n      // over the roar; subharmonic layer kicks in at 40% through.\n      // Filtered noise 600-1200 Hz for breathy growl. 2-4 s total.\n      const f0a = 130 * pf, f0b = 90 * pf;\n      sound.synth({ type: \"sawtooth\", tone: f0a, duration: 2.0, volume: rj(0.75, 0.08) * v, attack: 0.20, decay: 1.5, pan });\n      sound.synth({ type: \"sawtooth\", tone: f0b, duration: 2.0, volume: rj(0.65, 0.08) * v, attack: 0.40, decay: 1.4, pan });\n      // Forced subharmonic — emerges later, gives the growl ending\n      sound.synth({ type: \"sawtooth\", tone: f0a * 0.5, duration: 1.4, volume: rj(0.40, 0.08) * v, attack: 0.80, decay: 1.2, pan });\n      // Filtered-noise breath band (600-1200 Hz approximated by\n      // band-limited noise at 900 Hz)\n      sound.synth({ type: \"noise\", tone: 900 * pf, duration: 1.8, volume: rj(0.28, 0.06) * v, attack: 0.30, decay: 1.4, pan });\n      break;\n    }\n    case \"c#\": {\n      // OWL HOOT — Cornell Lab Great Horned Owl data: near-pure sine,\n      // F0 250-350 Hz, slight 5% droop at tail. Call pattern often\n      // 4-5 hoots in 5 s; we do single hoot here (grid key = 1 hoot).\n      sound.synth({ type: \"sine\", tone: 300 * pf, duration: 0.5, volume: rj(0.72, 0.06) * v, attack: 0.10, decay: 0.35, pan });\n      sound.synth({ type: \"sine\", tone: 285 * pf, duration: 0.2, volume: rj(0.45, 0.06) * v, attack: 0.40, decay: 0.15, pan });\n      // Low body harmonic (great horned owls have faint F2 ~600 Hz)\n      sound.synth({ type: \"sine\", tone: 600 * pf, duration: 0.55, volume: rj(0.10, 0.04) * v, attack: 0.12, decay: 0.40, pan });\n      break;\n    }\n    case \"d#\": {\n      // FROG RIBBIT — Yamaguchi *Xenopus* pulse-train research +\n      // Dinacon Túngara recipe. Fast trill = 60 Hz click rate, energy\n      // 100-500 Hz. Approximated with 8 quick sawtooth bursts at\n      // 60 Hz (~17 ms spacing) + a narrow-band resonance peak at 1 kHz.\n      const base = 180 * pf;\n      for (let i = 0; i < 8; i++) {\n        sound.synth({ type: \"sawtooth\", tone: base, duration: 0.012,\n          volume: rj(0.55, 0.08) * v * (1 - i * 0.05),\n          attack: 0.001, decay: 0.010, pan });\n        // Stagger via accumulated attack — next voice starts ~17 ms later\n        const nextBase = base + (Math.random() - 0.5) * 20;\n        sound.synth({ type: \"sawtooth\", tone: nextBase, duration: 0.012,\n          volume: rj(0.50, 0.08) * v * (1 - i * 0.05),\n          attack: 0.016 * (i + 1), decay: 0.010, pan });\n      }\n      // Species-specific 1 kHz resonance (vocal sac Helmholtz)\n      sound.synth({ type: \"sine\", tone: 1000 * pf, duration: 0.25, volume: rj(0.20, 0.05) * v, attack: 0.002, decay: 0.22, pan });\n      break;\n    }\n    case \"f#\": {\n      // HORSE WHINNY — Stoeger et al. *Current Biology* 2026: whinnies\n      // are BIPHONIC — two independent non-harmonic fundamentals.\n      // Voice 1: F0 ~400 Hz, saw with 7 Hz vibrato ±15 %, descending.\n      // Voice 2: G0 ~1500 Hz, pure sine aerodynamic whistle (horse\n      // literally whistles through voice box), parallel descent.\n      // Overlap ~80%, stagger attacks by ~150 ms.\n      const f0 = 400 * pf, g0 = 1500 * pf;\n      // Voice 1 — biphonic low with vibrato (3 vibrato cycles)\n      for (let i = 0; i < 5; i++) {\n        const vibMul = (i & 1) ? 1.15 : 0.85;\n        sound.synth({ type: \"sawtooth\", tone: f0 * vibMul * (1 - i * 0.04), duration: 0.18,\n          volume: rj(0.55, 0.06) * v * (1 - i * 0.06),\n          attack: 0.05 + i * 0.14, decay: 0.15, pan });\n      }\n      // Voice 2 — high aerodynamic whistle (joins 150 ms later, descends parallel)\n      for (let i = 0; i < 4; i++) {\n        sound.synth({ type: \"sine\", tone: g0 * (1 - i * 0.08), duration: 0.22,\n          volume: rj(0.35, 0.06) * v * (1 - i * 0.10),\n          attack: 0.15 + i * 0.18, decay: 0.20, pan });\n      }\n      break;\n    }\n    case \"g#\": {\n      // SNAKE HISS — Aubret & Mangin: vipers hiss low (200-400 Hz\n      // BPF), grass/colubrid snakes hiss high (5-10 kHz). \"Cartoon\"\n      // cobra hiss combines both. Slow 0.5 Hz amplitude wobble for\n      // breath rhythm. Sustained while held.\n      const low = { type: \"noise\", tone: 300 * pf, volume: rj(0.40, 0.06) * v, attack: 0.08, decay: 0.2, pan };\n      const high = { type: \"noise\", tone: 6000 * pf, volume: rj(0.22, 0.05) * v, attack: 0.12, decay: 0.3, pan };\n      fire(low, 1.2, 1.2);\n      fire(high, 1.2, 1.2);\n      break;\n    }\n    case \"a#\": {\n      // WHALE SONG — Cazau additive-resynthesis approach: multiple\n      // sines with slow FM (1-3 Hz vibrato) + long glide 600 → 1000\n      // → 400 Hz over 4 s. Long reverb tail would help but not in\n      // this kit. Approximate with 3 sine stages tracing the glide\n      // + a lower octave drone.\n      const p1 = 600 * pf, p2 = 1000 * pf, p3 = 400 * pf;\n      sound.synth({ type: \"sine\", tone: p1, duration: 1.4, volume: rj(0.60, 0.06) * v, attack: 0.4, decay: 0.9, pan });\n      sound.synth({ type: \"sine\", tone: p2, duration: 1.4, volume: rj(0.55, 0.06) * v, attack: 1.3, decay: 0.9, pan });\n      sound.synth({ type: \"sine\", tone: p3, duration: 1.4, volume: rj(0.50, 0.06) * v, attack: 2.4, decay: 1.1, pan });\n      // Lower-octave drone for sub presence\n      sound.synth({ type: \"sine\", tone: p1 * 0.5, duration: 3.0, volume: rj(0.25, 0.05) * v, attack: 0.6, decay: 2.2, pan });\n      // Subtle 2 Hz tremolo approximated by mid-call amplitude voice\n      sound.synth({ type: \"sine\", tone: p1 * 1.01, duration: 2.5, volume: rj(0.20, 0.05) * v, attack: 1.0, decay: 1.5, pan });\n      break;\n    }\n  }\n}\n\n// === LASERS KIT ===\n// 12 sci-fi weapon/energy sounds. Classic recipes: pew = descending\n// sine/square (Atari Asteroids), blaster = saw + noise (Star Wars),\n// phaser = sine modulated by noise (Star Trek's sound was derived from\n// War of the Worlds tape feedback — see SlashFilm). Charge-up = exp\n// pitch rise; warp = fast sine sweep (Doppler).\nconst LASER_NAMES = {\n  c: \"pew\", d: \"blast\", e: \"phaser\", f: \"cannon\",\n  g: \"stun\", a: \"plasma\", b: \"disruptor\",\n  \"c#\": \"charge\", \"d#\": \"beam\",\n  \"f#\": \"hit\", \"g#\": \"ricochet\", \"a#\": \"warp\",\n};\nconst LASER_LABELS = {\n  c: \"PEW\", d: \"BLS\", e: \"PHS\", f: \"CAN\",\n  g: \"STN\", a: \"PLS\", b: \"DSR\",\n  \"c#\": \"CHG\", \"d#\": \"BEM\",\n  \"f#\": \"HIT\", \"g#\": \"RIC\", \"a#\": \"WRP\",\n};\nconst LASER_COLORS = {\n  c:    [180, 255, 140], // pew — neon green\n  d:    [255, 140, 140], // blast — red\n  e:    [180, 200, 255], // phaser — electric blue\n  f:    [255, 120,  80], // cannon — orange flame\n  g:    [200, 255, 255], // stun — pale cyan\n  a:    [220, 140, 255], // plasma — violet\n  b:    [255, 200,  80], // disruptor — gold\n  \"c#\": [100, 180, 255], // charge — deep blue\n  \"d#\": [140, 255, 200], // beam — lime\n  \"f#\": [255, 100,  60], // hit — impact red-orange\n  \"g#\": [220, 220, 180], // ricochet — metallic\n  \"a#\": [200, 120, 255], // warp — magenta\n};\nconst LASER_NOTATION = {\n  c:  [[\"s\",2500,0.6]],                     // pew\n  d:  [[\"w\",150,0.8],[\"n\",2500,0.4]],       // blast\n  e:  [[\"s\",700,0.5],[\"n\",1200,0.3]],       // phaser\n  f:  [[\"w\",500,0.7],[\"s\",55,0.9]],         // cannon\n  g:  [[\"q\",400,0.6]],                      // stun\n  a:  [[\"q\",260,0.6]],                      // plasma\n  b:  [[\"w\",520,0.6]],                      // disruptor\n  \"c#\": [[\"s\",800,0.6]],                    // charge\n  \"d#\": [[\"q\",800,0.7]],                    // beam\n  \"f#\": [[\"n\",3000,0.6],[\"s\",60,1.0]],      // hit\n  \"g#\": [[\"n\",4500,0.5]],                   // ricochet\n  \"a#\": [[\"s\",1000,0.6]],                   // warp\n};\nconst LASER_SUSTAIN = {\n  \"d#\": true, // beam — sustained hum\n};\nconst LASER_DURATION = {\n  c: 0.10, d: 0.20, e: 0.28, f: 0.25,\n  g: 0.40, a: 0.50, b: 0.35,\n  \"c#\": 0.75, \"f#\": 0.30,\n  \"g#\": 0.30, \"a#\": 0.55,\n};\nconst LASER_RELEASE = {\n  \"d#\": 0.08,\n};\n\n// Fire a laser-kit sci-fi sound. Pitch envelopes and FM-ish modulation\n// via short stacked voices with staggered attacks. `pitchFactor` scales\n// tonal voices like every other kit.\nfunction playLaser(sound, letter, volume = 1.0, pan = 0, pitchFactor = 1.0, phase = \"both\", holdVoices = null) {\n  if (!sound?.synth) return;\n  if (phase === \"up\") return;\n  const v = Math.max(0.1, Math.min(2.2, volume));\n  const pf = Math.max(0.25, Math.min(4, pitchFactor));\n  const isLive = phase === \"down\" && Array.isArray(holdVoices);\n  const rj = (c, f) => c * (1 + (Math.random() - 0.5) * 2 * f);\n  const fire = (params, dur) => {\n    if (isLive && LASER_SUSTAIN[letter]) {\n      const h = sound.synth({ ...params, duration: Infinity });\n      if (h) holdVoices.push({ handle: h, releaseFade: LASER_RELEASE[letter] ?? 0.08 });\n    } else {\n      sound.synth({ ...params, duration: dur });\n    }\n  };\n  switch (letter) {\n    case \"c\": {\n      // PEW (Asteroids) — 555 astable recipe: square wave with\n      // simultaneous pitch + amplitude decay τ≈30 ms, start ~1000 Hz,\n      // end ~200 Hz. sfxr's laserShoot uses the same shape. 4 stages\n      // approximate the exp decay.\n      for (let i = 0; i < 4; i++) {\n        const t = i / 3;\n        const tone = 1000 * Math.exp(-t * 1.6) * pf; // 1000 → 200 Hz\n        sound.synth({ type: \"square\", tone, duration: 0.035,\n          volume: rj(0.70 * Math.exp(-t * 1.3), 0.08) * v,\n          attack: 0.0005 + t * 0.028, decay: 0.032, pan });\n      }\n      break;\n    }\n    case \"d\": {\n      // BLAST (Star Wars) — Ben Burtt guy-wire recording. The trick is\n      // dispersive delay: high frequencies arrive first, then body.\n      // Voice 1: square ping sweeping 3000 → 800 Hz in ~40 ms (metallic).\n      // Voice 2: BPF-noise at ~500 Hz Q=3 (body punch), 30 ms. Voice 3:\n      // comb-style repeated short pings (poor man's flanger) give the\n      // \"peee-uuu\" after-glow.\n      sound.synth({ type: \"square\", tone: 3000 * pf, duration: 0.012, volume: rj(0.70, 0.08) * v, attack: 0.001, decay: 0.011, pan });\n      sound.synth({ type: \"square\", tone: 1600 * pf, duration: 0.018, volume: rj(0.60, 0.08) * v, attack: 0.008, decay: 0.016, pan });\n      sound.synth({ type: \"square\", tone: 800 * pf,  duration: 0.050, volume: rj(0.55, 0.08) * v, attack: 0.022, decay: 0.045, pan });\n      // Body punch — narrow-band noise around 500 Hz\n      sound.synth({ type: \"noise\", tone: 500 * pf, duration: 0.04, volume: rj(0.40, 0.08) * v, attack: 0.003, decay: 0.035, pan });\n      // \"Comb filter\" trailing ping — single echo at 8 ms\n      sound.synth({ type: \"square\", tone: 1200 * pf, duration: 0.03, volume: rj(0.25, 0.06) * v, attack: 0.060, decay: 0.025, pan });\n      break;\n    }\n    case \"e\": {\n      // PHASER (Star Trek) — War-of-the-Worlds therem kitLabelsFor(kit) {\n  if (isWarKit(kit)) return WAR_LABELS;\n  if (kit === \"perc\") return PERCUSSION_LABELS;\n  if (kit === \"zoo\") return ZOO_LABELS;\n  if (kit === \"lasers\") return LASER_LABELS;\n  return null;\n}\nfunction kitColorsFor(kit) {\n  if (isWarKit(kit)) return WAR_COLORS;\n  if (kit === \"perc\") return PERCUSSION_COLORS;\n  if (kit === \"zoo\") return ZOO_COLORS;\n  if (kit === \"lasers\") return LASER_COLORS;\n  return null;\n}\nfunction kitNotationFor(kit) {\n  if (isWarKit(kit)) return WAR_NOTATION;\n  if (kit === \"perc\") return PERCUSSION_NOTATION;\n  if (kit === \"zoo\") return ZOO_NOTATION;\n  if (kit === \"lasers\") return LASER_NOTATION;\n  return null;\n}\n\n// Cycle the kit state for a side: off → perc → warA → warB → zoo → lasers → off.\n// warA = preset-default model per weapon (mostly classic); warB forces\n// physical/DWG synthesis for direct A/B comparison; zoo + lasers are\n// sound-design sketches grounded in classic subtractive synthesis\n// recipes (animal calls, sci-fi phasers/blasters/warps).\nfunction cycleKit(side) {\n  const cur = side === \"left\" ? kitLeft : kitRight;\n  const next = cur === \"off\"    ? \"perc\"\n             : cur === \"perc\"   ? \"warA\"\n             : cur === \"warA\"   ? \"warB\"\n             : cur === \"warB\"   ? \"zoo\"\n             : cur === \"zoo\"    ? \"lasers\"\n             : \"off\";\n  if (side === \"left\") kitLeft = next; else kitRight = next;\n  return next;\n}\n\n// Return drum/weapon name if the given (letter, grid offset) is a live\n// kit pad, else null. offset 0 = left grid, 1 = right grid. Low/high\n// extras (z, x, ;, ', ]) stay melodic.\nfunction percussionDrumFor(letter, offset) {\n  const info = kitDrumFor(letter, offset);\n  return info ? info.name : null;\n}\n// Richer version that also returns which kit is active, so callers can\n// route to the right synth (playPercussion vs playWar).\nfunction kitDrumFor(letter, offset) {\n  const kit = activeKitForOffset(offset);\n  if (kit === \"off\") return null;\n  const names = kitNamesFor(kit);\n  if (!names || !names[letter]) return null;\n  return { kit, name: names[letter] };\n}\n\n// === DRUM PAN: QWERTY physical key position ===\n// Pan each drum hit by where the key actually lives on the keyboard so\n// your fingers and the stereo field line up. Left-side keys (q/a/z/c)\n// pan hard left, right-side keys (p/;/m) pan hard right, middle keys\n// (t/g/b) stay centered. This beats kit-geometry pan (kick-center,\n// ride-right, crash-left) because it matches the physical gesture of\n// playing — you don't have to think about \"which drum is this\", the\n// pan just follows your hand.\n//\n// Values computed from QWERTY column (col - 4.5) / 4.5 * 0.9 across\n// three rows. Only drum keys included (c/d/e/f/g/a/b naturals + sharps\n// on both grids). Non-drum keys fall through to the fallback below.\nconst KEY_QWERTY_PAN = {\n  // Row 0 (qwerty top row): q w e r t y u i o p\n  q: -0.9, w: -0.7, e: -0.5, r: -0.3, t: -0.1,\n  y:  0.1, u:  0.3, i:  0.5, o:  0.7, p:  0.9,\n  // Row 1 (asdf home row): a s d f g h j k l\n  a: -0.9, s: -0.7, d: -0.5, f: -0.3, g: -0.1,\n  h:  0.1, j:  0.3, k:  0.5, l:  0.7,\n  // Row 2 (zxcv bottom row): c v b n m\n  c: -0.5, v: -0.3, b: -0.1, n:  0.1, m:  0.3,\n};\n\nfunction drumPanFor(letter, gridOffset, key) {\n  // Primary: QWERTY physical column position. This is what the user sees\n  // and feels — the pan matches where their hand is.\n  if (key && KEY_QWERTY_PAN[key] !== undefined) {\n    return KEY_QWERTY_PAN[key];\n  }\n  // Fallback: grid-side bias (used by reverse playback where we don't\n  // have the original key, only the letter + gridOffset).\n  const gridBias = gridOffset === 1 ? 0.32 : -0.32;\n  return Math.max(-0.9, Math.min(0.9, gridBias));\n}\n\n// Push a drum flash entry so paint() will pulse the background in that\n// drum/weapon's characteristic color. Called from every kit trigger site\n// (keyboard act(), touch-tap, drag-rollover, reverse-playback replay).\nfunction flashDrum(letter, kit = \"perc\") {\n  const table = isWarKit(kit) ? WAR_COLORS : PERCUSSION_COLORS;\n  const color = table[letter] || [200, 200, 200];\n  drumFlashes.push({ color, frame, life: DRUM_FLASH_LIFE });\n  if (drumFlashes.length > 8) drumFlashes.shift();\n}\n\nfunction makePercussionHold(letter, volume, pan, pitchFactor, voices = [], gridOffset = 0, baseVolume = volume) {\n  return {\n    letter, volume, pan, pitchFactor, voices, gridOffset, baseVolume,\n    lastAppliedPitchFactor: pitchFactor,\n    lastAppliedVolume: volume,\n    ringUntil: 0,\n  };\n}\n\nfunction rememberRingingPercussionHold(hold, seconds) {\n  if (!hold || !(seconds > 0)) return;\n  const until = Date.now() + (seconds * 1000) + 80;\n  hold.ringUntil = Math.max(hold.ringUntil || 0, until);\n  if (!ringingPercussionHolds.includes(hold)) ringingPercussionHolds.push(hold);\n}\n\nfunction rememberPercussionHoldFromVoices(hold) {\n  if (!hold?.voices?.length) return;\n  let maxSeconds = 0;\n  for (const entry of hold.voices) {\n    maxSeconds = Math.max(maxSeconds, entry?.tailSeconds || 0);\n  }\n  rememberRingingPercussionHold(hold, maxSeconds);\n}\n\nfunction rememberPercussionReleaseTail(hold) {\n  if (!hold?.voices?.length) return;\n  let maxSeconds = 0;\n  for (const entry of hold.voices) {\n    if (entry?.handle && !entry?.ignoreRelease) {\n      maxSeconds = Math.max(maxSeconds, entry.releaseFade ?? 0.08);\n    }\n  }\n  rememberRingingPercussionHold(hold, maxSeconds);\n}\n\n// Release any held drum voices with their per-voice release fade. Each\n// entry is { handle, releaseFade, releaseUpdate?, onRelease? }.\n// - onRelease fires a standalone \"release burst\" synth call (e.g. the\n//   subtle closed-hat lift click) before any update/kill runs.\n// - releaseUpdate shifts the voice's tone/volume before the final fade\n//   (the \"hi-hat pedal closing\" brightness dampening effect).\n// - sound.kill() with the voice's fade time does the final ramp-out. rame;\n    systemAPI?.mountMusic?.();\n  }\n  if (nowMounted && !djUsbConnected) {\n    djUsbConnected = true; djMounted = true;\n    sound?.speak?.(\"USB dj on\");\n    djScan(systemAPI, null);\n    if (djFiles.length > 0) { djTrackIdx = 0; djLoadTrack(sound); }\n  } else if (!nowMounted && djUsbConnected && !mountPending) {\n    djUsbConnected = false;\n    const dk = sound?.deck;\n    if (dk?.decks?.[0]?.playing) dk.pause(0);\n    djFiles = [];\n    sound?.speak?.(\"USB dj off\");\n    djMsg(\"USB removed\");\n  }\n  // Auto-advance when the current track finishes\n  const __dkD = sound?.deck?.decks?.[0];\n  if (__dkD?.loaded && !__dkD.playing && __dkD.duration > 0 && __dkD.position >= __dkD.duration - 0.1 && !djDragging) {\n    djTrackIdx++;\n    djLoadTrack(sound);\n  }\n  // Spin the little deck indicator even when nothing else is happening\n  if (__dkD?.playing && !djDragging) djAngle += (__dkD.speed || 1) * 0.05;\n\n  // Continuously update synth volumes from analog key pressure AND from\n  // the current per-side master volume so dragging the L/R master sliders\n  // live-adjusts sustained notes on that side.\n  //\n  // Pop mitigation: raw NuPhy pressure samples can jump between polls\n  // (HE keyboards sample at driver-specific rates and report discrete\n  // ADC steps). Writing those jumps straight to synth.update() caused\n  // audible clicks on sustained tones like `sine`. Instead we:\n  //\n  //   1. Capture velocity ONCE at key-down (entry.velocity) — sets the\n  //      note's baseline loudness based on press impact.\n  //   2. Smooth the pressure-to-volume mapping with a one-pole lowpass\n  //      (α ≈ 0.2, ~80ms time constant) so per-frame jumps glide\n  //      instead of snapping. Keeps the expressive wobble that real\n  //      pressure-sensitive play needs, drops the pops.\n  //   3. Blend: `vol = 0.55·velocity + 0.45·smoothed_pressure` — the\n  //      initial hit energy dominates, live pressure just modulates.\n  //   4. Only push synth.up // unity\n  soundAPI?.drive?.setMix?.(0);  // clean\n  soundAPI?.wobble?.setMix?.(0); // clean\n  stopAllSounds(soundAPI, systemAPI, 0.02);\n}\n\nexport { boot, act, paint, sim, leave };\n";
    const INLINE_MODULES = [{"importPath":"/lib/percussion.mjs","source":"// Percussion synth kit — shared between web notepat and native notepat.\n// Exports the 12-drum layout, display labels, pad colors, and a pure\n// `playPercussion(sound, letter, opts)` that fires the layered voices\n// for a single drum on the supplied AC sound API.\n//\n// Natural notes = 7 core drums (kick/snare/clap/snap/hat-c/hat-o/ride).\n// Sharps = 5 accents (crash/splash/cowbell/block/tambo).\n//\n// The native kit layered a voice-inspector and hold-release machinery on\n// top of this; both are kept callback-based here so the module itself has\n// no persistent state and works identically on web + native.\n\n// TR-808 hi-hat 6-square inharmonic cluster (trimmed to 4 for clarity).\nexport const HAT_FREQS = [800, 540, 522.7, 369.6];\n\nexport const PERCUSSION_NAMES = {\n  c: \"kick\", d: \"snare\", e: \"clap\", f: \"snap\",\n  g: \"hat-c\", a: \"hat-o\", b: \"ride\",\n  \"c#\": \"crash\", \"d#\": \"splash\",\n  \"f#\": \"cowbell\", \"g#\": \"block\", \"a#\": \"tambo\",\n};\n\n// 3-char display labels shown on drum pads in place of note names.\nexport const PERCUSSION_LABELS = {\n  c: \"BAS\", d: \"SNR\", e: \"CLP\", f: \"SNP\",\n  g: \"HHC\", a: \"HHO\", b: \"RDE\",\n  \"c#\": \"CRS\", \"d#\": \"SPL\",\n  \"f#\": \"CBL\", \"g#\": \"BLK\", \"a#\": \"TMB\",\n};\n\n// Metallic / earthy colors to visually distinguish drum pads from keys.\nexport const PERCUSSION_COLORS = {\n  c: [220, 90, 40],      // kick — deep orange\n  d: [220, 180, 110],    // snare — tan\n  e: [240, 220, 130],    // clap — pale yellow\n  f: [220, 240, 140],    // snap — yellow-green\n  g: [120, 220, 180],    // closed hat — mint\n  a: [120, 200, 240],    // open hat — cyan\n  b: [180, 180, 230],    // ride — silver-blue\n  \"c#\": [220, 150, 240], // crash — lavender\n  \"d#\": [240, 160, 220], // splash — pink\n  \"f#\": [200, 150, 80],  // cowbell — brass\n  \"g#\": [190, 120, 70],  // block — wood brown\n  \"a#\": [230, 210, 170], // tambourine — sandy\n};\n\n// Graphic-notation voice signatures for the pad-idle animation renderer.\n// t: \"s\"=sine \"t\"=triangle \"q\"=square \"w\"=sawtooth \"n\"=noise\n// Format per voice: [type, freq, volume]. Consumed by drawGrid() in each\n// notepat implementation.\nexport const PERCUSSION_NOTATION = {\n  c:  [[\"t\",1800,1.0],[\"n\",4000,0.55],[\"q\",180,1.2],[\"w\",90,1.0],[\"s\",44,1.9],[\"s\",54,1.3],[\"q\",120,0.85]],\n  d:  [[\"n\",2200,0.55],[\"t\",220,0.4],[\"q\",180,0.2]],\n  e:  [[\"q\",2500,0.9],[\"n\",6000,0.6],[\"n\",1600,0.75],[\"n\",1700,0.6],[\"n\",1500,0.5],[\"n\",1800,0.45]],\n  f:  [[\"n\",3200,0.45],[\"q\",1800,0.22],[\"t\",2400,0.18]],\n  g:  [[\"n\",7000,0.35],[\"n\",5000,0.2]],\n  a:  [[\"n\",6500,0.3],[\"n\",4800,0.18]],\n  b:  [[\"n\",4200,0.28],[\"q\",3100,0.1],[\"q\",4600,0.08]],\n  \"c#\": [[\"n\",3500,0.42],[\"n\",6500,0.28],[\"q\",4200,0.08]],\n  \"d#\": [[\"n\",5500,0.38],[\"n\",8500,0.25]],\n  \"f#\": [[\"q\",810,0.22],[\"q\",540,0.18]],\n  \"g#\": [[\"t\",900,0.35],[\"q\",1800,0.14]],\n  \"a#\": [[\"n\",7000,0.3],[\"n\",4500,0.18],[\"q\",6500,0.1]],\n};\n\n// Wave type → accent color for the notation glyph.\nexport const NOTATION_WAVE_RGB = {\n  s: [120, 200, 255],   // sine      — sky blue\n  t: [120, 255, 180],   // triangle  — mint\n  q: [255, 220, 120],   // square    — amber\n  w: [255, 140, 80],    // sawtooth  — orange\n  n: [220, 220, 230],   // noise     — pale grey\n};\n\n// Fire the layered voices for a single drum. Pure function — no\n// persistent state and no module-level side effects.\n//\n// Params:\n//   sound        AC sound API (needs .synth).\n//   letter       \"c\" | \"d\" | ... | \"a#\". Unknown letters are ignored.\n//   opts:\n//     volume        master volume scalar (0.1–2.2 clamped). Default 1.0.\n//     pan           stereo pan (−1..1). Default 0.\n//     pitchFactor   tone multiplier for transpose (0.25–4 clamped). Default 1.\n//     phase         \"down\" (live key press, sustains go into holdVoices),\n//                   \"up\"   (legacy release — ignored), or\n//                   \"both\" (self-contained one-shot, sustains play finite).\n//                   Default \"both\".\n//     holdVoices    array to receive live-sustain voice records. If absent\n//                   or phase !== \"down\", sustains fire as finite durations.\n//     onVoice       optional callback(voiceDesc) called once per voice\n//                   fired, for inspector/debug overlays. `voiceDesc` has\n//                   { type, tone, duration, volume, attack, decay, pan, kind }\n//                   where kind is \"hit\" or \"sustain\".\nexport function playPercussion(sound, letter, opts = {}) {\n  if (!sound?.synth) return;\n  const {\n    volume = 1.0,\n    pan = 0,\n    pitchFactor = 1.0,\n    phase = \"both\",\n    holdVoices = null,\n    onVoice = null,\n  } = opts;\n\n  const v = Math.max(0.1, Math.min(2.2, volume));\n  const pf = Math.max(0.25, Math.min(4, pitchFactor));\n\n  const fireDown = phase !== \"up\";\n  const isLive = phase === \"down\" && Array.isArray(holdVoices);\n  if (!fireDown) return;\n\n  // Per-hit random helpers (inline, stateless). `rj` jitters around a center\n  // by a ± fraction; `rn` returns a uniform range.\n  const rj = (center, frac) => center * (1 + (Math.random() - 0.5) * 2 * frac);\n  const rn = (min, max) => min + Math.random() * (max - min);\n\n  const inspect = (params, kind) => {\n    if (!onVoice) return;\n    onVoice({\n      type: params?.type,\n      tone: params?.tone,\n      duration: params?.duration,\n      volume: params?.volume,\n      attack: params?.attack,\n      decay: params?.decay,\n      pan: params?.pan,\n      kind,\n    });\n  };\n\n  const addSustain = (params, bothDuration, releaseFade, releaseUpdate, onRelease) => {\n    inspect({ ...params, duration: bothDuration }, \"sustain\");\n    if (isLive) {\n      const handle = sound.synth({ ...params, duration: Infinity });\n      if (handle) {\n        const liveEntry = { handle, releaseFade, releaseUpdate, onRelease };\n        if (params?.tone !== undefined) liveEntry.baseTone = params.tone / pf;\n        if (params?.volume !== undefined) liveEntry.baseVolumeUnit = params.volume / v;\n        if (params?.base !== undefined) liveEntry.sampleBase = params.base;\n        if (releaseUpdate?.tone !== undefined) liveEntry.releaseBaseTone = releaseUpdate.tone / pf;\n        if (releaseUpdate?.volume !== undefined) liveEntry.releaseBaseVolumeUnit = releaseUpdate.volume / v;\n        holdVoices.push(liveEntry);\n      }\n      return handle;\n    }\n    return sound.synth({ ...params, duration: bothDuration });\n  };\n\n  const addHit = (params) => {\n    inspect(params, \"hit\");\n    const handle = sound.synth(params);\n    if (isLive && handle) {\n      const liveEntry = {\n        handle,\n        ignoreRelease: true,\n        releaseFade: 0,\n        tailSeconds: Math.max(\n          Number(params?.duration) || 0,\n          (Number(params?.attack) || 0) + (Number(params?.decay) || 0),\n        ),\n      };\n      if (params?.tone !== undefined) liveEntry.baseTone = params.tone / pf;\n      if (params?.volume !== undefined) liveEntry.baseVolumeUnit = params.volume / v;\n      if (params?.base !== undefined) liveEntry.sampleBase = params.base;\n      holdVoices.push(liveEntry);\n    }\n    return handle;\n  };\n\n  const addReleaseBurst = (onRelease) => {\n    if (isLive && onRelease) holdVoices.push({ handle: null, releaseFade: 0, onRelease });\n  };\n\n  switch (letter) {\n    // === ONE-SHOT DRUMS (c/d/e/f/g) ===\n    case \"c\": { // kick — tight TR-808: transient + short body + optional sub\n      const downPan = pan + rn(-0.02, 0.02);\n      addHit({ type: \"noise\", tone: 2500 * pf, duration: 0.0025, volume: rj(0.50, 0.12) * v, attack: 0.0002, decay: 0.0022, pan: downPan });\n      addHit({ type: \"sine\", tone: 200 * pf, duration: 0.012, volume: rj(1.1, 0.10) * v, attack: 0.0005, decay: 0.011, pan: downPan });\n      addHit({ type: \"sine\", tone: 150 * pf, duration: 0.045, volume: rj(1.3, 0.10) * v, attack: 0.001, decay: 0.044, pan: downPan });\n      addHit({ type: \"sine\", tone: 90 * pf, duration: 0.080, volume: rj(0.85, 0.12) * v, attack: 0.002, decay: 0.078, pan: downPan });\n      addHit({ type: \"sine\", tone: 55 * pf, duration: rj(0.35, 0.20), volume: rj(1.0, 0.12) * v, attack: 0.003, decay: 0.345, pan: downPan });\n      break;\n    }\n\n    case \"d\": { // snare — TR-909-leaning: big transient + short tone + dominant noise\n      const downPan = pan + rn(-0.02, 0.02);\n      addHit({ type: \"noise\", tone: 3500 * pf, duration: 0.004, volume: rj(0.95, 0.10) * v, attack: 0.0001, decay: 0.004, pan: downPan });\n      addHit({ type: \"sine\", tone: 238 * pf, duration: 0.030, volume: rj(0.35, 0.12) * v, attack: 0.0003, decay: 0.029, pan: downPan });\n      addHit({ type: \"sine\", tone: 476 * pf, duration: 0.030, volume: rj(0.28, 0.12) * v, attack: 0.0003, decay: 0.029, pan: downPan });\n      addHit({ type: \"noise\", tone: 3500 * pf, duration: rj(0.11, 0.20), volume: rj(0.85, 0.10) * v, attack: 0.0005, decay: 0.108, pan: downPan + rn(-0.04, 0.04) });\n      addHit({ type: \"noise\", tone: 1800 * pf, duration: rj(0.07, 0.20), volume: rj(0.38, 0.15) * v, attack: 0.0008, decay: 0.068, pan: downPan + rn(-0.04, 0.04) });\n      addHit({ type: \"triangle\", tone: 180 * pf, duration: 0.025, volume: rj(0.22, 0.15) * v, attack: 0.001, decay: 0.024, pan: downPan });\n      break;\n    }\n\n    case \"e\": { // clap — TR-808 4-burst pattern via staggered attacks (one-shot)\n      const downPan = pan + rn(-0.06, 0.02);\n      addHit({ type: \"noise\", tone: 1000 * pf, duration: 0.025, volume: rj(0.90, 0.15) * v, attack: 0.005, decay: 0.020, pan: downPan });\n      addHit({ type: \"noise\", tone: 1100 * pf, duration: 0.035, volume: rj(0.95, 0.15) * v, attack: 0.015, decay: 0.020, pan: downPan });\n      addHit({ type: \"noise\", tone: 900 * pf,  duration: 0.045, volume: rj(0.85, 0.15) * v, attack: 0.025, decay: 0.020, pan: downPan });\n      addHit({ type: \"noise\", tone: 3000 * pf, duration: 0.008, volume: rj(0.55, 0.15) * v, attack: 0.001, decay: 0.007, pan: downPan });\n      addHit({ type: \"noise\", tone: 1000 * pf, duration: rj(0.14, 0.25), volume: rj(0.85, 0.15) * v, attack: 0.045, decay: 0.135, pan: downPan + rn(-0.02, 0.10) });\n      addHit({ type: \"noise\", tone: 2200 * pf, duration: rj(0.10, 0.25), volume: rj(0.35, 0.18) * v, attack: 0.050, decay: 0.095, pan: downPan + rn(-0.02, 0.10) });\n      break;\n    }\n\n    case \"f\": { // snap — finger snap physics (one-shot)\n      const downPan = pan + rn(-0.04, 0.04);\n      addHit({ type: \"noise\", tone: 6000 * pf, duration: 0.003, volume: rj(0.70, 0.15) * v, attack: 0.0001, decay: 0.0028, pan: downPan });\n      addHit({ type: \"sine\", tone: 2100 * pf, duration: rj(0.045, 0.20), volume: rj(0.55, 0.12) * v, attack: 0.0005, decay: 0.044, pan: downPan });\n      addHit({ type: \"sine\", tone: 3500 * pf, duration: rj(0.020, 0.25), volume: rj(0.28, 0.18) * v, attack: 0.0005, decay: 0.019, pan: downPan });\n      break;\n    }\n\n    case \"g\": { // closed hi-hat — 4-square cluster + subtle lift click on release\n      const downPan = pan + rn(-0.03, 0.03);\n      for (const f of HAT_FREQS) {\n        addHit({ type: \"square\", tone: f * pf, duration: rj(0.008, 0.20), volume: rj(0.18, 0.18) * v, attack: 0.0005, decay: 0.0075, pan: downPan });\n      }\n      addHit({ type: \"noise\", tone: 8000 * pf, duration: rj(0.040, 0.20), volume: rj(0.38, 0.12) * v, attack: 0.0005, decay: 0.038, pan: downPan });\n      addReleaseBurst(() => {\n        sound.synth({ type: \"noise\", tone: 9000 * pf, duration: 0.004, volume: rj(0.22, 0.20) * v, attack: 0.0002, decay: 0.0038, pan: downPan });\n        sound.synth({ type: \"square\", tone: 6000 * pf, duration: 0.003, volume: rj(0.08, 0.25) * v, attack: 0.0003, decay: 0.0027, pan: downPan });\n      });\n      break;\n    }\n\n    case \"a\": { // open hi-hat — TR-808 cluster, LONG sustain. Foot-pedal release = damp fast.\n      const downPan = pan + rn(-0.04, 0.04);\n      for (const f of HAT_FREQS) {\n        addHit({ type: \"square\", tone: f * pf, duration: 0.012, volume: rj(0.16, 0.18) * v, attack: 0.0005, decay: 0.011, pan: downPan });\n      }\n      addHit({ type: \"noise\", tone: 8200 * pf, duration: 0.012, volume: rj(0.42, 0.12) * v, attack: 0.0003, decay: 0.011, pan: downPan });\n      addSustain(\n        { type: \"noise\", tone: 7000 * pf, volume: rj(0.32, 0.15) * v, attack: 0.003, decay: 0, pan: downPan + rn(-0.02, 0.08) },\n        rj(0.40, 0.25),\n        0.12,\n        { tone: 3500 },\n      );\n      addSustain(\n        { type: \"noise\", tone: 5000 * pf, volume: rj(0.20, 0.18) * v, attack: 0.003, decay: 0, pan: downPan + rn(-0.02, 0.08) },\n        rj(0.25, 0.25),\n        0.10,\n        { tone: 2800 },\n      );\n      addSustain(\n        { type: \"square\", tone: 800 * pf, volume: rj(0.08, 0.20) * v, attack: 0.005, decay: 0, pan: downPan },\n        rj(0.20, 0.25),\n        0.08,\n      );\n      break;\n    }\n\n    case \"b\": { // ride — bell ping + long shimmer sustain\n      const downPan = pan + rn(-0.03, 0.03);\n      addHit({ type: \"square\", tone: 800 * pf, duration: 0.020, volume: rj(0.10, 0.18) * v, attack: 0.0005, decay: 0.019, pan: downPan });\n      addHit({ type: \"square\", tone: 540 * pf, duration: 0.020, volume: rj(0.08, 0.18) * v, attack: 0.0005, decay: 0.019, pan: downPan });\n      addSustain(\n        { type: \"sine\", tone: 440 * pf, volume: rj(0.24, 0.12) * v, attack: 0.0008, decay: 0, pan: downPan },\n        rj(0.40, 0.20),\n        0.25,\n      );\n      addSustain(\n        { type: \"sine\", tone: 587 * pf, volume: rj(0.20, 0.12) * v, attack: 0.0008, decay: 0, pan: downPan },\n        rj(0.40, 0.20),\n        0.25,\n      );\n      addSustain(\n        { type: \"noise\", tone: 4200 * pf, volume: rj(0.26, 0.12) * v, attack: 0.005, decay: 0, pan: downPan + rn(-0.03, 0.03) },\n        rj(0.9, 0.20),\n        0.30,\n      );\n      break;\n    }\n\n    case \"c#\": { // crash — explosive noise attack + LONG shimmer wash\n      const downPan = pan + rn(-0.05, 0.05);\n      addHit({ type: \"noise\", tone: 8000 * pf, duration: 0.030, volume: rj(0.75, 0.15) * v, attack: 0.0005, decay: 0.029, pan: downPan });\n      for (const f of HAT_FREQS) {\n        addHit({ type: \"square\", tone: f * pf, duration: 0.030, volume: rj(0.12, 0.20) * v, attack: 0.0005, decay: 0.029, pan: downPan });\n      }\n      addSustain(\n        { type: \"noise\", tone: 5000 * pf, volume: rj(0.45, 0.12) * v, attack: 0.008, decay: 0, pan: downPan + rn(-0.04, 0.04) },\n        rj(1.4, 0.18),\n        0.45,\n      );\n      addSustain(\n        { type: \"noise\", tone: 7500 * pf, volume: rj(0.30, 0.15) * v, attack: 0.008, decay: 0, pan: downPan + rn(-0.04, 0.04) },\n        rj(0.9, 0.18),\n        0.35,\n      );\n      addSustain(\n        { type: \"square\", tone: 800 * pf, volume: rj(0.08, 0.20) * v, attack: 0.008, decay: 0, pan: downPan },\n        rj(0.5, 0.20),\n        0.20,\n      );\n      break;\n    }\n\n    case \"d#\": { // splash — short bright cymbal burst (one-shot)\n      const downPan = pan + rn(-0.04, 0.04);\n      addHit({ type: \"noise\", tone: 9000 * pf, duration: 0.012, volume: rj(0.55, 0.15) * v, attack: 0.0003, decay: 0.011, pan: downPan });\n      addHit({ type: \"square\", tone: 800 * pf, duration: 0.015, volume: rj(0.14, 0.20) * v, attack: 0.0005, decay: 0.014, pan: downPan });\n      addHit({ type: \"square\", tone: 540 * pf, duration: 0.015, volume: rj(0.10, 0.20) * v, attack: 0.0005, decay: 0.014, pan: downPan });\n      addHit({ type: \"noise\", tone: 6000 * pf, duration: rj(0.35, 0.20), volume: rj(0.42, 0.12) * v, attack: 0.004, decay: 0.345, pan: downPan + rn(-0.03, 0.03) });\n      addHit({ type: \"noise\", tone: 8500 * pf, duration: rj(0.22, 0.20), volume: rj(0.25, 0.15) * v, attack: 0.004, decay: 0.215,       if (key === "ArrowDown") return "arrowdown";
      if (key === "Home") return "home";
      if (key === "End") return "end";

    function makeKeyEvent(type, key) {
      return { key, type, is(match) { return type === match; } };
    }

    function makePointerEvent(type, x, y, pointerId, pressure) {

        x, y,
        pointer: { x, y, id: pointerId, pressure },
        pressure,
        is(match) { return type === match; }

    // ---------- raster + canvas-overlay drawing ----------
    let currentInk = [255, 255, 255, 255];

      if (ry < 0) { rh += ry; ry = 0; }

    // Mirrors ac-native's font.c: 6x10 is fixed-grid, matrix-chunky8 has
    // per-glyph w/h/xoff/yoff/dwidth and uses ascent for vertical alignment.
    // Lit pixels go straight to the WASM framebuffer via fill_rect.
    function drawBitmapText(text, x, y, scale, fontKey) {
      const font = FONT_TABLES[fontKey] || FONT_TABLES["6x10"];
      if (!font) return;
      const fixed = font.kind === "fixed";
      const ascent = font.ascent | 0;
      const startX = x;
      let cx = x;
      let cy = y;
      for (let i = 0; i < text.length; i++) {
        const code = text.charCodeAt(i);
        if (code === 10) { // 

          cx = startX;
          cy += (fixed ? 10 : ascent) * scale;
          continue;
        }
        let cp = (code >= 32 && code <= 126) ? code : 63; // '?'
        const glyph = font.glyphs[cp - 32] || font.glyphs[63 - 32];
        if (!glyph) continue;
        const gw = glyph.w | 0, gh = glyph.h | 0;
        const advance = (glyph.dwidth || gw + 1) * scale;
        // Vertical placement: matrix glyphs use baseline math; 6x10 plots from top-left.
        const gx = cx + (fixed ? 0 : (glyph.xoff | 0) * scale);
        const gy = cy + (fixed ? 0 : (ascent - (glyph.yoff | 0) - gh) * scale);
        const rows = glyph.rows;
        for (let row = 0; row < gh; row++) {
          const bits = rows[row] | 0;
          if (!bits) continue;
          for (let col = 0; col < gw; col++) {
            if (bits & (0x80 >> col)) {
              const px = gx + col * scale;
              const py = gy + row * scale;
              if (px + scale <= 0 || py + scale <= 0 || px >= WIDTH || py >= HEIGHT) continue;
              wasm.fill_rect(px, py, scale, scale);

    function rasterBox(x, y, w, h, filled = true) {

      wasm.fill_rect(rect[0], rect[1], rect[2], 1);
      wasm.fill_rect(rect[0], rect[1] + rect[3] - 1, rect[2], 1);

    const hostApi = {
      wipe(r, g, b, a = 255) {
        if (typeof r === "object" && r !== null) {
          // wipe([r,g,b]) form

      ink(r, g, b, a = 255) {

        });

      write(text, options = {}) {

        const fontKey = (requested === "matrix" || requested === "matrixchunky8")

        drawBitmapText(String(text),
                       Math.trunc(options.x ?? 0),
                       Math.trunc(options.y ?? 0),
                       Math.max(1, options.size | 0 || 1),

      screen: { width: WIDTH, height: HEIGHT },
      paintCount: 0,
      wifi,
      sound: makeSound(),
      trackpad: { dx: 0, dy: 0 },
      pressures: {}

    // ---------- Web Audio (AudioWorklet path) ----------
    // The audio backend is the same speaker-bundled.mjs that ac-web's
    // bios.mjs loads — registered as an "speaker-processor" AudioWorklet.
    // Voices live INSIDE the worklet, so synth() / kill() / replay /
    // sample / room / glitch / volume are all postMessages. This gives us
    // the real harp (Karplus-Strong) and whistle (Cook/STK waveguide)
    // models, plus room reverb and glitch bitcrush, identical to the web
    // runtime. Browsers require a user gesture to start audio — we create
    // the AudioContext on the first pointerdown/keydown and resume() it
    // there. addModule() is async; messages sent before it resolves are
    // queued and flushed once the worklet is ready.
    let audioCtx = null;
    let speakerWorklet = null;
    let outputGain = null;       // post-worklet master volume → destination
    let workletReady = false;
    let workletLoading = false;
    const pendingWorkletMsgs = [];
    function postWorklet(msg) {
      if (workletReady && speakerWorklet) {
        speakerWorklet.port.postMessage(msg);
      } else {
        pendingWorkletMsgs.push(msg);
      }
    }
    // Drive/wobble FX intensity — kept in state so the slider feels
    // responsive, but the worklet doesn't have these (matches ac-web).
    const fxState = { drive: 0, bitcrush: 0, wobble: 0, echo: 0, master: 1 };
    let pendingMasterVolume = 0.6;

    // Master-output ring buffer — captures the last RECENT_BUFFER_SECONDS
    // of mixed audio so speaker.getRecentBuffer() and speaker.drawStrip()
    // can read it. Filled by a ScriptProcessorNode tapped off outputGain.
    const RECENT_BUFFER_SECONDS = 12;
    let recentBuf = null;
    let recentHead = 0;
    let recentFilled = 0;

    // Voice ID generator — must be BigInt because the inlined Synth class
    // does Number(id) * 2654435761 style arithmetic on it for whistle seed.
    let nextSoundId = 0n;
    function makeId() { const id = nextSoundId; nextSoundId += 1n; return id; }

    function applyFx() {
      // The speaker worklet has room (echo) + glitch (bitcrush) + volume.
      // drive/wobble don't exist there (matches ac-web).
      const echoMix = fxState.echo * fxState.master;
      postWorklet({
        type: "room:set",
        data: { enabled: echoMix > 0.001, mix: echoMix, feedback: 0.6 }
      });
      const crushMix = fxState.bitcrush * fxState.master;
      postWorklet({
        type: "glitch:set",
        data: {
          enabled: crushMix > 0.001,
          mix: crushMix,
          // mix=0 → 12 bits (clean), mix=1 → 2 bits (heavy crush)
          crush: Math.max(2, Math.round(12 - crushMix * 10)),
          rate: 1600,
          jitter: 0.15

    function ensureAudio() {
      if (audioCtx) return audioCtx;
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) { console.warn("[ac-native-wasm] no AudioContext available"); return null; }
      audioCtx = new Ctor();
      outputGain = audioCtx.createGain();
      outputGain.gain.value = pendingMasterVolume;
      outputGain.connect(audioCtx.destination);

      // Master-output tap (post-worklet). ScriptProcessor is deprecated but
      // it's the simplest way to feed a ring buffer without yet another
      // AudioWorklet module file.
      recentBuf = new Float32Array(audioCtx.sampleRate * RECENT_BUFFER_SECONDS);
      recentHead = 0;
      recentFilled = 0;
      const PROC_FRAMES = 4096;
      const tap = audioCtx.createScriptProcessor(PROC_FRAMES, 1, 1);
      tap.onaudioprocess = (e) => {
        const input = e.inputBuffer.getChannelData(0);
        const buf = recentBuf;
        let head = recentHead;
        for (let i = 0; i < input.length; i++) {
          buf[head] = input[i];
          head = head + 1; if (head >= buf.length) head = 0;
        }
        recentHead = head;
        if (recentFilled < buf.length) recentFilled = Math.min(buf.length, recentFilled + input.length);

      // addModule() is async — voices spawned before it resolves are
      // queued in pendingWorkletMsgs and flushed on ready.

      // refuses to load blob: URLs as worklet modules — "Not allowed to
      // load local resource". We prefer data: URLs there. Under http(s):
      // blob: is faster and avoids the percent-encoding overhead, so we
      // try blob: first and fall back to data: on rejection.
      if (!workletLoading) {

            speakerWorklet = new AudioWorkletNode(audioCtx, "speaker-processor", {
              outputChannelCount: [2],
              processorOptions: { bpm: 120, debug: false }
            });
            speakerWorklet.connect(outputGain);
            workletReady = true;
            // Drain queued messages in submission order.
            while (pendingWorkletMsgs.length) {
              speakerWorklet.port.postMessage(pendingWorkletMsgs.shift());
            }

            speakerWorklet.port.postMessage({ type: "volume", data: pendingMasterVolume });

            console.error("[ac-native-wasm] failed to instantiate speaker worklet:", err);
          }

        const primary = isFileOrigin ? dataUrl : blobUrl;
        const secondary = isFileOrigin ? null : dataUrl;
        tryUrl(primary)
          .then(finalize)
          .catch((err) => {
            console.warn("[ac-native-wasm] primary worklet URL rejected:", err.message);
            if (!secondary) {

              .then(finalize)
              .catch((err2) => {

    window.addEventListener("pointerdown", unlockAudio, { capture: true });
    window.addEventListener("keydown", unlockAudio, { capture: true });
    window.addEventListener("touchstart", unlockAudio, { capture: true, passive: true });

          attack: Math.max(0, Number(opts.attack) || 0.01),
          decay: Math.min(0.999, Math.max(0, Number(opts.decay) || 0.9)),

      function makeBufferPlayer(label) {

            type: "sample",
            options: {
              buffer: {

                sampleRate: activeRate,
                length: activeBuffer.length

              label: bufferLabel,
              speed,
              loop: !!opts.loop,
              from: 0,
              to: 1
            },
            beats: opts.loop ? Infinity : (activeBuffer.length / activeRate / Math.abs(speed)) * 2,
            attack: Math.max(0, Number(opts.attack) || 0.001),
            decay: Math.min(0.999, Math.max(0, Number(opts.decay) || 0.001)),
            volume: Math.max(0, Math.min(1, opts.volume == null ? 1 : Number(opts.volume))),
            pan: Math.max(-1, Math.min(1, Number(opts.pan) || 0))

      }

      // ---- speaker tap ----
      function getRecentBuffer(seconds) {
        if (!audioCtx || !recentBuf || recentFilled <= 0) return null;
        const sr = audioCtx.sampleRate;
        const want = Math.min(recentFilled, Math.max(1, Math.floor(Number(seconds) * sr)));
        if (want <= 0) return null;
        const out = new Float32Array(want);
        let read = recentHead - want; if (read < 0) read += recentBuf.length;

      function drawStrip(x, y, w, h, totalSec, anchor, offsetSec) {

        // wrap into [0, recentBuf.length)

        read = ((read % L) + L) % L;

    const PIECE_SOURCE = "// prompt.mjs — Native command-line piece for fedac\n// Text input at top-left, pink block cursor, no prompt prefix.\n// Anything typed (except \"notepat\") is evaluated as KidLisp source.\n\nlet input = \"\";\nlet cursor = 0; // cursor position within input\nlet cursorVisible = true;\nlet cursorFrame = 0;\nlet history = [];\nlet historyIndex = -1;\nlet message = \"\";\nlet messageFrame = 0;\nlet shiftHeld = false;\nlet frame = 0;\nlet voiceOff = false; // true when user sets voice to \"off\"\nlet T = __theme.update(); // global theme (auto dark/light)\nlet tabMatches = []; // current tab completion candidates\nlet tabIndex = -1;   // cycling index for tab\nlet tabPrefix = \"\";   // what was typed before tab\n\n// Discovered piece names (populated in boot via system.listPieces)\nlet PIECE_NAMES = [];\n// Built-in non-piece commands\nconst BUILTIN_COMMANDS = [\n  \"version\", \"reboot\", \"off\", \"clear\", \"help\", \"ssh\", \"hi\", \"bye\", \"ls\", \"papers\", \"link\", \"login\", \"midi\",\n];\n// All completable commands (built in boot)\nlet COMMANDS = [];\n// $code aliases\nconst CODE_NAMES = [\"$roz\"];\n// Piece descriptions (for tab completion display)\nconst PIECE_DESC = {\n  \"notepat\":       \"synthesizer instrument\",\n  \"os\":            \"system update (OTA)\",\n  \"wifi\":          \"network picker\",\n  \"claude\":        \"AI assistant\",\n  \"terminal\":      \"PTY terminal\",\n  \"geo\":           \"geolocation\",\n  \"chat\":          \"real-time chat\",\n  \"laer-klokken\":  \"clock room chat\",\n  \"machine\":       \"hardware info\",\n  \"roz\":           \"generative art\",\n  \"list\":          \"all commands\",\n  \"ls\":            \"→ list\",\n  \"papers\":        \"papers site\",\n  \"clock\":         \"melody clock\",\n  \"brick-breaker\": \"paddle + ball game\",\n  \"gostop\":        \"go/stop rhythm\",\n  \"beat\":          \"percussion\",\n  \"shh\":           \"noise drone\",\n  \"dync\":          \"percussive pad\",\n  \"chart\":         \"diagram sketch\",\n  \"f3ral3xp\":      \"feral expression\",\n  \"3x3\":           \"ortholinear pad\",\n  \"print\":         \"printer / thermal\",\n  \"theme\":         \"prompt theme\",\n  \"voice\":         \"system voice\",\n  \"link\":          \"pair this device with an account\",\n  \"login\":         \"→ link\",\n  \"raylibtest\":    \"raylib software renderer test\",\n  \"midi\":          \"usb midi + udp relay\",\n  \"dark\":          \"dark mode\",\n  \"light\":         \"light mode\",\n  \"auto\":          \"auto dark/light\",\n  \"error\":         \"error screen\",\n  \"404\":           \"not found\",\n};\n\n// WiFi auto-connect state\nconst AC_SSID = \"aesthetic.computer\";\nconst AC_PASS = \"aesthetic.computer\";\nconst CREDS_PATH = \"/mnt/wifi_creds.json\";\nlet savedCreds = [];\nlet autoConnectFrame = 0;\nlet connectStartFrame = -9999;\n\nconst SHIFT_MAP = {\n  \"1\":\"!\", \"2\":\"@\", \"3\":\"#\", \"4\":\"$\", \"5\":\"%\",\n  \"6\":\"^\", \"7\":\"&\", \"8\":\"*\", \"9\":\"(\", \"0\":\")\",\n  \"-\":\"_\", \"=\":\"+\", \"[\":\"{\", \"]\":\"}\", \"\\\\\":\"|\",\n  \";\":\":\", \"'\":'\"', \",\":\"<\", \".\":\">\", \"/\":\"?\", \"`\":\"~\",\n};\n\n// KidLisp syntax highlighting colors\nconst KL_KEYWORDS = new Set([\n  \"ink\",\"line\",\"circle\",\"box\",\"wipe\",\"fade\",\"write\",\"grid\",\"plot\",\n  \"spin\",\"zoom\",\"scroll\",\"contrast\",\"noise\",\"blend\",\"mirror\",\n  \"w\",\"h\",\"w/2\",\"h/2\",\"t\",\"frame\",\"pi\",\"tau\",\n  \"sin\",\"cos\",\"tan\",\"abs\",\"sqrt\",\"floor\",\"ceil\",\"round\",\"min\",\"max\",\"pow\",\"mod\",\n  \"?\",\"...\",\n]);\nconst KL_COLORS = new Set([\n  \"red\",\"green\",\"blue\",\"cyan\",\"magenta\",\"yellow\",\"white\",\"black\",\n  \"orange\",\"pink\",\"purple\",\"gray\",\"grey\",\"rainbow\",\n]);\n\nfunction klTokenColor(token) {\n  if (KL_COLORS.has(token)) return [255, 140, 100]; // warm orange for color names\n  if (KL_KEYWORDS.has(token)) return [120, 180, 255]; // blue for keywords\n  if (/^-?\\d+(\\.\\d+)?$/.test(token)) return [180, 220, 140]; // green for numbers\n  if (/^[a-z]/.test(token) && token.includes(\"/\")) return [180, 220, 140]; // w/2 etc\n  return null; // default\n}\n\n// Built-in $code aliases\nconst CODES = {\n  \"$roz\": `fade:red-blue-black-blue-red\nink (? rainbow white 0) (1s... 24 64)\nline w/2 0 w/2 h\n(spin (2s... -1.125 1.125)) (zoom 1.1)\n(0.5s (contrast 1.05))\n(scroll (? -0.1 0 0.1) (? -0.1 0 0.1))\nink (? cyan yellow magenta) 8\ncircle w/2 h/2 (? 2 4 8)`,\n};\n\nfunction readUsbMidiStatus(system) {\n  try {\n    return system?.usbMidi?.status?.() || system?.usbMidi || null;\n  } catch (_) {\n    return system?.usbMidi || null;\n  }\n}\n\nfunction formatUsbMidiStatus(status) {\n  if (!status) return \"usb midi unavailable\";\n  if (status.active) {\n    let msg = \"usb midi active\";\n    if (status.alsaDevice) msg += \" \" + status.alsaDevice;\n    else if (status.udc) msg += \" \" + status.udc;\n    if (status.port) msg += \" via \" + status.port;\n    return msg;\n  }\n  if (status.enabled) {\n    return status.reason && status.reason !== \"ok\"\n      ? \"usb midi enabled (\" + status.reason + \")\"\n      : \"usb midi enabled\";\n  }\n  if (status.reason && status.reason !== \"disabled\" && status.reason !== \"uninitialized\") {\n    return \"usb midi off (\" + status.reason + \")\";\n  }\n  return \"usb midi off\";\n}\n\nfunction readConfig(system) {\n  try {\n    const raw = system?.readFile?.(\"/mnt/config.json\");\n    return raw ? JSON.parse(raw) : {};\n  } catch (_) {\n    return {};\n  }\n}\n\nfunction udpMidiRelayEnabled(system) {\n  const cfg = readConfig(system);\n  return cfg.udpMidiBroadcast === true || cfg.udpMidiBroadcast === \"true\";\n}\n\nfunction formatUdpMidiRelayStatus(system) {\n  const cfg = readConfig(system);\n  const enabled = cfg.udpMidiBroadcast === true || cfg.udpMidiBroadcast === \"true\";\n  if (!enabled) return \"udp midi relay off\";\n  if (cfg.handle) return \"udp midi relay on @\" + cfg.handle;\n  return \"udp midi relay on\";\n}\n\nfunction boot({ system }) {\n  message = \"\";\n  // Load saved theme from config (persists across reboots)\n  try {\n    const raw = system?.readFile?.(\"/mnt/config.json\");\n    if (raw) {\n      const cfg = JSON.parse(raw);\n      if (cfg.theme) __theme.apply(cfg.theme);\n      if (cfg.darkMode === \"dark\") __theme._forceDark = true;\n      else if (cfg.darkMode === \"light\") __theme._forceDark = false;\n      if (cfg.darkMode) { __theme._lastCheck = 0; __theme.update(); }\n      voiceOff = cfg.voice === \"off\";\n    }\n  } catch (_) {}\n  // Discover all available pieces dynamically.\n  // listPieces returns .lisp files with the extension intact (so list.mjs can\n  // bucket them); for prompt dispatch we want bare command names.\n  PIECE_NAMES = (system?.listPieces?.() || [])\n    .map(n => (n.endsWith && n.endsWith(\".lisp\")) ? n.slice(0, -5) : n)\n    .filter(n => n !== \"prompt\" && n !== \"lisp\" && n !== \"cc\");\n  PIECE_NAMES.sort();\n  COMMANDS = [...PIECE_NAMES, ...BUILTIN_COMMANDS, ...CODE_NAMES];\n  // Restore input from KidLisp return (backspace/escape preserves source)\n  if (globalThis.__promptRestore) {\n    input = globalThis.__promptRestore;\n    cursor = input.length;\n    globalThis.__promptRestore = undefined;\n  }\n  // Load saved WiFi credentials\n  try {\n    const raw = system?.readFile?.(CREDS_PATH);\n    if (raw) savedCreds = JSON.parse(raw);\n  } catch (_) {}\n\n  // Outside-in remote prompt: ac-native stages text + commandId here when a\n  // viewer publishes cmd:\"prompt\" or cmd:\"prompt-bg\" through /machines.\n  //   prompt    — run execute() and let any jump it triggers stand\n  //   prompt-bg — run execute() with jump intercepted, then bounce back to\n  //               whatever piece the user had open (so notepat etc. survive)\n  const remote = system?.consumePromptCmd?.();\n  if (remote && remote.text) {\n    const before = message;\n    message = \"\";\n    let ok = 1;\n    let interceptedJump = null;\n\n    if (remote.bg && system) {\n      const origJump = system.jump;\n      system.jump = (target) => { interceptedJump = target; };\n      try {\n        execute(remote.text, system);\n      } catch (err) {\n        ok = 0;\n        message = \"error: \" + (err?.message || String(err));\n      }\n      system.jump = origJump;\n    } else {\n      try {\n        execute(remote.text, system);\n      } catch (err) {\n        ok = 0;\n        message = \"error: \" + (err?.message || String(err));\n      }\n    }\n\n    let reply = message;\n    if (!reply && interceptedJump) reply = \"(suppressed jump → \" + interceptedJump + \")\";\n    if (!reply) reply = \"(no output)\";\n    try { system?.machinesResponse?.(remote.id, reply, ok); } catch (_) {}\n\n    if (remote.bg) {\n      // Bounce back to the user's prior piece without disrupting it.\n      const returnTo = remote.returnTo || \"prompt\";\n      if (returnTo && returnTo !== \"prompt\") {\n        try { system?.jump?.(returnTo); } catch (_) {}\n      }\n      // Don't leak our captured message onto the prompt screen — though we\n      // probably won't render it anyway since we're jumping away.\n      message = before;\n    } else if (!message) {\n      // Restore prior message so the local screen doesn't get hijacked when\n      // execute() didn't produce visible feedback.\n      message = before;\n    }\n  }\n}\n\nfunction act({ event: e, system, sound }) {\n  if (e.is(\"keyboard:down:shift\")) { shiftHeld = true; return; }\n  if (e.is(\"keyboard:up:shift\")) { shiftHeld = false; return; }\n\n  if (e.is(\"keyboard:down\")) {\n    const key = e.key;\n    cursorFrame = 0;\n    cursorVisible = true;\n\n    // Keystroke voicing (JS fallback — C input loop also fires for zero-latency)\n    if (!voiceOff) {\n      if (key.length === 1) {\n        sound?.speakCached?.(shiftHeld ? (SHIFT_MAP[key] ?? key.toUpperCase()) : key);\n      } else if (key === \"space\") {\n        sound?.speakCached?.(\"space\");\n      } else if (key === \"backspace\") {\n        sound?.speakCached?.(\"back\");\n      } else if (key === \"enter\" || key === \"return\") {\n        sound?.speakCached?.(\"enter\");\n      } else if (key === \"escape\") {\n        sound?.speakCached?.(\"clear\");\n      } else if (key === \"tab\") {\n        sound?.speakCached?.(\"tab\");\n      }\n    }\n\n    if (key === \"tab\") {\n      // Tab completion\n      const prefix = input.slice(0, cursor).toLowerCase();\n      if (prefix.length > 0) {\n        if (tabPrefix !== prefix) {\n          // New prefix — build match list\n          tabPrefix = prefix;\n          tabMatches = COMMANDS.filter(c => c.startsWith(prefix) && c !== prefix);\n          tabIndex = -1;\n        }\n        if (tabMatches.length > 0) {\n          tabIndex = (tabIndex + 1) % tabMatches.length;\n          const match = tabMatches[tabIndex];\n          input = match + input.slice(cursor);\n          cursor = match.length;\n        }\n      }\n      return;\n    }\n    // Any non-tab key resets tab state\n    tabPrefix = \"\";\n    tabMatches = [];\n    tabIndex = -1;\n\n    if (key === \"enter\" || key === \"return\") {\n      const cmd = input.trim();\n      if (cmd.length > 0) {\n        history.unshift(cmd);\n        historyIndex = -1;\n        execute(cmd, system);\n        input = \"\";\n        cursor = 0;\n      }\n    } else if (key === \"backspace\") {\n      if (cursor > 0) {\n        input = input.slice(0, cursor - 1) + input.slice(cursor);\n        cursor--;\n      }\n    } else if (key === \"delete\") {\n      if (cursor < input.length) {\n        input = input.slice(0, cursor) + input.slice(cursor + 1);\n      }\n    } else if (key === \"escape\") {\n      input = \"\";\n      cursor = 0;\n    } else if (key === \"arrowleft\") {\n      if (cursor > 0) cursor--;\n    } else if (key === \"arrowright\") {\n      if (cursor < input.length) cursor++;\n    } else if (key === \"home\") {\n      cursor = 0;\n    } else if (key === \"end\") {\n      cursor = input.length;\n    } else if (key === \"arrowup\") {\n      if (history.length > 0 && historyIndex < history.length - 1) {\n        historyIndex++;\n        input = history[historyIndex];\n        cursor = input.length;\n      }\n    } else if (key === \"arrowdown\") {\n      if (historyIndex > 0) {\n        historyIndex--;\n        input = history[historyIndex];\n        cursor = input.length;\n      } else if (historyIndex === 0) {\n        historyIndex = -1;\n        input = \"\";\n        cursor = 0;\n      }\n    } else if (key === \"space\") {\n      input = input.slice(0, cursor) + \" \" + input.slice(cursor);\n      cursor++;\n    } else if (key.length === 1) {\n      const ch = shiftHeld ? (SHIFT_MAP[key] ?? key.toUpperCase()) : key;\n      input = input.slice(0, cursor) + ch + input.slice(cursor);\n      cursor++;\n    }\n  }\n}\n\nfunction execute(cmd, system) {\n  const lower = cmd.toLowerCase();\n  // Handle colon params: \"clock:cdefg\" → piece=\"clock\", rest passed via jump\n  const colonIdx = lower.indexOf(\":\");\n  const baseName = colonIdx >= 0 ? lower.slice(0, colonIdx) : lower;\n  // Also handle space params: \"clock cdefg\" → piece=\"clock\"\n  const spaceIdx = lower.indexOf(\" \");\n  const baseWord = spaceIdx >= 0 ? lower.slice(0, spaceIdx) : lower;\n\n  // Built-in commands (non-piece)\n  if (lower === \"version\") {\n    message = system?.version || \"unknown\";\n    messageFrame = 0;\n    return;\n  }\n  if (lower === \"reboot\") {\n    system?.reboot?.();\n    return;\n  }\n  if (lower === \"off\" || lower === \"shutdown\" || lower === \"poweroff\") {\n    message = \"shutting down...\";\n    messageFrame = 0;\n    system?.poweroff?.();\n    return;\n  }\n  if (baseWord === \"link\" || baseWord === \"login\") {\n    const code = cmd.slice(spaceIdx > 0 ? spaceIdx + 1 : cmd.length).trim();\n    message = \"~> link\";\n    messageFrame = 0;\n    system?.jump?.(code ? \"link:\" + code : \"link\");\n    return;\n  }\n  if (lower === \"clear\") {\n    history = [];\n    message = \"\";\n    return;\n  }\n  if (lower === \"help\") {\n    message = \"type a piece name or kidlisp — tab to complete\";\n    messageFrame = 0;\n    return;\n  }\n  if (lower === \"ssh\") {\n    if (system?.sshStarted) {\n      message = \"ssh running on port 22\";\n    } else {\n      system?.startSSH?.();\n      message = \"starting ssh...\";\n    }\n    messageFrame = 0;\n    return;\n  }\n  if (baseWord === \"midi\") {\n    const arg = spaceIdx >= 0 ? lower.slice(spaceIdx + 1).trim() : \"status\";\n    if (arg === \"relay\" || arg.startsWith(\"relay \")) {\n      const relayArg = arg === \"relay\" ? \"status\" : arg.slice(\"relay \".length).trim();\n      if (!relayArg || relayArg === \"status\") {\n        message = formatUdpMidiRelayStatus(system);\n        messageFrame = 0;\n        return;\n      }\n      if (relayArg === \"on\" || relayArg === \"enable\") {\n        system?.saveConfig?.(\"udpMidiBroadcast\", \"true\");\n        message = formatUdpMidiRelayStatus(system);\n        messageFrame = 0;\n        return;\n      }\n      if (relayArg === \"off\" || relayArg === \"disable\") {\n        system?.saveConfig?.(\"udpMidiBroadcast\", \"false\");\n        message = formatUdpMidiRelayStatus(system);\n        messageFrame = 0;\n        return;\n      }\n      message = \"usage: midi relay [status|on|off]\";\n      messageFrame = 0;\n      return;\n    }\n    if (!arg || arg === \"status\") {\n      message = formatUsbMidiStatus(readUsbMidiStatus(system)) + \" | \" + formatUdpMidiRelayStatus(system);\n      messageFrame = 0;\n      return;\n    }\n    if (arg === \"on\" || arg === \"enable\") {\n      system?.saveConfig?.(\"usbMidi\", \"true\");\n      const status = system?.usbMidi?.enable?.() || readUsbMidiStatus(system);\n      message = formatUsbMidiStatus(status);\n      messageFrame = 0;\n      return;\n    }\n    if (arg === \"off\" || arg === \"disable\") {\n      system?.saveConfig?.(\"usbMidi\", \"false\");\n      const status = system?.usbMidi?.disable?.() || readUsbMidiStatus(system);\n      message = formatUsbMidiStatus(status);\n      messageFrame = 0;\n      return;\n    }\n    if (arg === \"refresh\" || arg === \"retry\") {\n      const status = system?.usbMidi?.refresh?.() || readUsbMidiStatus(system);\n      message = formatUsbMidiStatus(status);\n      messageFrame = 0;\n      return;\n    }\n    message = \"usage: midi [status|on|off|refresh|relay]\";\n    messageFrame = 0;\n    return;\n  }\n  if (lower === \"hi\") {\n    const raw = system?.readFile?.(\"/mnt/config.json\");\n    if (raw) {\n      try {\n        const cfg = JSON.parse(raw);\n        if (cfg.handle) {\n          message = \"logged in as @\" + cfg.handle;\n        } else if (cfg.email) {\n          message = \"logged in as \" + cfg.email;\n        } else {\n          message = \"config exists but no user\";\n        }\n      } catch (_) { message = \"config parse error\"; }\n    } else {\n      message = \"not logged in — flash from an authenticated CLI\";\n    }\n    messageFrame = 0;\n    return;\n  }\n  if (lower === \"bye\") {\n    const raw = system?.readFile?.(\"/mnt/config.json\");\n    let cfg = {};\n    if (raw) try { cfg = JSON.parse(raw); } catch (_) {}\n    const had = cfg.handle || cfg.email;\n    delete cfg.handle;\n    delete cfg.email;\n    delete cfg.sub;\n    system?.writeFile?.(\"/mnt/config.json\", JSON.stringify(cfg, null, 2));\n    message = had ? \"logged out (was @\" + had + \")\" : \"already logged out\";\n    messageFrame = 0;\n    return;\n  }\n\n  // Set default boot piece\n  if (baseWord === \"boot\") {\n    if (spaceIdx > 0) {\n      const pieceName = cmd.slice(spaceIdx + 1).trim();\n      if (pieceName) {\n        system?.saveConfig?.(\"piece\", pieceName);\n        message = \"boot → \" + pieceName;\n      } else {\n        message = \"usage: boot <piece-name>\";\n      }\n    } else {\n         sample: samplePlayer,
        speaker: { drawStrip, getRecentBuffer }
      };
    }

    // ---------- QR ----------
    // Cache: text → Uint8Array bit matrix flattened row-major, plus size.
    const qrCache = new Map();
    function buildQRMatrix(text) {
      if (qrCache.has(text)) return qrCache.get(text);
      if (typeof QRCode === "undefined") return null;
      // QRCode.js requires a DOM container. We give it a hidden one and
      // pull the bit matrix out via the inner _oQRCode. Lower CorrectLevel
      // = fewer modules = bigger pixels at the same on-screen footprint.
      const div = document.createElement("div");
      div.style.cssText = "position:absolute;visibility:hidden;width:0;height:0;overflow:hidden";
      document.body.appendChild(div);
      try {
        const inst = new QRCode(div, {
          text: String(text),
          width: 64, height: 64,
          correctLevel: QRCode.CorrectLevel.M
        });
        const inner = inst._oQRCode;
        const size = inner.getModuleCount();
        const bits = new Uint8Array(size * size);
        for (let r = 0; r < size; r++) {
          for (let c = 0; c < size; c++) {
            bits[r * size + c] = inner.isDark(r, c) ? 1 : 0;
          }
        }
        const result = { size, bits };
        qrCache.set(text, result);
        return result;
      } catch (err) {
        console.warn("[ac-native-wasm] qr encode failed:", err);
        qrCache.set(text, null);
        return null;
      } finally {
        document.body.removeChild(div);
      }
    }
    globalThis.qr = (text, x, y, scale) => {
      const m = buildQRMatrix(text);
      const s = Math.max(1, Math.trunc(scale || 1));
      const prevInk = clone(currentInk);
      // 1-module quiet zone, white background
      const quiet = 1;
      const matrixSize = m ? m.size : 21; // fallback placeholder
      const total = (matrixSize + quiet * 2) * s;
      setInk(255, 255, 255, 255);
      rasterBox(x, y, total, total, true);
      if (m) {
        setInk(0, 0, 0, 255);
        const ox = x + quiet * s, oy = y + quiet * s;
        for (let r = 0; r < m.size; r++) {
          for (let c = 0; c < m.size; c++) {
            if (m.bits[r * m.size + c]) {
              rasterBox(ox + c * s, oy + r * s, s, s, true);
            }
          }
        }
      } else {
        setInk(180, 60, 60, 255);
        rasterBox(x, y, total, total, false);
      }
      setInk(prevInk[0], prevInk[1], prevInk[2], prevInk[3]);
    };

    const pieces = {};
    function makeStubPiece(title, describe) {
      let lines = [];
      return {
        boot({ system, params, colon }) {
          lines = [
            title,
            describe({ params, colon, system }),
            "This prototype is running the real native " + PIECE_NAME + " piece,",
            "but other native pieces are still browser stubs.",
            "Press Backspace or Escape to return."
          ];
        },
        act({ event, system }) {
          if (event.is("keyboard:down") && (event.key === "backspace" || event.key === "escape")) {
            system.jump(PIECE_NAME);
          }
        },
        sim() {},
        paint({ wipe, ink, box, write, screen }) {
          const T = globalThis.__theme.update();
          wipe(T.bg[0], T.bg[1], T.bg[2]);
          ink(T.accent[0], T.accent[1], T.accent[2]);
          box(36, 36, screen.width - 72, screen.height - 72, true);
          ink(T.bg[0], T.bg[1], T.bg[2]);
          box(40, 40, screen.width - 80, screen.height - 80, true);
          ink(T.fg, T.fg, T.fg + 10);
          lines.forEach((line, index) => {
            write(line, { x: 56, y: 64 + index * 16, size: 1, font: "6x10" });
          });
        }
      };
    }

    pieces.lisp = makeStubPiece("lisp", () => "KidLisp eval is not wired into the browser host yet.");
    pieces.list = makeStubPiece("list", ({ system }) => "Available offline pieces: " + system.listPieces().join(", "));
    pieces.claude = makeStubPiece("claude", () => "Claude integration is native-only for now.");
    pieces.link = makeStubPiece("link", ({ params }) => params[0] ? "Link code: " + params[0] : "No link code provided.");
    pieces.login = pieces.link;

    const pieceUrl = URL.createObjectURL(new Blob([rewrittenSource], { type: "text/javascript" }));
    const loadedPieceModule = await import(pieceUrl);
    pieces[PIECE_NAME] = loadedPieceModule;

    function normalizeJumpTarget(spec) {
      const raw = String(spec || PIECE_NAME).trim() || PIECE_NAME;
      const colonIndex = raw.indexOf(":");
      const baseSpec = colonIndex >= 0 ? raw.slice(0, colonIndex) : raw;
      const colon = colonIndex >= 0 ? raw.slice(colonIndex + 1).split(":").filter(Boolean) : [];
      const spaceIndex = baseSpec.indexOf(" ");
      const pieceName = (spaceIndex >= 0 ? baseSpec.slice(0, spaceIndex) : baseSpec).toLowerCase();
      const params = spaceIndex >= 0 ? baseSpec.slice(spaceIndex + 1).split(" ").filter(Boolean) : [];
      return { pieceName, params, colon, raw };
    }

    const systemApi = {
      version: "ac-native wasm " + PIECE_NAME + " prototype",
      aesthetic: { handle: null, sub: null },
      bootDevice: "browser",
      hasHdmi: false,
      hdmi: { connected: false },
      tabletMode: false,
      get sshStarted() { return false; },
      // Pending fetch state — notepat polls these each frame
      fetchPending: false,
      fetchResult: null,
      fetchError: null,
      // Binary fetch state (firmware updates etc.)
      fetchBinary: () => false,
      fetchBinaryDone: false,
      fetchBinaryOk: false,
      fetchBinaryProgress: 0,
      // Flash state (firmware flashing)
      flashUpdate: () => false,
      flashDone: false,
      flashOk: false,
      flashPhase: "idle",
      flashTargets: [],
      flashVerifiedBytes: 0,
      // UDP/WS — stubbed
      udp: { send: () => {}, on: () => {} },
      ws: { connected: false, send: () => {}, on: () => {} },
      listPieces() { return Object.keys(pieces).sort(); },
      readFile(filePath) {
        return Object.prototype.hasOwnProperty.call(files, filePath) ? files[filePath] : "";
      },
      writeFile(filePath, value) {
        files[filePath] = String(value);
        persistFiles();
        return true;
      },
      saveConfig(key, value) {
        const config = readConfig();
        config[key] = value;
        files["/mnt/config.json"] = JSON.stringify(config, null, 2);
        persistFiles();
      },
      reboot() { state.statusText = "reboot requested (stubbed in browser)"; },
      poweroff() { state.statusText = "poweroff requested (stubbed in browser)"; },
      startSSH() { state.statusText = "ssh requested (stubbed in browser)"; },
      fetch(url, opts) {
        systemApi.fetchPending = true;
        systemApi.fetchResult = null;
        systemApi.fetchError = null;
        fetch(url, opts).then(async (r) => {
          systemApi.fetchPending = false;
          systemApi.fetchResult = await r.text();
        }).catch((err) => {
          systemApi.fetchPending = false;
          systemApi.fetchError = String(err);
        });
        return true;
      },
      fetchCancel() { systemApi.fetchPending = false; },
      fetchPost(url, body, headers) {
        state.lastPost = "POST " + url;
        console.log("[ac-native-wasm] fetchPost", { url, body, headers });
      },
      usbMidi: {
        status() { return { enabled: false, active: false, reason: "browser-stub" }; },
        enable() { return { enabled: false, active: false, reason: "browser-stub" }; },
        disable() { return { enabled: false, active: false, reason: "browser-stub" }; },
        refresh() { return { enabled: false, active: false, reason: "browser-stub" }; }
      },
      jump(spec) { loadPiece(spec); }
    };

    async function loadPiece(spec) {
      const target = normalizeJumpTarget(spec);
      state.currentPieceSpec = target.raw;
      state.currentPieceName = pieces[target.pieceName] ? target.pieceName : PIECE_NAME;
      state.currentParams = target.params;
      state.currentColon = target.colon;
      state.currentPiece = pieces[state.currentPieceName];
      state.paintCount = 0;
      state.jumpMessage = target.raw;
      state.statusText = "piece -> " + state.currentPieceName;
      if (typeof state.currentPiece.boot === "function") {
        try {
          state.currentPiece.boot({
            ...hostApi,
            system: systemApi,
            params: clone(state.currentParams),
            colon: clone(state.currentColon)
          });
        } catch (err) {
          state.statusText = "boot error: " + (err?.message || err);
          console.error(err);
        }
      }
    }

    function flushFrame() {
      ctx.putImageData(imageData, 0, 0);
      // Lines (drawn after raster, before text)
      if (lineQueue.length > 0) {
        ctx.lineWidth = 1;
        for (const ln of lineQueue) {
          const [r, g, b, a] = ln.color;
          ctx.strokeStyle = "rgba(" + r + ", " + g + ", " + b + ", " + (a / 255) + ")";
          ctx.beginPath();
          ctx.moveTo(ln.x1 + 0.5, ln.y1 + 0.5);
          ctx.lineTo(ln.x2 + 0.5, ln.y2 + 0.5);
          ctx.stroke();
        }
        lineQueue.length = 0;
      }
      // Bitmap text was rendered into the framebuffer during paint(), so
      // there's no canvas-overlay text pass anymore.
    }

    function tick() {
      hostApi.paintCount = state.paintCount;
      // Flush any setTimeout queue the piece installed (notepat polyfill).
      try { state.currentPiece?.__tickPendingTimeouts?.(); } catch (_) {}
      // Some pieces export a pending-timeout ticker on globalThis instead.
      try { globalThis.__tickPendingTimeouts?.(); } catch (_) {}

      const baseArgs = () => ({
        ...hostApi,
        system: systemApi,
        params: clone(state.currentParams),
        colon: clone(state.currentColon)
      });

      if (typeof state.currentPiece?.sim === "function") {
        try { state.currentPiece.sim(baseArgs()); }
        catch (err) { state.statusText = "sim error: " + err.message; console.error(err); }
      }

      while (state.events.length > 0) {
        const event = state.events.shift();
        if (typeof state.currentPiece?.act === "function") {
          try { state.currentPiece.act({ ...baseArgs(), event }); }
          catch (err) { state.statusText = "act error: " + err.message; console.error(err); }
        }
      }

      if (typeof state.currentPiece?.paint === "function") {
        try { state.currentPiece.paint(baseArgs()); }
        catch (err) {
          state.statusText = "paint error: " + err.message;
          console.error(err);
          // Show error on screen too
          ctx.fillStyle = "#000";
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
          ctx.fillStyle = "#ff6b9d";
          ctx.font = "14px 'Iosevka Term', monospace";
          ctx.fillText("paint error: " + err.message, 12, 20);
          const stack = String(err.stack || "").split("\n").slice(0, 8);
          stack.forEach((line, i) => ctx.fillText(line, 12, 44 + i * 16));
          requestAnimationFrame(tick);
          return;
        }
      }

      flushFrame();
      state.paintCount += 1;
      requestAnimationFrame(tick);
    }

    await loadPiece(PIECE_NAME);
    screen.focus();
    requestAnimationFrame(tick);
  </script>
</body>
</html>

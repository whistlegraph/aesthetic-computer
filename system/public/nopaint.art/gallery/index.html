<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>No Paint — Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Jeffrey Alan Scudder w/ Alex Freundlich, Ella Fleck, Camille Klein &amp; Friends">
<meta name="description" content="Every painting kept by pressing Paint — the No Paint archive, 2021 to now. Searchable.">
<link rel="icon" type="image/png" href="../icons/icon-1024.png">
<style>
  @font-face { font-family: "Pixelar"; src: url("../fonts/pixelar-regular-w01.woff2") format("woff2"); }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #ebebeb; font-family: "Pixelar", monospace; color: #222; image-rendering: pixelated; }
  header {
    position: sticky; top: 0; z-index: 2; background: #ebebeb;
    border-bottom: 2px solid #222; padding: 12px 16px 10px;
  }
  .row1 { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 18px; }
  header h1 { margin: 0; font-size: 28px; font-weight: normal; letter-spacing: 1px; }
  header h1 a { color: inherit; text-decoration: none; }
  #count { font-size: 16px; color: #666; }
  #q {
    font-family: inherit; font-size: 18px; padding: 4px 12px; margin-top: 8px;
    width: 100%; max-width: 420px; background: #fff; border: 2px solid #222; border-radius: 0;
  }
  nav { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  nav button {
    font-family: inherit; font-size: 15px; padding: 2px 10px;
    background: #fff; border: 2px solid #222; border-radius: 0; cursor: pointer;
  }
  nav button.on { background: #222; color: #ebebeb; }
  nav button:active { transform: translateY(1px); }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(128px, 1fr)); gap: 4px; padding: 4px; }
  .cell { position: relative; display: block; aspect-ratio: 256 / 288; background: #ddd; }
  .cell img { width: 100%; height: 100%; display: block; }
  .cell .cap {
    position: absolute; left: 0; right: 0; bottom: 0; padding: 3px 5px;
    font-size: 11px; line-height: 1.2; color: #fff; background: rgba(0,0,0,0.62);
    opacity: 0; transition: opacity .12s; pointer-events: none; max-height: 70%; overflow: hidden;
  }
  .cell:hover .cap { opacity: 1; }
  .cell.unsafe { outline: 2px solid #d23; outline-offset: -2px; }
  .cell .flag {
    position: absolute; top: 3px; right: 3px; font-size: 10px; padding: 1px 4px;
    background: #d23; color: #fff; letter-spacing: .5px;
  }
  body.hide-unsafe .cell.unsafe { display: none; }
  #more { text-align: center; padding: 24px; font-size: 18px; color: #666; }
  footer { padding: 24px 16px 40px; font-size: 15px; color: #666; text-align: center; }
  footer a { color: #444; }
</style>
</head>
<body>
<header>
  <div class="row1">
    <h1><a href="/">No Paint</a> Gallery</h1>
    <span id="count">loading the archive…</span>
  </div>
  <input id="q" type="search" placeholder="search paintings — colors, subjects, painted words…" autocomplete="off">
  <nav id="years"></nav>
  <nav id="safety"></nav>
</header>
<div id="grid"></div>
<div id="more"></div>
<footer>
  Every image is a painting somebody kept by pressing <strong>Paint</strong>, 2021 to now.
  Descriptions by machine vision; search covers titles, painted text, colors, and subjects.
  <br><a href="/">Play No Paint</a> · <a href="/classic/">Classic build</a>
</footer>
<script>
  const PAGE = 60;
  let all = [], view = [], shown = 0, yearFilter = "shuffle", query = "";
  let CDN = "https://pix.nopaint.art/", THUMB = "https://pix.nopaint.art/thumb/";

  const grid = document.getElementById("grid");
  const more = document.getElementById("more");
  const count = document.getElementById("count");
  const years = document.getElementById("years");
  const safety = document.getElementById("safety");
  const q = document.getElementById("q");
  let safetyMode = "all"; // all | hide | only

  function shuffled(a) { a = a.slice(); for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

  // searchable haystack per painting (lazy-built, cached)
  function hay(p) {
    if (p._h === undefined) p._h = [p.t, p.desc, p.tags, p.c, p.s].filter(Boolean).join(" ").toLowerCase();
    return p._h;
  }
  const esc = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

  function recompute() {
    let base = all;
    if (query) {
      // Word-boundary/prefix match per term (so "cat" hits "cat"/"cats", not "scatter").
      const terms = query.toLowerCase().split(/\s+/).filter(Boolean).map((t) => new RegExp("\\b" + esc(t)));
      base = base.filter((p) => { const h = hay(p); return terms.every((re) => re.test(h)); });
    }
    if (safetyMode === "hide") base = base.filter((p) => !p.unsafe);
    else if (safetyMode === "only") base = base.filter((p) => p.unsafe);
    if (yearFilter !== "all" && yearFilter !== "shuffle") {
      base = base.filter((p) => (p.d || "").startsWith(yearFilter));
    }
    view = yearFilter === "shuffle" && !query ? shuffled(base) : base.slice();
    if (yearFilter !== "shuffle" || query) view.reverse(); // newest first when not shuffling
    grid.innerHTML = ""; shown = 0;
    count.textContent = view.length.toLocaleString() + (query ? " matches" : " paintings");
    fill();
  }

  function fill() {
    const frag = document.createDocumentFragment();
    const end = Math.min(shown + PAGE, view.length);
    for (; shown < end; shown++) {
      const p = view[shown];
      const a = document.createElement("a");
      a.className = "cell" + (p.unsafe ? " unsafe" : ""); a.href = CDN + p.id + ".png"; a.target = "_blank";
      const img = document.createElement("img");
      img.loading = "lazy"; img.decoding = "async";
      img.src = THUMB + p.id + ".webp";
      img.alt = p.desc || ("No Paint painting " + p.id);
      a.appendChild(img);
      if (p.unsafe) { const fl = document.createElement("div"); fl.className = "flag"; fl.textContent = "photo face"; a.appendChild(fl); }
      const cap = p.desc || p.t;
      if (cap) { const d = document.createElement("div"); d.className = "cap"; d.textContent = cap; a.appendChild(d); }
      frag.appendChild(a);
    }
    grid.appendChild(frag);
    more.textContent = shown < view.length ? "…" + (view.length - shown).toLocaleString() + " more" : (view.length ? "that's all" : "no matches");
  }

  new IntersectionObserver((es) => { if (es[0].isIntersecting && shown < view.length) fill(); }, { rootMargin: "1200px" }).observe(more);

  let qt; q.addEventListener("input", () => { clearTimeout(qt); qt = setTimeout(() => { query = q.value.trim(); recompute(); }, 180); });

  fetch("gallery.json").then((r) => r.json()).then((m) => {
    all = m.paintings; if (m.cdn) CDN = m.cdn; if (m.thumb) THUMB = m.thumb;
    const ys = [...new Set(all.map((p) => (p.d || "").slice(0, 4)).filter(Boolean))].sort();
    for (const label of ["shuffle", "all", ...ys]) {
      const b = document.createElement("button"); b.textContent = label; b.dataset.f = label;
      b.onclick = () => { yearFilter = label; for (const x of years.children) x.classList.toggle("on", x.dataset.f === label); recompute(); };
      years.appendChild(b);
    }
    years.firstChild.classList.add("on");
    // safety filter (photographic faces = moderation-sensitive)
    const nUnsafe = all.filter((p) => p.unsafe).length;
    for (const [label, mode] of [["all photos", "all"], ["hide photo-faces", "hide"], ["only photo-faces", "only"]]) {
      const b = document.createElement("button"); b.textContent = mode === "only" ? `${label} (${nUnsafe})` : label; b.dataset.m = mode;
      b.onclick = () => { safetyMode = mode; for (const x of safety.children) x.classList.toggle("on", x.dataset.m === mode); recompute(); };
      safety.appendChild(b);
    }
    safety.firstChild.classList.add("on");
    recompute();
  }).catch(() => count.textContent = "the archive could not load");
</script>
</body>
</html>

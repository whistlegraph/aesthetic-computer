<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Whistlegraph Desk</title>
  <style>
    @font-face{font-family:'YWFTProcessing';src:url('https://aesthetic.computer/type/webfonts/ywft-processing-bold.woff2') format('woff2');font-weight:normal;font-style:normal;font-display:swap}
    :root{--paper:#fcf7c5;--ink:#281e5a;--dim:#6a638c;--rule:rgba(255,180,60,.35);--margin:#b44887;--link:#1a56d6;--seen:#7850b4;--hi:#fff3a0}
    *{box-sizing:border-box}
    html{min-height:100%;-webkit-text-size-adjust:100%}
    body{margin:0;min-height:100%;background:repeating-linear-gradient(var(--paper),var(--paper) 26px,var(--rule) 26px,var(--rule) 27px);color:var(--ink);font:14px/1.55 ui-monospace,"Berkeley Mono Variable",Menlo,"DejaVu Sans Mono",monospace;-webkit-font-smoothing:antialiased}
    body::before{content:"";position:fixed;z-index:0;inset:0 auto 0 34px;width:1px;background:rgba(180,72,135,.42);pointer-events:none}
    button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.hidden{display:none!important}
    a{color:var(--link);text-decoration:underline;text-underline-offset:2px}a:visited{color:var(--seen)}a:hover{background:var(--hi);text-decoration:none}
    #gate{position:relative;z-index:1;min-height:100vh;display:grid;place-items:center;padding:36px 24px 60px 48px}
    .gate-card{width:min(620px,100%);padding:24px 0;background:transparent}
    .mark{font-family:'YWFTProcessing',"Arial Black",system-ui,sans-serif;font-weight:normal;font-size:clamp(34px,7vw,54px);line-height:.95;letter-spacing:-.01em;margin:0 0 11px}.mark b{color:var(--margin);font-weight:normal}
    .gate-card .lede{border:1px solid var(--ink);background:rgba(255,255,255,.28);padding:11px 13px;margin:16px 0;line-height:1.7}.gate-card .lede b{color:var(--margin);font-weight:normal}.gate-card p{color:var(--dim)}
    .primary{border:1px solid var(--margin);border-radius:2px;background:var(--margin);color:var(--paper);padding:7px 11px;font-weight:normal}.primary:hover{background:var(--ink);border-color:var(--ink)}.primary:disabled{opacity:.45;cursor:not-allowed}.error{color:#a81e2d;margin-top:16px;white-space:pre-wrap}
    #desk{position:relative;z-index:1;min-height:100vh}
    header{position:sticky;top:0;z-index:20;background:repeating-linear-gradient(#fcf7c5f5,#fcf7c5f5 26px,#f5d78dca 26px,#f5d78dca 27px);backdrop-filter:blur(9px);border-bottom:2px solid var(--margin);padding:10px 18px 11px 47px}
    .topline{display:flex;align-items:baseline;gap:12px;min-height:38px}.brand{font-family:'YWFTProcessing',"Arial Black",system-ui,sans-serif;font-size:27px;line-height:1;color:var(--ink);text-decoration:none}.brand:visited{color:var(--ink)}.brand:hover{background:transparent}.brand b{color:var(--margin);font-weight:normal}
    .who{margin-left:auto;color:var(--dim);font-size:11.5px}.quiet{border:0;background:transparent;padding:3px 1px;color:var(--link);text-decoration:underline;text-underline-offset:2px;font-size:12px}.quiet:hover{background:var(--hi);text-decoration:none}
    .controls{display:grid;grid-template-columns:auto minmax(220px,1fr) auto auto;gap:8px 12px;align-items:center;margin-top:5px}
    .seg{display:flex;flex-wrap:nowrap;width:max-content;border-bottom:2px solid var(--ink);align-items:flex-end}.seg button{border:1px solid transparent;border-bottom:0;background:transparent;padding:6px 10px 5px;margin-bottom:-2px}.seg button:hover{border-color:var(--ink);background:rgba(255,255,255,.4)}.seg button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
    #filter{gap:5px;border:0}#filter button{font-size:11px;line-height:1.4;border:1px solid var(--ink);border-radius:2px;padding:2px 7px;margin:0}#filter button.on{background:var(--margin);color:var(--paper);border-color:var(--margin)}
    #search{width:100%;border:1px solid var(--ink);border-radius:2px;background:var(--paper);padding:6px 9px;outline:none}#search:focus{border-color:var(--margin);box-shadow:0 0 0 2px rgba(180,72,135,.18)}#search::placeholder{color:var(--dim)}
    #count{font-size:11.5px;color:var(--dim);white-space:nowrap}.preview{background:var(--hi);border:1px solid var(--margin);color:var(--margin);padding:2px 7px;font-size:10px;text-transform:uppercase;letter-spacing:.05em}
    main{padding:16px 18px 80px 47px}#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(126px,1fr));gap:16px 10px;align-items:start}
    .tile{position:relative;display:flex;min-width:0;flex-direction:column;border:0;background:transparent;padding:0;text-align:left;overflow:visible;color:var(--ink)}
    .tile img{width:100%;aspect-ratio:9/13;object-fit:cover;display:block;background:#fff;border:1px solid var(--ink);border-radius:1px}.tile:hover{background:transparent}.tile:hover img{outline:3px solid var(--hi);border-color:var(--margin)}.tile:focus-visible{outline:2px solid var(--margin);outline-offset:3px}
    .tile-info{display:block;padding:5px 2px 0;font-size:10px;line-height:1.35;min-width:0}.tile-info b{display:block;font-size:11px;font-weight:normal;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:underline;text-underline-offset:2px}.tile-info small{display:block;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
    .kind{position:absolute;z-index:3;top:6px;left:6px;background:var(--paper);border:1px solid var(--margin);border-radius:2px;color:var(--margin);padding:1px 5px;font-size:8.5px;letter-spacing:.05em;text-transform:uppercase}.changed{position:absolute;z-index:3;right:6px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--margin);border:1px solid var(--paper)}
    #sentinel{height:2px}#drawerShade{position:fixed;z-index:30;inset:0;background:rgba(40,30,90,.28)}
    #drawer{position:fixed;z-index:31;right:0;top:0;bottom:0;width:min(540px,96vw);background:repeating-linear-gradient(var(--paper),var(--paper) 26px,var(--rule) 26px,var(--rule) 27px);border-left:2px solid var(--margin);overflow:auto;padding:20px 24px 44px}
    .drawer-head{display:flex;align-items:start;gap:12px;border-bottom:2px solid var(--margin);padding-bottom:12px}.drawer-head h2{font-family:'YWFTProcessing',"Arial Black",system-ui,sans-serif;font-weight:normal;font-size:24px;line-height:1.05;margin:2px 0 5px;overflow-wrap:anywhere}.drawer-head p{margin:0;color:var(--dim);font-size:11px}.close{margin-left:auto;border:1px solid var(--ink);border-radius:2px;background:var(--paper);width:32px;height:32px;font-size:19px;flex:0 0 auto}.close:hover{background:var(--hi)}
    .hero{display:grid;grid-template-columns:136px 1fr;gap:14px;margin:18px 0}.hero img{width:136px;aspect-ratio:9/16;object-fit:cover;border:1px solid var(--ink);background:#fff}.facts{font-size:11px;line-height:1.7;overflow-wrap:anywhere}.facts a{color:var(--link)}
    label{display:block;font-size:10.5px;color:var(--margin);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 4px}.field{width:100%;border:1px solid var(--ink);border-radius:2px;background:rgba(255,255,255,.58);padding:7px 9px}.field:focus{outline:none;border-color:var(--margin);box-shadow:0 0 0 2px rgba(180,72,135,.18)}textarea.field{min-height:104px;resize:vertical;line-height:1.55}.hint{font-size:10px;color:var(--dim);margin:4px 0}
    .actions{position:sticky;bottom:-44px;background:linear-gradient(transparent,var(--paper) 25%);display:flex;gap:9px;padding:30px 0 12px;margin-top:6px}.danger{border:1px solid var(--ink);border-radius:2px;background:var(--paper);padding:7px 10px}.danger:hover{background:var(--hi)}.save{margin-left:auto}
    #codexShade{position:fixed;z-index:40;inset:0;background:rgba(40,30,90,.28)}#codexPanel{position:fixed;z-index:41;right:0;top:0;bottom:0;width:min(660px,96vw);overflow:auto;background:repeating-linear-gradient(var(--paper),var(--paper) 26px,var(--rule) 26px,var(--rule) 27px);border-left:2px solid var(--margin);padding:20px 26px 56px}.codex-head{display:flex;gap:14px;align-items:start;border-bottom:2px solid var(--margin);padding-bottom:13px}.codex-head h2{font-family:'YWFTProcessing',"Arial Black",system-ui,sans-serif;font-size:29px;font-weight:normal;line-height:1;margin:2px 0 7px}.codex-head p{margin:0;color:var(--dim);font-size:11.5px}.codex-step{margin:22px 0}.codex-step h3{font-size:11px;color:var(--margin);text-transform:uppercase;letter-spacing:.06em;margin:0 0 6px}.codex-step p{font-size:12px;color:var(--dim)}.command{position:relative;border:1px solid var(--ink);background:rgba(255,255,255,.48);padding:11px 72px 11px 12px;white-space:pre-wrap;overflow-wrap:anywhere;font-size:11px;line-height:1.65}.copy{position:absolute;right:7px;top:7px;border:1px solid var(--margin);background:var(--paper);color:var(--margin);padding:3px 7px;font-size:10px}.copy:hover{background:var(--hi)}.guardrails{border-left:3px solid var(--margin);padding:2px 0 2px 12px;font-size:11px;color:var(--dim)}.deploy-list{margin:0;padding:0;list-style:none;font-size:11px}.deploy-list li{border-top:1px solid rgba(40,30,90,.2);padding:7px 0}.deploy-list code{color:var(--margin)}
    #toast{position:fixed;z-index:60;left:50%;bottom:22px;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:7px 11px;border-bottom:3px solid var(--margin);font-size:11.5px}.empty{padding:50px;text-align:center;color:var(--dim)}
    @media(max-width:760px){body::before{left:20px}header{padding-left:30px}.topline{flex-wrap:wrap}.brand{font-size:24px}.controls{display:flex;flex-wrap:wrap}.controls #mode{order:1}.controls #search{order:2;flex:1 0 100%}.controls #filter{order:3;width:100%;max-width:100%;overflow-x:auto}.controls #count{order:4}.who{display:none}main{padding-left:30px}#grid{grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:12px 7px}#drawer{width:calc(100vw - 12px);padding-inline:18px}.hero{grid-template-columns:104px 1fr}.hero img{width:104px}.actions{flex-wrap:wrap}}
  </style>
</head>
<body>
  <section id="gate">
    <div class="gate-card">
      <h1 class="mark">Whistlegraph <b>Desk</b></h1>
      <div class="lede"><b>A working index of the artform.</b><br>Sign in with Aesthetic Computer. Editing is limited to @jeffrey and @minanimals.</div>
      <button class="primary" id="login" data-testid="login">Sign in with Aesthetic Computer</button>
      <p id="gateStatus">Checking your session…</p>
      <div id="gateError" class="error"></div>
    </div>
  </section>

  <section id="desk" class="hidden">
    <header>
      <div class="topline">
        <a class="brand" href="/" target="_blank">Whistlegraph <b>Desk</b></a>
        <span id="previewBadge" class="preview hidden">LOCAL PREVIEW · SAVING OFF</span>
        <span class="who" id="who"></span>
        <a class="quiet" href="/" target="_blank">View site ↗</a>
        <button class="quiet" id="codexOpen" data-testid="codex-tools">Codex tools</button>
        <button class="quiet" id="logout">Sign out</button>
      </div>
      <div class="controls">
        <div class="seg" id="mode" aria-label="Archive layer">
          <button class="on" data-mode="posts">Posts</button><button data-mode="works">Whistlegraphs</button>
        </div>
        <input id="search" type="search" placeholder="Search captions, IDs, or codes…" autocomplete="off" data-testid="archive-search">
        <div class="seg" id="filter" aria-label="Post type">
          <button class="on" data-kind="all">All</button><button data-kind="performance">Performances</button><button data-kind="talk">Talks</button><button data-kind="other">Other</button><button data-kind="unfiled">Unfiled</button>
        </div>
        <span id="count"></span>
      </div>
    </header>
    <main><div id="grid" data-testid="thumbnail-grid"></div><div id="sentinel"></div><div id="empty" class="empty hidden">Nothing matches.</div></main>
  </section>

  <div id="drawerShade" class="hidden"></div>
  <aside id="drawer" class="hidden" aria-label="Archive editor" data-testid="archive-editor"></aside>
  <div id="codexShade" class="hidden"></div>
  <aside id="codexPanel" class="hidden" aria-label="Codex publishing tools" data-testid="codex-panel"></aside>
  <div id="toast" class="hidden"></div>
  <datalist id="workCodes"></datalist>

  <script src="https://aesthetic.computer/aesthetic.computer/dep/auth0-spa-js.production.js"></script>
  <script>
  const AUTH0_DOMAIN="https://hi.aesthetic.computer";
  const AUTH0_CLIENT="LVdZaMbyXctkGfZDnpzDATB5nR0ZhmMt";
  const AUTH0_RETURN=location.origin;
  const DESK_PATH="/desk";
  const API="/api/whistlegraph-admin";
  const LOCAL=/^(localhost|127\.0\.0\.1)$/.test(location.hostname);
  const PREVIEW=LOCAL&&new URLSearchParams(location.search).get("preview")==="1";
  const STATIC_ROOT=LOCAL?"/whistlegraph.org":"";
  const THUMBS="https://assets.aesthetic.computer/whistlegraph/index/posts";
  const esc=value=>String(value??"").replace(/[&<>\"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'\"':"&quot;"}[c]));
  const fmt=value=>value>=1e6?`${(value/1e6).toFixed(1)}M`:value>=1e3?`${Math.round(value/1e3)}K`:String(value||0);
  let client=null,token=null,mode="posts",kind="all",query="",shown=0,view=[];
  let basePosts=[],baseWorks=[],posts=[],works=[],postById={},workByCode={},curation={works:{},posts:{}},deployments=[],selected=null;
  const gate=document.getElementById("gate"),desk=document.getElementById("desk"),grid=document.getElementById("grid"),drawer=document.getElementById("drawer");

  function toast(message){const el=document.getElementById("toast");el.textContent=message;el.classList.remove("hidden");clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.classList.add("hidden"),2400)}
  function fail(message){document.getElementById("gateError").textContent=message;document.getElementById("gateStatus").textContent=""}
  function thumb(id){return `${THUMBS}/${encodeURIComponent(id)}.jpg`}
  function splitList(value){return [...new Set(String(value||"").split(",").map(x=>x.trim()).filter(Boolean))]}
  function applyCuration(){
    works=baseWorks.map(w=>({...w,...(curation.works?.[w.code]||{})}));
    const valid=new Set(works.map(w=>w.code));
    const generatedRelationships=new Set(basePosts.flatMap(p=>p.works||[]));
    posts=basePosts.map(p=>{const patch=curation.posts?.[p.id]||{};const next={...p,...patch};next.works=(next.works||[]).filter(code=>valid.has(code));next.relationships=next.works.map(work=>({work,role:"contributes"}));return next});
    for(const work of works){const related=posts.filter(p=>(p.works||[]).includes(work.code));if(related.length||generatedRelationships.has(work.code)){work.perf=related.length;work.views=related.reduce((sum,p)=>sum+(p.views||0),0)}}
    postById=Object.fromEntries(posts.map(p=>[p.id,p]));workByCode=Object.fromEntries(works.map(w=>[w.code,w]));
    document.getElementById("workCodes").innerHTML=works.map(w=>`<option value="${esc(w.code)}">${esc(w.title)}</option>`).join("");
  }
  async function getJSON(url,options){const res=await fetch(url,options);const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.message||`HTTP ${res.status}`);return data}
  async function loadData(){
    const [pd,gd,cd]=await Promise.all([
      getJSON(`${STATIC_ROOT}/posts.json?t=${Date.now()}`,{cache:"no-cache"}),
      getJSON(`${STATIC_ROOT}/graphs.json?t=${Date.now()}`,{cache:"no-cache"}),
      PREVIEW?Promise.resolve({works:{},posts:{}}):getJSON(`${API}?action=data`,{headers:{Authorization:`Bearer ${token}`},cache:"no-store"})
    ]);
    basePosts=pd.posts||[];baseWorks=gd.works||[];curation={works:cd.works||{},posts:cd.posts||{}};deployments=cd.deployments||[];applyCuration();renderReset();
  }
  function enterDesk(name){gate.classList.add("hidden");desk.classList.remove("hidden");document.getElementById("who").textContent=name;if(PREVIEW){document.getElementById("previewBadge").classList.remove("hidden");document.getElementById("logout").classList.add("hidden")}}
  function canonicalizeDesk(){if(!LOCAL&&location.pathname!==DESK_PATH)history.replaceState({},"",DESK_PATH)}
  async function init(){
    if(PREVIEW){enterDesk("preview");await loadData();return}
    try{
      client=await auth0.createAuth0Client({domain:AUTH0_DOMAIN,clientId:AUTH0_CLIENT,cacheLocation:"localstorage",useRefreshTokens:true,authorizationParams:{redirect_uri:AUTH0_RETURN}});
      if(location.search.includes("state=")&&(location.search.includes("code=")||location.search.includes("error="))){await client.handleRedirectCallback()}
      canonicalizeDesk();
      if(!await client.isAuthenticated()){document.getElementById("gateStatus").textContent="Sign in to continue.";return}
      token=await client.getTokenSilently();
      const session=await getJSON(`${API}?action=session`,{headers:{Authorization:`Bearer ${token}`},cache:"no-store"});
      enterDesk(session.handle?`@${session.handle}`:"authorized editor");await loadData();
    }catch(error){fail(error.message||"Could not open the Whistlegraph Desk.")}
  }
  document.getElementById("login").addEventListener("click",async()=>{
    try{if(!client)client=await auth0.createAuth0Client({domain:AUTH0_DOMAIN,clientId:AUTH0_CLIENT,cacheLocation:"localstorage",useRefreshTokens:true,authorizationParams:{redirect_uri:AUTH0_RETURN}});await client.loginWithRedirect({authorizationParams:{prompt:"login"}})}catch(error){fail(error.message)}
  });
  document.getElementById("logout").addEventListener("click",()=>client?.logout({logoutParams:{returnTo:AUTH0_RETURN}}));

  const codexPanel=document.getElementById("codexPanel"),codexShade=document.getElementById("codexShade");
  function closeCodex(){codexPanel.classList.add("hidden");codexShade.classList.add("hidden")}
  function openCodex(){
    const install="codex plugin marketplace add whistlegraph/aesthetic-computer --ref main\ncodex plugin add whistlegraph@personal";
    const checkout="git clone git@knot.aesthetic.computer:aesthetic.computer/core aesthetic-computer\ncd aesthetic-computer\nac-login\ncodex";
    const recent=deployments.length?deployments.slice(0,8).map(d=>`<li><code>${esc(String(d.commit||"").slice(0,12))}</code> · ${esc(d.status||"queued")} · ${esc(d.changeId||"Desk publish")}<br><small>${esc(d.when?new Date(d.when).toLocaleString():"")}</small></li>`).join(""):"<li>No Codex deployments yet.</li>";
    codexPanel.innerHTML=`<div class="codex-head"><div><h2>Whistlegraph <b>for Codex</b></h2><p>Authenticated frontend editing, ordinary Git commits, and exact-SHA deployment.</p></div><button class="close" aria-label="Close Codex tools">×</button></div>
      <section class="codex-step"><h3>1 · Install the plugin</h3><p>Add the Aesthetic Computer Git marketplace, then install Whistlegraph Desk.</p><div class="command">${esc(install)}<button class="copy" data-copy="install">Copy</button></div></section>
      <section class="codex-step"><h3>2 · Open the knot checkout</h3><p>The plugin edits a clean temporary worktree. Your normal checkout can contain other work without being touched.</p><div class="command">${esc(checkout)}<button class="copy" data-copy="checkout">Copy</button></div></section>
      <section class="codex-step"><h3>3 · Ask Codex</h3><div class="command">Find the copy I want to change on whistlegraph.org, show me the diff, then validate and publish it.<button class="copy" data-copy="prompt">Copy</button></div></section>
      <section class="codex-step guardrails">Only the immutable Auth0 subjects for @jeffrey and @minanimals pass the server check. The plugin can write only <code>system/public/whistlegraph.org/**</code>. Publishing creates a review branch and attributed commit, refuses a moved <code>main</code>, and deploys only the exact pushed SHA.</section>
      <section class="codex-step"><h3>Recent deployments</h3><ul class="deploy-list">${recent}</ul></section>
      <p><a href="https://github.com/whistlegraph/aesthetic-computer/tree/main/plugins/whistlegraph" target="_blank" rel="noopener">Inspect the plugin source ↗</a></p>`;
    codexPanel.querySelector(".close").addEventListener("click",closeCodex);
    codexPanel.addEventListener("click",async event=>{const button=event.target.closest("button[data-copy]");if(!button)return;const text=button.dataset.copy==="install"?install:button.dataset.copy==="checkout"?checkout:"Find the copy I want to change on whistlegraph.org, show me the diff, then validate and publish it.";try{await navigator.clipboard.writeText(text);toast("Copied") }catch{toast("Copy unavailable")}});
    codexPanel.classList.remove("hidden");codexShade.classList.remove("hidden");
  }
  document.getElementById("codexOpen").addEventListener("click",openCodex);codexShade.addEventListener("click",closeCodex);

  function postTitle(p){const text=(p.desc||"").trim();return text?text.slice(0,100):`Post ${p.id}`}
  function heroForWork(code){return posts.filter(p=>(p.works||[]).includes(code)).sort((a,b)=>(b.views||0)-(a.views||0))[0]}
  function buildView(){
    const q=query.trim().toLowerCase();
    if(mode==="works"){
      view=works.filter(w=>!q||w.title.toLowerCase().includes(q)||w.code.toLowerCase().includes(q)||(w.by||"").toLowerCase().includes(q)).sort((a,b)=>(b.views||0)-(a.views||0));return;
    }
    view=posts.filter(p=>{
      if(kind==="unfiled"&&(p.works||[]).length)return false;
      if(kind!=="all"&&kind!=="unfiled"&&p.kind!==kind)return false;
      return !q||postTitle(p).toLowerCase().includes(q)||String(p.id).includes(q)||(p.works||[]).some(code=>code.toLowerCase().includes(q)||(workByCode[code]?.title||"").toLowerCase().includes(q));
    });
  }
  function tileHTML(item){
    const isWork=mode==="works",key=isWork?item.code:item.id,post=isWork?heroForWork(item.code):item;
    const title=isWork?item.title:postTitle(item),label=isWork?`[${item.code}]`:(item.kind||"post"),meta=isWork?`${item.by||""} · ${item.perf||0} posts`:`${item.date||""} · ${fmt(item.views)} views`;
    const changed=Boolean((isWork?curation.works:curation.posts)?.[key]);
    return `<button class="tile" data-key="${esc(key)}" aria-label="Edit ${esc(title)}"><img loading="lazy" src="${post?thumb(post.id):""}" alt=""><span class="kind">${esc(label)}</span>${changed?'<span class="changed" title="Live edit"></span>':""}<span class="tile-info"><b>${esc(title)}</b><small>${esc(meta)}</small></span></button>`;
  }
  function renderMore(){const end=Math.min(shown+180,view.length);grid.insertAdjacentHTML("beforeend",view.slice(shown,end).map(tileHTML).join(""));shown=end;document.getElementById("count").textContent=`${view.length.toLocaleString()} ${mode}`}
  function renderReset(){buildView();shown=0;grid.innerHTML="";document.getElementById("empty").classList.toggle("hidden",view.length>0);renderMore()}
  new IntersectionObserver(entries=>{if(entries.some(e=>e.isIntersecting)&&shown<view.length)renderMore()},{rootMargin:"600px"}).observe(document.getElementById("sentinel"));
  grid.addEventListener("click",event=>{const tile=event.target.closest("button[data-key]");if(tile)openEditor(tile.dataset.key)});
  document.getElementById("search").addEventListener("input",event=>{query=event.target.value;renderReset()});
  document.getElementById("mode").addEventListener("click",event=>{const button=event.target.closest("button[data-mode]");if(!button)return;mode=button.dataset.mode;document.querySelectorAll("#mode button").forEach(x=>x.classList.toggle("on",x===button));document.getElementById("filter").classList.toggle("hidden",mode==="works");document.getElementById("search").placeholder=mode==="works"?"Search titles, codes, or authors…":"Search captions, IDs, or codes…";renderReset()});
  document.getElementById("filter").addEventListener("click",event=>{const button=event.target.closest("button[data-kind]");if(!button)return;kind=button.dataset.kind;document.querySelectorAll("#filter button").forEach(x=>x.classList.toggle("on",x===button));renderReset()});

  function closeEditor(){selected=null;drawer.classList.add("hidden");document.getElementById("drawerShade").classList.add("hidden");drawer.innerHTML=""}
  document.getElementById("drawerShade").addEventListener("click",closeEditor);
  addEventListener("keydown",event=>{if(event.key==="Escape"){closeEditor();closeCodex()}});
  function openEditor(key){
    selected={type:mode==="works"?"work":"post",key};const item=selected.type==="work"?workByCode[key]:postById[key];if(!item)return;
    const post=selected.type==="work"?heroForWork(key):item,title=selected.type==="work"?item.title:postTitle(item),changed=Boolean((selected.type==="work"?curation.works:curation.posts)?.[key]);
    drawer.innerHTML=`<div class="drawer-head"><div><h2>${esc(title)}</h2><p>${selected.type==="work"?`Whistlegraph [${esc(key)}]`:`Archive post ${esc(key)}`}</p></div><button class="close" aria-label="Close editor">×</button></div>
      <div class="hero"><img src="${post?thumb(post.id):""}" alt=""><div class="facts">${selected.type==="post"?`${esc(item.date||"date unknown")}<br>${fmt(item.views)} views · ${fmt(item.likes)} likes<br><a href="${esc(item.url)}" target="_blank" rel="noopener">Open original ↗</a><br><a href="/post/${encodeURIComponent(item.id)}" target="_blank">Open archive page ↗</a>`:`${esc(item.by||"")}<br>${item.year||""} · ${fmt(item.views)} views<br><a href="/${encodeURIComponent(item.code)}" target="_blank">Open Whistlegraph ↗</a>`}</div></div>
      ${selected.type==="post"?postFields(item):workFields(item)}
      <div class="actions"><button class="danger" id="reset" ${changed&&!PREVIEW?"":"disabled"}>Restore generated data</button><button class="primary save" id="save" ${PREVIEW?"disabled":""}>Save live</button></div>`;
    drawer.querySelector(".close").addEventListener("click",closeEditor);drawer.querySelector("#save").addEventListener("click",saveEditor);drawer.querySelector("#reset").addEventListener("click",resetEditor);
    drawer.classList.remove("hidden");document.getElementById("drawerShade").classList.remove("hidden");
  }
  function postFields(p){return `<label for="postKind">Post type</label><select class="field" id="postKind"><option value="performance" ${p.kind==="performance"?"selected":""}>Performance</option><option value="talk" ${p.kind==="talk"?"selected":""}>Talk</option><option value="other" ${p.kind==="other"?"selected":""}>Other</option></select>
    <label for="postWorks">Whistlegraph relationships</label><input class="field" id="postWorks" value="${esc((p.works||[]).join(", "))}" placeholder="sos, imab" list="workCodes"><p class="hint">Comma-separated codes. Empty means this post is unfiled.</p>
    <label for="postPlots">Plots / narrative events</label><input class="field" id="postPlots" value="${esc((p.plots||[]).join(", "))}" placeholder="Us Kidnapping You"><p class="hint">Comma-separated plot names.</p>
    <label for="postDesc">Caption / description</label><textarea class="field" id="postDesc">${esc(p.desc||"")}</textarea>`}
  function workFields(w){return `<label for="workTitle">Title</label><input class="field" id="workTitle" value="${esc(w.title||"")}"><label for="workBy">Composed by</label><input class="field" id="workBy" value="${esc(w.by||"")}"><label for="workYear">Year</label><input class="field" id="workYear" type="number" min="1900" max="2200" value="${esc(w.year||"")}"><label for="workColor">Archive color</label><input class="field" id="workColor" type="color" value="${esc(w.c||"#b44887")}"><p class="hint">Codes remain immutable here so shared links and Aesthetic Computer commands cannot be broken accidentally.</p>`}
  async function saveEditor(){
    if(!selected||PREVIEW)return;const patch=selected.type==="post"?{kind:drawer.querySelector("#postKind").value,works:splitList(drawer.querySelector("#postWorks").value),plots:splitList(drawer.querySelector("#postPlots").value),desc:drawer.querySelector("#postDesc").value}:{title:drawer.querySelector("#workTitle").value,by:drawer.querySelector("#workBy").value,year:Number(drawer.querySelector("#workYear").value),c:drawer.querySelector("#workColor").value};
    const button=drawer.querySelector("#save");button.disabled=true;button.textContent="Saving…";
    try{const result=await getJSON(API,{method:"PATCH",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:JSON.stringify({...selected,patch})});curation[selected.type==="work"?"works":"posts"][selected.key]=result.patch;applyCuration();renderReset();openEditor(selected.key);toast("Saved live")}
    catch(error){toast(error.message);button.disabled=false;button.textContent="Save live"}
  }
  async function resetEditor(){
    if(!selected||PREVIEW)return;const current={...selected};
    try{await getJSON(API,{method:"PATCH",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:JSON.stringify({...current,reset:true})});delete curation[current.type==="work"?"works":"posts"][current.key];applyCuration();renderReset();openEditor(current.key);toast("Restored generated data")}
    catch(error){toast(error.message)}
  }
  init();
  </script>
</body>
</html>

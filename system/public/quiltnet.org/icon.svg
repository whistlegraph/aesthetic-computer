<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 63 63">
  <title>quiltnet — double friendship star</title>
  <!-- butter cream backdrop -->
  <rect width="63" height="63" fill="#fef3c7"/>

  <!-- back inner star: CCW pearl HSTs peeking behind -->
  <g fill="#e7e5e4">
    <polygon points="21,0 21,21 42,21"/>
    <polygon points="63,21 42,21 42,42"/>
    <polygon points="21,42 42,42 42,63"/>
    <polygon points="0,42 21,42 21,21"/>
  </g>

  <!-- front inner star: CW mid-blue HSTs + center cell -->
  <g fill="#3b82f6">
    <rect x="21" y="21" width="21" height="21"/>
    <polygon points="21,21 42,21 42,0"/>
    <polygon points="42,21 42,42 63,42"/>
    <polygon points="21,42 42,42 21,63"/>
    <polygon points="0,21 21,21 21,42"/>
  </g>

  <!-- outer star: tomato HSTs at the four corners -->
  <g fill="#ef4444">
    <polygon points="0,0 21,0 0,21"/>
    <polygon points="63,0 42,0 63,21"/>
    <polygon points="0,63 0,42 21,63"/>
    <polygon points="63,63 63,42 42,63"/>
  </g>

  <!-- faux running stitch — colorized per zone -->
  <g stroke-width="0.7" stroke-dasharray="1.6 1.2" stroke-linecap="round" opacity="0.85" fill="none">
    <!-- 3x3 cell grid (interior) — pearl thread -->
    <g stroke="#e7e5e4">
      <line x1="21" y1="0" x2="21" y2="63"/>
      <line x1="42" y1="0" x2="42" y2="63"/>
      <line x1="0" y1="21" x2="63" y2="21"/>
      <line x1="0" y1="42" x2="63" y2="42"/>
    </g>
    <!-- corner HST diagonals — blue thread -->
    <g stroke="#3b82f6">
      <line x1="0" y1="21" x2="21" y2="0"/>
      <line x1="42" y1="0" x2="63" y2="21"/>
      <line x1="0" y1="42" x2="21" y2="63"/>
      <line x1="42" y1="63" x2="63" y2="42"/>
    </g>
    <!-- edge HST diagonals — tomato thread -->
    <g stroke="#ef4444">
      <line x1="21" y1="0" x2="42" y2="21"/>
      <line x1="21" y1="21" x2="42" y2="0"/>
      <line x1="42" y1="21" x2="63" y2="42"/>
      <line x1="42" y1="42" x2="63" y2="21"/>
      <line x1="21" y1="42" x2="42" y2="63"/>
      <line x1="21" y1="63" x2="42" y2="42"/>
      <line x1="0" y1="21" x2="21" y2="42"/>
      <line x1="0" y1="42" x2="21" y2="21"/>
    </g>
  </g>
</svg>

<!-- drvkforlife.com — provisional placeholder ahead of mid-June 2026 relaunch -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>drvkforlife</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="drvkforlife.com — Nevada Natural Living. Relaunching mid-June 2026."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://drvkforlife.com" />
    <meta property="og:title" content="drvkforlife" />
    <meta
      property="og:description"
      content="Nevada Natural Living. Relaunching mid-June 2026."
    />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5efe2;
        --paper: #fbf6ea;
        --ink: #2b2118;
        --ink-muted: #6b5b48;
        --copper: #b06a3b;
        --copper-deep: #8a4a23;
        --leaf: #4a6b3a;
        --serif: "EB Garamond", Georgia, "Times New Roman", serif;
        --sans:
          -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial,
          sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1610;
          --paper: #261d14;
          --ink: #f5efe2;
          --ink-muted: #c9b89a;
          --copper: #e09765;
          --copper-deep: #f0b07e;
          --leaf: #a3c48a;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--serif);
        font-size: 19px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2.5rem 1.5rem 3rem;
      }

      main {
        max-width: 38rem;
        width: 100%;
        text-align: center;
      }

      .mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: var(--paper);
        border: 1.5px solid var(--copper);
        margin: 0 auto 1.5rem;
        box-shadow: 0 6px 20px rgba(120, 70, 30, 0.12);
      }

      .mark svg {
        width: 52px;
        height: 52px;
      }

      h1 {
        font-size: clamp(2.4rem, 6vw, 3.4rem);
        line-height: 1;
        letter-spacing: -0.02em;
        margin: 0 0 0.4rem;
        color: var(--copper-deep);
        font-weight: 600;
      }

      .tagline {
        font-style: italic;
        color: var(--ink-muted);
        margin: 0 0 2rem;
        font-size: 1.05rem;
      }

      .rule {
        width: 60px;
        height: 1px;
        background: var(--copper);
        opacity: 0.4;
        margin: 1.5rem auto;
        border: none;
      }

      .note {
        color: var(--ink);
        font-size: 1.08rem;
      }

      .note p {
        margin: 0 0 0.9rem;
      }

      .when {
        display: inline-block;
        padding: 0.4rem 0.9rem;
        border: 1px solid var(--copper);
        border-radius: 999px;
        font-size: 0.92rem;
        letter-spacing: 0.04em;
        color: var(--copper-deep);
        background: var(--paper);
        margin-top: 0.4rem;
      }

      footer {
        margin-top: 3rem;
        font-size: 0.84rem;
        color: var(--ink-muted);
        font-family: var(--sans);
        letter-spacing: 0.02em;
      }

      footer a {
        color: var(--copper-deep);
        text-decoration: none;
        border-bottom: 1px dotted var(--copper);
      }

      footer a:hover {
        color: var(--leaf);
        border-bottom-color: var(--leaf);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M32 6 C 22 22, 14 32, 14 42 a 18 18 0 1 0 36 0 c 0 -10 -8 -20 -18 -36 Z"
            fill="var(--copper)"
            opacity="0.18"
            stroke="var(--copper-deep)"
            stroke-width="1.5"
          />
          <path
            d="M24 44 q 8 -6 16 0"
            stroke="var(--copper-deep)"
            stroke-width="1.5"
            fill="none"
            stroke-linecap="round"
          />
          <path
            d="M22 50 q 10 -5 20 0"
            stroke="var(--copper-deep)"
            stroke-width="1.5"
            fill="none"
            stroke-linecap="round"
            opacity="0.55"
          />
        </svg>
      </div>

      <h1>drvk for life</h1>
      <p class="tagline">Nevada Natural Living</p>

      <hr class="rule" />

      <div class="note">
        <p>The new drvkforlife.com is being rebuilt.</p>
        <p>Live booking, product registration, and the full product line are coming soon.</p>
        <span class="when">Launching mid-June 2026</span>
      </div>

      <footer>
        Inquiries — <a href="mailto:lorettadarlingnicola@gmail.com">lorettadarlingnicola@gmail.com</a>
      </footer>
    </main>
  </body>
</html>

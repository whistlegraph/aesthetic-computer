<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AC · p5 host</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: transparent; overflow: hidden; }
  body { color: #f88; font-family: ui-monospace, Menlo, monospace; }
  canvas { display: block; }
  #ac-p5-err { padding: 1em; white-space: pre-wrap; }
</style>
<script src="https://cdn.jsdelivr.net/npm/p5@1.10.0/lib/p5.min.js"></script>
</head>
<body>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const src = params.get('src');
  if (!src) {
    document.body.insertAdjacentHTML('beforeend',
      '<pre id="ac-p5-err">no ?src= parameter — host expects ?src=/path/to/sketch.js</pre>');
    return;
  }
  try {
    const res = await fetch(src, { cache: 'no-store' });
    if (!res.ok) throw new Error('fetch ' + res.status + ' ' + res.statusText + ' — ' + src);
    const code = await res.text();
    // Evaluate the sketch in global scope so window.setup / window.draw exist.
    (0, eval)(code);
    // p5's auto-start window has already passed by the time we fetched + eval'd,
    // so kick it manually. Global mode picks up window.setup / window.draw.
    if (typeof window.setup === 'function' || typeof window.draw === 'function') {
      new p5();
    } else {
      throw new Error('sketch defined neither setup() nor draw()');
    }
  } catch (err) {
    document.body.insertAdjacentHTML('beforeend',
      '<pre id="ac-p5-err">' + String(err && err.stack || err) + '</pre>');
    console.error('[ac-p5-host]', err);
  }
})();
</script>
</body>
</html>

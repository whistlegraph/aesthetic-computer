version: 1.0.{build}
image: Visual Studio 2022
clone_depth: 1

clone_script:
  - cmd: git init .
  - cmd: git remote add origin https://github.com/whistlegraph/aesthetic-computer.git
  - cmd: git config core.sparseCheckout true
  - cmd: echo xbox/native-latency/>>.git\info\sparse-checkout
  - cmd: echo appveyor.yml>>.git\info\sparse-checkout
  - cmd: git fetch --depth=1 origin %APPVEYOR_REPO_COMMIT%
  - cmd: git checkout --detach FETCH_HEAD

environment:
  solution: xbox\native-latency\XboxLatency.sln
  project_root: xbox\native-latency
  package_dir: C:\projects\aesthetic-computer\artifacts\
  cert_password: aesthetic-xbox-ci

install:
  - ps: |
      $assets = Join-Path $env:APPVEYOR_BUILD_FOLDER "$env:project_root\Assets"
      New-Item -ItemType Directory -Force $assets | Out-Null
      Add-Type -AssemblyName System.Drawing
      function Write-Asset($name, $width, $height) {
        $bitmap = [Drawing.Bitmap]::new($width, $height)
        $graphics = [Drawing.Graphics]::FromImage($bitmap)
        $graphics.Clear([Drawing.Color]::FromArgb(18, 15, 26))
        $graphics.FillEllipse([Drawing.Brushes]::Gold, $width * .2, $height * .2, $width * .6, $height * .6)
        $bitmap.Save((Join-Path $assets $name), [Drawing.Imaging.ImageFormat]::Png)
        $graphics.Dispose(); $bitmap.Dispose()
      }
      Write-Asset 'Square150x150Logo.png' 150 150
      Write-Asset 'Square44x44Logo.png' 44 44
      Write-Asset 'Wide310x150Logo.png' 310 150
      Write-Asset 'SplashScreen.png' 620 300
      Write-Asset 'StoreLogo.png' 50 50
      $cert = New-SelfSignedCertificate -Type Custom -Subject 'CN=AestheticComputerDev' `
        -KeyUsage DigitalSignature -FriendlyName 'AC Xbox CI' -CertStoreLocation 'Cert:\CurrentUser\My'
      $password = ConvertTo-SecureString $env:cert_password -AsPlainText -Force
      Export-PfxCertificate -Cert $cert `
        -FilePath (Join-Path $env:APPVEYOR_BUILD_FOLDER "$env:project_root\XboxLatency_TemporaryKey.pfx") `
        -Password $password | Out-Null

build_script:
  - cmd: >-
      msbuild "%solution%" /restore /m
      /p:Configuration=Release /p:Platform=x64
      /p:GenerateAppxPackageOnBuild=true /p:AppxBundle=Never
      /p:UapAppxPackageBuildMode=SideloadOnly
      /p:PackageCertificatePassword=%cert_password%
      /p:AppxPackageDir=%package_dir%

test: off

artifacts:
  - path: artifacts\**\*
    name: xbox-native-latency-x64

branches:
  only:
    - main

version: 1.0.{build}
image: Visual Studio 2022
clone_depth: 1
rolling_builds: true

only_commits:
  files:
    - xbox/
    - appveyor.yml

clone_script:
  - cmd: git init .
  - cmd: git remote add origin https://github.com/whistlegraph/aesthetic-computer.git
  - cmd: git config core.sparseCheckout true
  - cmd: echo xbox/native-latency/>>.git\info\sparse-checkout
  - cmd: echo xbox/dynamic-shell/>>.git\info\sparse-checkout
  - cmd: echo appveyor.yml>>.git\info\sparse-checkout
  - cmd: git fetch --depth=1 --filter=blob:none origin %APPVEYOR_REPO_COMMIT%
  - cmd: git checkout --detach FETCH_HEAD

environment:
  package_dir: C:\projects\aesthetic-computer\artifacts\
  cert_password: aesthetic-xbox-ci

install:
  - ps: |
      Add-Type -AssemblyName System.Drawing
      function Write-Asset($assets, $name, $width, $height) {
        $bitmap = [Drawing.Bitmap]::new($width, $height)
        $graphics = [Drawing.Graphics]::FromImage($bitmap)
        $graphics.Clear([Drawing.Color]::FromArgb(18, 15, 26))
        $graphics.FillEllipse([Drawing.Brushes]::Gold, $width * .2, $height * .2, $width * .6, $height * .6)
        $bitmap.Save((Join-Path $assets $name), [Drawing.Imaging.ImageFormat]::Png)
        $graphics.Dispose(); $bitmap.Dispose()
      }
      $password = ConvertTo-SecureString $env:cert_password -AsPlainText -Force
      foreach ($project in @('xbox\native-latency', 'xbox\dynamic-shell')) {
        $root = Join-Path $env:APPVEYOR_BUILD_FOLDER $project
        $assets = Join-Path $root 'Assets'
        New-Item -ItemType Directory -Force $assets | Out-Null
        Write-Asset $assets 'Square150x150Logo.png' 150 150
        Write-Asset $assets 'Square44x44Logo.png' 44 44
        Write-Asset $assets 'Wide310x150Logo.png' 310 150
        Write-Asset $assets 'SplashScreen.png' 620 300
        Write-Asset $assets 'StoreLogo.png' 50 50
        $cert = New-SelfSignedCertificate -Type Custom -Subject 'CN=AestheticComputerDev' `
          -KeyUsage DigitalSignature -KeyExportPolicy Exportable -HashAlgorithm SHA256 `
          -TextExtension @('2.5.29.37={text}1.3.6.1.5.5.7.3.3') `
          -FriendlyName 'AC Xbox CI' -CertStoreLocation 'Cert:\CurrentUser\My'
        $key = if ($project -like '*native-latency') { 'XboxLatency_TemporaryKey.pfx' } else { 'DynamicShell_TemporaryKey.pfx' }
        Export-PfxCertificate -Cert $cert -FilePath (Join-Path $root $key) -Password $password | Out-Null
      }

build_script:
  - cmd: >-
      msbuild "xbox\native-latency\XboxLatency.sln" /restore /m
      /p:Configuration=Release /p:Platform=x64
      /p:GenerateAppxPackageOnBuild=true /p:AppxBundle=Never
      /p:UapAppxPackageBuildMode=SideloadOnly
      /p:PackageCertificatePassword=%cert_password%
      /p:AppxPackageDir=%package_dir%native-latency\
  - cmd: >-
      msbuild "xbox\dynamic-shell\DynamicShell.sln" /restore /m
      /p:Configuration=Release /p:Platform=x64
      /p:GenerateAppxPackageOnBuild=true /p:AppxBundle=Never
      /p:UapAppxPackageBuildMode=SideloadOnly
      /p:PackageCertificatePassword=%cert_password%
      /p:AppxPackageDir=%package_dir%dynamic-shell\

test: off

artifacts:
  - path: artifacts\native-latency\**\*
    name: xbox-native-latency-x64
  - path: artifacts\dynamic-shell\**\*
    name: xbox-dynamic-shell-x64

branches:
  only:
    - main

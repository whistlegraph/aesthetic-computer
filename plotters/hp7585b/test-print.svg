<?xml version="1.0" encoding="UTF-8"?>
<!--
  HP 7585B test print. Sized for ISO A3 (420x297 mm). Convert with:
    vpype read test-print.svg write -d hp7585b -p a3 test-print.hpgl
  Then send: hp7585bplot test-print.hpgl

  Verifies: frame clipping, full-extent travel (diagonals), curve smoothness
  (circle), pen accuracy (crosshair), and color/pen swap if multiple pens
  are loaded — vpype layers map 1:1 to pen carousel slots.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="420mm" height="297mm"
     viewBox="0 0 420 297"
     stroke-width="0.4" fill="none">

  <!-- Layer 1 (pen 1): outer frame + diagonals at 10 mm margin -->
  <g inkscape:groupmode="layer" inkscape:label="1" stroke="black"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape">
    <rect x="10" y="10" width="400" height="277" />
    <line x1="10"  y1="10"  x2="410" y2="287" />
    <line x1="410" y1="10"  x2="10"  y2="287" />
  </g>

  <!-- Layer 2 (pen 2): centered circle + crosshair -->
  <g inkscape:groupmode="layer" inkscape:label="2" stroke="red"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape">
    <circle cx="210" cy="148.5" r="60" />
    <line x1="140" y1="148.5" x2="280" y2="148.5" />
    <line x1="210" y1="78.5"  x2="210" y2="218.5" />
  </g>

  <!-- Layer 3 (pen 3): label, hand-stroked so it actually plots -->
  <g inkscape:groupmode="layer" inkscape:label="3" stroke="blue"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     font-family="monospace" font-size="6">
    <text x="20" y="25">AC * HP 7585B * vpype HPGL test</text>
    <text x="20" y="282">a3 metric * pen carousel 1-3</text>
  </g>
</svg>

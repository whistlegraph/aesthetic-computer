# HP 7585B vpype HPGL device profile.
#
# Drop this into ~/.vpype.toml (or pass --config /path/to/this/file on every
# invocation). vpype merges device tables from the user config into its
# bundled set, so this adds `hp7585b` without touching anything shipped.
#
# Spec sources:
#   • plotter unit = 0.025 mm  (40 units / mm)            — HP 7585B service spec
#   • pen carousel = 8                                     — HP 7585B service spec
#   • plot-area margins = 5 / 5 / 5 / 29 mm                — HP 7585B I&P manual,
#                                                            Table 1-2 supplemental
#   • paper range = 203×267 mm  →  927×1190 mm cut sheet   — HP 7585B service spec
#
# Plot-area numbers below are derived from (paper_long − 34 mm, paper_short −
# 10 mm) × 40 units/mm. They are nominal — verify against your actual sheet
# load and adjust if the plotter clips. Origin is bottom-left of plottable
# area (HP plotters are y-up natively), and the long edge is X.

[device.hp7585b]
name = "HP 7585B"
plotter_unit_length = "0.025mm"
pen_count = 8
info = """
HP 7585B drafting plotter (1983, A0/E-size, 8-pen carousel).
Default RS-232: 9600 8N1, hardware (Xon/Xoff) flow control.
Set DIP switches on the rear panel before first use. Always run a confidence
test (front panel) once after powering on.
"""

# ---------- ISO sizes ----------

[[device.hp7585b.paper]]
name = "a4"
aka_names = ["A4"]
paper_size = ["297mm", "210mm"]
x_range = [0, 10520]
y_range = [0, 8000]
y_axis_up = true
origin_location = ["5mm", "205mm"]
final_pu_params = "0,0"
set_ps = 4
info = "ISO A4. Long edge along X. Plotter must be in Metric mode."


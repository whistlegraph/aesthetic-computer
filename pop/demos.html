<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pop dashboard — songs · instruments · tools</title>
<script>
  // apply the theme before first paint (no flash): ?theme= wins, then
  // the saved choice, then the dark default.
  document.documentElement.dataset.theme =
    new URLSearchParams(location.search).get("theme") ||
    localStorage.getItem("pop-theme") || "dark";
</script>
<style>
  /* themeable surfaces — only --bg/--panel/--ink/--mute/--line change.
     "screen" blacks (canvases, code-out, text inputs) stay dark on
     purpose across every theme. */
  /* :root is the no-JS fallback; the [data-theme] blocks that follow
     share its specificity and win by source order. */
  :root, [data-theme="dark"] {   /* warm near-black — AC house default */
    --bg:#0d0c0b; --panel:#181613; --ink:#ece6d6; --mute:#8c8576; --line:#36322a;
  }
  [data-theme="light"] {  /* cream paper — the pop-menu print look */
    --bg:#f4efe2; --panel:#faf6ec; --ink:#1a1712; --mute:#6b6353; --line:#cabfa0;
  }
  [data-theme="noir"] {   /* pure high-contrast black & white */
    --bg:#000000; --panel:#0e0e0e; --ink:#ffffff; --mute:#7d7d7d; --line:#333333;
  }
  [data-theme="term"] {   /* phosphor-green terminal */
    --bg:#04070a; --panel:#0a1410; --ink:#86e89a; --mute:#4d7a58; --line:#1c3527;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Berkeley Mono","Latin Modern Mono",Menlo,monospace;
    background: var(--bg); color: var(--ink);
    margin: 0; font-size: 12px; line-height: 1.4;
    -webkit-font-smoothing: none; font-smooth: never;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 15px; border-bottom: 1px solid var(--line);
  }
  h1 { font-size: 17px; letter-spacing: 0.14em; margin: 0; text-transform: lowercase; }
  h1::before { content: "♪ "; color: var(--mute); }
  .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 11px; }
  .hdr-theme { font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase;
               color: var(--mute); display: inline-flex; align-items: center; gap: 5px; }
  /* responsive masonry — columns scale with viewport width */
  main {
    max-width: 1660px; margin: 0 auto; padding: 13px 13px 44px;
    column-width: 22rem; column-gap: 12px;
  }
  .demo-card {
    break-inside: avoid; display: inline-block; width: 100%;
    margin-bottom: 12px; border: 1px solid var(--line);
    border-left: 3px solid var(--accent,#555);
    background: var(--panel); padding: 9px 11px 11px;
  }
  .demo-card h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
    margin: 1px 0 0; color: var(--accent,#ccc);
  }
  .demo-card .cat { font-size: 7.5px; letter-spacing: 0.16em;
                    text-transform: uppercase; color: var(--mute); }
  .demo-card .blurb { color: var(--mute); margin: 3px 0 8px; font-size: 10.5px;
                      line-height: 1.34; }
  .demo-body { display: flex; flex-direction: column; gap: 6px; }
  .demo-row { display: flex; flex-wrap: wrap; gap: 5px 10px; align-items: center; }
  canvas { width: 100%; height: 96px; display: block;
           border: 1px solid var(--line); background: #000; }
  .demo-btn {
    font: inherit; font-size: 10.5px; cursor: pointer;
    background: var(--accent,#333); color: #0d0c0b;
    border: none; padding: 4px 10px; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .demo-btn:hover { filter: brightness(1.15); }
  .demo-btn:active { transform: translateY(1px); }
  .demo-btn[disabled] { opacity: 0.4; cursor: default; }
  .demo-ctl { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; }
  .demo-lbl { color: var(--mute); }
  .demo-num { color: var(--ink); min-width: 26px; }
  .demo-ctl input[type=range] { width: 92px; accent-color: var(--accent,#888); }
  .demo-sel { font: inherit; font-size: 10px; padding: 1px 4px;
              background: var(--bg); color: var(--ink); border: 1px solid var(--line); }
  .demo-status { font-size: 10px; color: var(--mute); min-height: 1.3em;
                 white-space: pre-wrap; }
  .demo-out {
    font-size: 10px; line-height: 1.36; background: #000; color: #b9d98a;
    border: 1px solid var(--line); padding: 6px 8px; max-height: 150px;
    overflow: auto; white-space: pre-wrap;
  }
  .demo-err { color: #e0593f; font-size: 10.5px; }
  textarea {
    font: inherit; font-size: 10px; width: 100%; color: var(--ink);
    background: var(--bg); border: 1px solid var(--line); padding: 5px;
  }
  footer { text-align: center; font-size: 8px; letter-spacing: 0.16em;
           text-transform: uppercase; color: var(--mute);
           padding: 14px; border-top: 1px solid var(--line); }
  footer a { color: var(--mute); }

  /* ── dashboard sections ─────────────────────────────────────────── */
  .db-dashboard { max-width: 1660px; margin: 0 auto; padding: 14px 13px 0; }
  .db-load-err {
    max-width: 1660px; margin: 14px auto 0;
    padding: 8px 13px; color: #e0593f; font-size: 10.5px;
    border: 1px solid var(--line); border-left: 3px solid #e0593f;
    background: var(--panel);
  }
  .db-section {
    font-size: 8px; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--mute); margin: 0 0 8px; font-weight: normal;
    padding-bottom: 4px; border-bottom: 1px solid var(--line);
  }
  .db-section-wrap { margin-bottom: 20px; }

  /* badge — shared by jukebox + instruments */
  .db-badge {
    font-size: 7px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #0d0c0b; background: var(--badge,#8c8576);
    padding: 1.5px 5px; flex-shrink: 0;
  }

  /* songs — jukebox */
  .db-jukebox-now {
    position: sticky; top: 0; z-index: 6;
    display: flex; align-items: center; gap: 11px;
    background: #000; border: 1px solid var(--line);
    border-left: 3px solid #b5331f;
    padding: 6px 10px; margin-bottom: 7px;
  }
  .db-now-tag { font-size: 7px; letter-spacing: 0.22em; text-transform: uppercase;
                color: #8c8576; flex-shrink: 0; }
  .db-now-label { font-size: 11px; white-space: nowrap; flex-shrink: 0;
                  text-transform: uppercase; letter-spacing: 0.05em; color: #ece6d6; }
  .db-jukebox-now audio { height: 30px; flex: 1; min-width: 150px; }
  .db-jukebox-list { border: 1px solid var(--line); }
  .db-jukebox-row {
    display: flex; align-items: baseline; gap: 9px;
    padding: 4px 9px; cursor: pointer; font-size: 11px;
    border-left: 3px solid var(--accent,#555);
    border-bottom: 1px solid var(--line);
  }
  .db-jukebox-row:last-child { border-bottom: none; }
  .db-jukebox-row:hover { background: var(--panel); }
  .db-jukebox-row.playing { background: var(--panel); }
  .db-jukebox-row.playing .db-jb-title { color: var(--accent); }
  .db-jukebox-row.noaudio { cursor: default; opacity: 0.4; }
  .db-jb-glyph { color: var(--accent,#888); width: 0.9em; flex-shrink: 0; }
  .db-jb-title { text-transform: uppercase; letter-spacing: 0.05em;
                 min-width: 7rem; flex-shrink: 0; }
  .db-jb-meta { color: var(--mute); font-size: 8.5px; letter-spacing: 0.09em;
                text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
  .db-jb-blurb { color: var(--mute); font-size: 9.5px; flex: 1;
                 overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .db-jb-no { color: var(--mute); font-size: 7.5px; text-transform: uppercase;
              letter-spacing: 0.14em; flex-shrink: 0; }

  /* instruments — responsive grid */
  .db-inst-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(17rem, 1fr));
    gap: 9px;
  }
  .db-inst-card {
    background: var(--panel); border: 1px solid var(--line);
    border-left: 3px solid var(--accent,#555); padding: 8px 11px 10px;
  }
  .db-inst-label {
    font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--accent,#ccc); margin-bottom: 3px;
  }
  .db-blurb  { color: var(--mute); margin: 0 0 6px; font-size: 10.5px; line-height: 1.34; }
  .db-pending { font-size: 9.5px; color: var(--mute); margin: 4px 0 0; font-style: italic; }
  .db-audio-wrap audio { width: 100%; height: 28px; display: block; margin-top: 5px; }
  .db-chips { display: flex; flex-wrap: wrap; gap: 4px; margin: 5px 0 6px; }
  .db-chip {
    font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase;
    border: 1px solid var(--line); color: var(--mute);
    padding: 1px 5px; white-space: nowrap;
  }
  .db-caption { font-size: 8px; color: var(--mute); margin: 5px 0 0;
                letter-spacing: 0.06em; }

  /* tool demos band */
  .db-tool-heading {
    max-width: 1660px; margin: 0 auto; padding: 0 13px 8px;
    font-size: 8px; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--mute); border-bottom: 1px solid var(--line);
  }

  /* ── picker rows (shared by song + sound sections) ─────────────── */
  .db-picker-row {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .db-picker-lbl {
    font-size: 7.5px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--mute); flex-shrink: 0;
  }
  .db-picker-sep { color: var(--line); flex-shrink: 0; }
  .db-song-sel  { min-width: 18rem; max-width: 100%; }
  .db-cat-sel   { min-width: 10rem; }
  .db-sound-sel { min-width: 12rem; }

  /* ── song detail panel ─────────────────────────────────────────── */
  .db-song-detail {
    border: 1px solid var(--line); border-left: 3px solid #b5331f;
    background: var(--panel); padding: 8px 11px 9px; min-height: 3.5rem;
  }
  .db-song-meta-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .db-song-blurb {
    color: var(--mute); font-size: 10.5px; line-height: 1.34;
    margin: 3px 0 0;
  }
  .db-song-distrib {
    font-size: 8.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--mute); margin: 4px 0 0;
  }

  /* ── sound detail panel ────────────────────────────────────────── */
  .db-sound-panel {
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent, #555);
    background: var(--panel); padding: 8px 11px 10px; min-height: 4rem;
  }
  .db-sound-label {
    font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--accent, #ccc); margin-bottom: 3px;
  }
  .db-sound-meta {
    font-size: 8.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--mute); margin: 3px 0 0;
  }
</style>
</head>
<body>
  <header>
    <h1>pop</h1>
    <div class="hdr-right">
      <label class="hdr-theme">theme
        <select id="theme" class="demo-sel">
          <option value="dark">dark</option>
          <option value="light">light</option>
          <option value="noir">noir</option>
          <option value="term">term</option>
        </select>
      </label>
      <button id="gate" class="demo-btn" style="--accent:#b5331f">▶ enable audio</button>
    </div>
  </header>
  <div id="db-tool-heading" class="db-tool-heading">tool demos</div>
  <main id="demos"></main>
  <footer>
    aesthetic.computer · /pop ·
    <a href="https://github.com/whistlegraph/aesthetic-computer/tree/main/pop">source</a>
  </footer>

<script type="module">
import { resume, stopAll } from "./lib/demo-kit.mjs";
import { mountDashboard } from "./demos/dashboard.mjs";

// Each demo: { title, blurb, accent, cat, mount(rootEl) }. Modules
// export a `demos` object keyed by demo id.
const CATS = {
  fx:        { label: "fx",       accent: "#c0631a" },
  analysis:  { label: "analysis", accent: "#1d7a8a" },
  score:     { label: "score",    accent: "#5a6b1f" },
  forms:     { label: "forms",    accent: "#8a5223" },
};

// Render order + which category each belongs to (for the chip + color).
const ORDER = [
  ["ringmod",             "fx"],
  ["vocoder",             "fx"],
  ["envelope-follower",   "analysis"],
  ["pitch-track",         "analysis"],
  ["audio-gate",          "analysis"],
  ["audio-to-rhythm",     "score"],
  ["fib-meter",           "forms"],
  ["note-subdiv",         "score"],
  ["species-counterpoint","forms"],
];

const MODULES = [
  "./demos/fx-demos.mjs",
  "./demos/analysis-demos.mjs",
  "./demos/structure-demos.mjs",
];

const gate = document.getElementById("gate");
gate.addEventListener("click", async () => {
  await resume();
  gate.textContent = "♪ audio enabled";
  gate.disabled = true;
});

// theme picker — applied early by the <head> script; persist on change
const themeSel = document.getElementById("theme");
themeSel.value = document.documentElement.dataset.theme || "dark";
themeSel.addEventListener("change", () => {
  document.documentElement.dataset.theme = themeSel.value;
  localStorage.setItem("pop-theme", themeSel.value);
});

// Mount dashboard sections (songs + instruments) before the tool demos heading.
const toolHeading = document.getElementById("db-tool-heading");
mountDashboard(toolHeading).catch((err) => {
  console.error("dashboard mount failed:", err);
});

const root = document.getElementById("demos");
const registry = {};
for (const path of MODULES) {
  try {
    const mod = await import(path);
    Object.assign(registry, mod.demos || {});
  } catch (err) {
    console.error("demo module failed:", path, err);
    root.append(card(path, "module", "#b5331f",
      `failed to load ${path} — ${err.message}`, () => {}));
  }
}

function card(title, cat, accent, blurb, mount) {
  const c = document.createElement("section");
  c.className = "demo-card";
  c.style.setProperty("--accent", accent);
  c.innerHTML =
    `<div class="cat">${cat}</div><h2>${title}</h2>` +
    `<div class="blurb">${blurb}</div>`;
  const body = document.createElement("div");
  body.className = "demo-body";
  c.append(body);
  try { mount(body); }
  catch (err) {
    body.append(Object.assign(document.createElement("div"),
      { className: "demo-err", textContent: "demo error: " + err.message }));
    console.error(title, err);
  }
  return c;
}

for (const [id, catKey] of ORDER) {
  const d = registry[id];
  const cat = CATS[catKey];
  if (!d) {
    root.append(card(id, cat.label, "#b5331f",
      "demo not registered — module missing or not exporting this id", () => {}));
    continue;
  }
  root.append(card(d.title || id, cat.label, d.accent || cat.accent,
    d.blurb || "", d.mount));
}

// Stop sound when the tab is hidden.
document.addEventListener("visibilitychange", () => {
  if (document.hidden) stopAll();
});
</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- whole guy leans a touch -->
  <g transform="rotate(-6 64 64)">
    <!-- star body -->
    <path d="M64 8 L78.1 44.6 L117.3 46.7 L86.8 71.4 L96.9 109.3 L64 88 L31.1 109.3 L41.2 71.4 L10.7 46.7 L49.9 44.6 Z"
          fill="#D7DDE3" stroke="#98A1AC" stroke-width="5" stroke-linejoin="round"/>
    <!-- glint -->
    <ellipse cx="50" cy="40" rx="6" ry="9" fill="#F4F8FC" opacity="0.9" transform="rotate(-22 50 40)"/>
    <!-- cheeks -->
    <ellipse cx="44" cy="71" rx="7.5" ry="5" fill="#FF9DB0" opacity="0.75"/>
    <ellipse cx="84" cy="71" rx="7.5" ry="5" fill="#FF9DB0" opacity="0.75"/>
    <!-- left eye winks, right stays open -->
    <path d="M46 61 Q52 56 58 61" fill="none" stroke="#2E343C" stroke-width="4" stroke-linecap="round"/>
    <circle cx="76" cy="60" r="6.2" fill="#2E343C"/>
    <circle cx="78" cy="58" r="2" fill="#FFFFFF"/>
    <!-- big open grin -->
    <path d="M51 72 Q64 88 77 72 Q64 80 51 72 Z" fill="#6E7681" stroke="#2E343C" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .float{ animation:float 6.5s ease-in-out infinite; transform-origin:50px 50px }
    .bob  { animation:bob 4.6s ease-in-out infinite; transform-origin:50px 58px }
    .body { animation:breathe 4.6s ease-in-out infinite; transform-origin:50px 74px }
    .leaf { animation:sway 3.2s ease-in-out infinite; transform-origin:62px 26px }
    .eyes { animation:blink 5.5s ease-in-out infinite; transform-origin:50px 52px }
    @keyframes float  { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-2px,-2px)} 66%{transform:translate(2px,-1px)} }
    @keyframes bob    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2.5px)} }
    @keyframes breathe{ 0%,100%{transform:scale(1,1)} 50%{transform:scale(1.05,0.95)} }
    @keyframes sway   { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(10deg)} }
    @keyframes blink  { 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.1)} }
  </style>
  <g class="float"><g class="bob">
    <path class="leaf" d="M62 27 q12 -9 18 -2 q-7 9 -18 6 z" fill="#6fbf73"/>
    <path d="M58 30 q2 -7 6 -10" stroke="#4e8f54" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <g class="body">
      <ellipse cx="50" cy="58" rx="30" ry="29" fill="#5b6bd6"/>
      <ellipse cx="40" cy="50" rx="14" ry="10" fill="#92a0ef" opacity="0.7"/>
      <path d="M50 32 l4 5 6 -2 -1 6 6 3 -6 3 1 6 -6 -2 -4 5 -4 -5 -6 2 1 -6 -6 -3 6 -3 -1 -6 6 2 z" fill="#3a4490"/>
      <circle cx="50" cy="38" r="3" fill="#2c346f"/>
      <g class="eyes" fill="#2b2b2b">
        <circle cx="42" cy="53" r="3.4"/>
        <circle cx="58" cy="53" r="3.4"/>
      </g>
      <circle cx="43.1" cy="51.8" r="1.1" fill="#fff"/>
      <circle cx="59.1" cy="51.8" r="1.1" fill="#fff"/>
      <path d="M46 62 q4 3.5 8 0" stroke="#2b2b2b" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <circle cx="35" cy="62" r="4" fill="#b08ae0" opacity="0.55"/>
      <circle cx="65" cy="62" r="4" fill="#b08ae0" opacity="0.55"/>
    </g>
  </g></g>
</svg>

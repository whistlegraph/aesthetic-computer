<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- panda state 2 — happy blink: closed-eye arcs, little smile with tongue. Same bear geometry as base. -->
  <g>
    <!-- ears -->
    <circle cx="34" cy="17" r="8.5" fill="#2b2b2b"/>
    <circle cx="66" cy="17" r="8.5" fill="#2b2b2b"/>
    <!-- body (white belly) -->
    <ellipse cx="50" cy="71" rx="20" ry="19" fill="#ffffff"/>
    <!-- arms -->
    <ellipse cx="33" cy="67" rx="7" ry="10.5" fill="#2b2b2b" transform="rotate(24 33 67)"/>
    <ellipse cx="67" cy="67" rx="7" ry="10.5" fill="#2b2b2b" transform="rotate(-24 67 67)"/>
    <!-- legs -->
    <ellipse cx="40" cy="87" rx="7.5" ry="7" fill="#2b2b2b"/>
    <ellipse cx="60" cy="87" rx="7.5" ry="7" fill="#2b2b2b"/>
    <!-- head -->
    <ellipse cx="50" cy="34" rx="23" ry="21" fill="#ffffff"/>
    <ellipse cx="41" cy="32.5" rx="6.5" ry="8.8" fill="#2b2b2b" transform="rotate(-18 41 32.5)"/>
    <ellipse cx="59" cy="32.5" rx="6.5" ry="8.8" fill="#2b2b2b" transform="rotate(18 59 32.5)"/>
    <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M38.2 35 Q41.5 32 44.8 35"/>
      <path d="M55.2 35 Q58.5 32 61.8 35"/>
    </g>
    <ellipse cx="50" cy="42" rx="3.2" ry="2.4" fill="#2b2b2b"/>
    <path d="M45.5 45.5 Q50 51 54.5 45.5 Z" fill="#2b2b2b"/>
    <ellipse cx="50" cy="47.5" rx="2.4" ry="1.5" fill="#ffb3c1"/>
    <circle cx="34.5" cy="42" r="4" fill="#ffb3c1" opacity="0.6"/>
    <circle cx="65.5" cy="42" r="4" fill="#ffb3c1" opacity="0.6"/>
  </g>
</svg>

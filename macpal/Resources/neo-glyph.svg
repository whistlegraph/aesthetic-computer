<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .float{ animation:float 6s ease-in-out infinite; transform-origin:50px 50px }
    .bob  { animation:bob 5s ease-in-out infinite; transform-origin:50px 55px }
    .body { animation:breathe 5s ease-in-out infinite; transform-origin:50px 74px }
    .eyes { animation:blink 6s ease-in-out infinite; transform-origin:50px 56px }
    .sheen{ animation:sheen 5s ease-in-out infinite }
    @keyframes float  { 0%,100%{transform:translate(0,0)} 33%{transform:translate(2px,-2px)} 66%{transform:translate(-2px,-1px)} }
    @keyframes bob    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
    @keyframes breathe{ 0%,100%{transform:scale(1,1)} 50%{transform:scale(1.05,0.95)} }
    @keyframes blink  { 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.08)} }
    @keyframes sheen  { 0%,100%{opacity:0.5} 50%{opacity:0.9} }
  </style>
  <g class="float"><g class="bob"><g class="body">
    <path d="M50 22 C71 22 82 41 82 59 C82 79 67 88 50 88 C33 88 18 79 18 59 C18 41 29 22 50 22 Z" fill="#a6e22e"/>
    <ellipse class="sheen" cx="40" cy="44" rx="15" ry="10" fill="#d7f78a"/>
    <circle cx="33" cy="64" r="6" fill="#ff8aa0" opacity="0.45"/>
    <circle cx="67" cy="64" r="6" fill="#ff8aa0" opacity="0.45"/>
    <g class="eyes" fill="#1c3a08">
      <circle cx="40" cy="56" r="4.6"/>
      <circle cx="60" cy="56" r="4.6"/>
      <circle cx="41.6" cy="54.4" r="1.5" fill="#eaffc0"/>
      <circle cx="61.6" cy="54.4" r="1.5" fill="#eaffc0"/>
    </g>
    <path d="M43 68 Q50 74 57 68" stroke="#1c3a08" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M50 22 C50 14 56 9 62 9 C61 17 56 22 50 22 Z" fill="#7fc41e"/>
  </g></g></g>
</svg>

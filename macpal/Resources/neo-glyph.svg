    @keyframes sheen { 0%,100%{opacity:0.45} 50%{opacity:0.85} }
  </style>
  <!-- neo base — a friendly floating chartreuse gem: light table, dark left facets, bright right facets -->
  <g class="float">
    <polygon points="33,16 67,16 88,46 50,90 12,46" fill="#a6e22e"/>
    <polygon points="33,16 67,16 61,30 39,30" fill="#d7f78a"/>
    <polygon points="33,16 39,30 12,46" fill="#7fc41e"/>
    <polygon points="67,16 88,46 61,30" fill="#c8f06a"/>
    <polygon points="12,46 36,46 50,90" fill="#7fc41e"/>
    <polygon points="64,46 88,46 50,90" fill="#c8f06a"/>
    <ellipse class="sheen" cx="41" cy="38" rx="10" ry="5.5" fill="#eaffc0" opacity="0.6"/>
    <circle cx="33" cy="55" r="5" fill="#ff8aa0" opacity="0.45"/>
    <circle cx="67" cy="55" r="5" fill="#ff8aa0" opacity="0.45"/>
    <g fill="#1c3a08">
      <circle cx="41" cy="49" r="4.6"/>
      <circle cx="59" cy="49" r="4.6"/>
    </g>
    <circle cx="42.6" cy="47.4" r="1.5" fill="#eaffc0"/>
    <circle cx="60.6" cy="47.4" r="1.5" fill="#eaffc0"/>
    <path d="M44 60 Q50 65.5 56 60" stroke="#1c3a08" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M72 21 L73.8 25.2 L78 27 L73.8 28.8 L72 33 L70.2 28.8 L66 27 L70.2 25.2 Z" fill="#f4ffd9"/>
    <circle cx="29" cy="24" r="1.8" fill="#f4ffd9"/>
  </g>
</svg>

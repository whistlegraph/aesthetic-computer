<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>notepat keymap</title>
<style>
  html,body{margin:0;background:#fff;}
  #kb{max-width:980px;margin:0 auto;}
  canvas{display:block;width:100%;height:auto;}
</style>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
</head>
<body>
<div id="kb"></div>
<script>
// notepat keymap (canonical) — key → [noteName, octave, isSharp]
// mirrors NOTE_TO_KEY in fedac/native/pieces/notepat.mjs + MenuBandMIDI.swift
const KEYMAP = {
  z:["A#",3,1], x:["B",3,0], c:["C",4,0], v:["C#",4,1],
  d:["D",4,0],  s:["D#",4,1], e:["E",4,0], f:["F",4,0],
  w:["F#",4,1], g:["G",4,0],  r:["G#",4,1], a:["A",4,0],
  q:["A#",4,1], b:["B",4,0],
  h:["C",5,0],  t:["C#",5,1], i:["D",5,0], y:["D#",5,1],
  j:["E",5,0],  k:["F",5,0],  u:["F#",5,1], l:["G",5,0],
  o:["G#",5,1], m:["A",5,0],  p:["A#",5,1], n:["B",5,0],
  ";":["C",6,0],"'":["C#",6,1],"]":["D",6,0]
};
const ROWS = [
  { off:0.5, keys:["q","w","e","r","t","y","u","i","o","p","]"] },
  { off:0.9, keys:["a","s","d","f","g","h","j","k","l",";","'"] },
  { off:1.4, keys:["z","x","c","v","b","n","m"] },
];
const SEMI = {C:0,"C#":1,D:2,"D#":3,E:4,F:5,"F#":6,G:7,"G#":8,A:9,"A#":10,B:11};
const pcOf   = (k)=> SEMI[KEYMAP[k][0]];
const midiOf = (k)=>{ const[n,o]=KEYMAP[k]; return (o+1)*12 + SEMI[n]; };
const freqOf = (m)=> 440*Math.pow(2,(m-69)/12);
const keyForMidi = {}; for(const k in KEYMAP) keyForMidi[midiOf(k)] = k;

// notepat ROYGBIV palette — ported from NoteColors.swift /
// lib/note-colors.mjs. Naturals carry the chromatic identity; sharps
// are black (accidentals read as the gaps). Octave +1 = dayglo, -1 = muted.
const BASE  ={c:[255,50,50], d:[255,160,0], e:[255,230,0], f:[50,200,50], g:[50,120,255], a:[130,50,200], b:[180,80,255]};
const DAYGLO={c:[255,40,80], d:[255,180,0], e:[255,255,50], f:[50,255,100],g:[50,200,255], a:[180,50,255], b:[255,80,255]};
const MUTED ={c:[139,26,26], d:[180,100,0], e:[180,150,0], f:[20,90,20],  g:[20,60,120],  a:[50,0,90],    b:[90,30,150]};
const SHARP =[18,18,18];
function noteColor(key){ const [n,o,sharp]=KEYMAP[key]; if(sharp) return SHARP;
  const L=n.toLowerCase(); const d=o-4; const t=d>=1?DAYGLO:(d<=-1?MUTED:BASE); return t[L]; }
function textOn(c){ const lum=(0.299*c[0]+0.587*c[1]+0.114*c[2])/255; return lum>0.55?[0,0,0]:[255,255,255]; }
const lighten=(c,a)=> c.map(v=> Math.round(v+(255-v)*a));

// audio
let actx=null; const voices={};
function ensureAudio(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==="suspended") actx.resume(); }
function noteOn(key){ if(!KEYMAP[key]||voices[key]) return; ensureAudio();
  const f=freqOf(midiOf(key)); const osc=actx.createOscillator(), g=actx.createGain();
  osc.type="triangle"; osc.frequency.value=f; const t=actx.currentTime;
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.20,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.10,t+0.18);
  osc.connect(g).connect(actx.destination); osc.start(); voices[key]={osc,g}; }
function noteOff(key){ const v=voices[key]; if(!v) return; const t=actx.currentTime;
  v.g.gain.cancelScheduledValues(t); v.g.gain.setValueAtTime(v.g.gain.value,t);
  v.g.gain.exponentialRampToValueAtTime(0.0001,t+0.28); v.osc.stop(t+0.30); delete voices[key]; }
function pluck(key){ if(!KEYMAP[key]) return; noteOn(key); setTimeout(()=>noteOff(key),420); }

new p5((p)=>{
  let W=900, U=64, GAP=6, held=new Set();
  let caps=[], whites=[], blacks=[]; // piano keys
  let pianoH=0, pianoW=0;

  function buildPiano(){
    whites=[]; blacks=[];
    const midis = Object.keys(keyForMidi).map(Number).sort((a,b)=>a-b);
    const lo=midis[0], hi=midis[midis.length-1];
    let wi=0;
    for(let m=lo;m<=hi;m++){
      const pc=m%12; const sharp=[1,3,6,8,10].includes(pc);
      const key=keyForMidi[m];
      if(!sharp){ whites.push({m,pc,key,wi}); wi++; }
      else { blacks.push({m,pc,key,after:wi-1}); }
    }
    return whites.length;
  }

  function layout(){
    const maxUnits = Math.max(...ROWS.map(r=>r.off + r.keys.length));
    U = Math.floor((W-GAP)/(maxUnits+0.2));
    const cap=U-GAP;
    const nWhite=buildPiano();
    const whiteW=(W-GAP)/nWhite;
    pianoW=W; pianoH=Math.round(U*1.9);
    const blackW=whiteW*0.62, blackH=pianoH*0.6;
    whites.forEach(w=>{ w.x=GAP/2+w.wi*whiteW; w.w=whiteW-2; w.y=0; w.h=pianoH; });
    blacks.forEach(b=>{ b.x=GAP/2+(b.after+1)*whiteW-blackW/2; b.w=blackW; b.y=0; b.h=blackH; });

    caps=[];
    const top=pianoH+GAP*2.5;
    ROWS.forEach((row,ri)=>{ const y=top+ri*U;
      row.keys.forEach((k,ci)=>{ const x=GAP+(row.off+ci)*U;
        caps.push({key:k, x, y, w:cap, h:cap}); }); });
    return top + ROWS.length*U + GAP;
  }

  p.setup=()=>{ const host=document.getElementById("kb");
    W=Math.min(960, host.clientWidth||900); const H=layout();
    const c=p.createCanvas(W,H); c.parent(host);
    p.textFont("-apple-system, Helvetica Neue, Arial, sans-serif");
    p.textAlign(p.CENTER,p.CENTER); };
  p.windowResized=()=>{ const host=document.getElementById("kb");
    W=Math.min(960, host.clientWidth||900); const H=layout(); p.resizeCanvas(W,H); };

  p.draw=()=>{ p.background(255);
    const r=Math.max(5,U*0.12);

    // ── piano (top): notepat-colored keys, qwerty letter on each ──
    whites.forEach(w=>{ const on=held.has(w.key);
      let col=noteColor(w.key); if(on) col=lighten(col,0.5);
      p.stroke(150); p.strokeWeight(1); p.fill(col[0],col[1],col[2]);
      p.rect(w.x,w.y,w.w,w.h,0,0,4,4);
      const tc=textOn(col); p.noStroke(); p.fill(tc[0],tc[1],tc[2]);
      p.textSize(Math.max(9,U*0.20)); p.textStyle(p.BOLD);
      p.text(w.key.toUpperCase(), w.x+w.w/2, w.y+w.h-U*0.30); });
    blacks.forEach(b=>{ const on=held.has(b.key);
      let col=on?lighten(SHARP,0.55):SHARP;
      p.noStroke(); p.fill(col[0],col[1],col[2]); p.rect(b.x,b.y,b.w,b.h,0,0,3,3);
      p.fill(on?0:255, on?0:255, on?0:255); p.textSize(Math.max(8,U*0.16)); p.textStyle(p.BOLD);
      p.text(b.key==="'"?"’":b.key.toUpperCase(), b.x+b.w/2, b.y+b.h-U*0.16); });

    // ── qwerty caps (bottom): note names, notepat ROYGBIV ──
    caps.forEach(c=>{ const [n]=KEYMAP[c.key]; const on=held.has(c.key);
      let col=noteColor(c.key); if(on) col=lighten(col,0.45);
      p.noStroke(); p.fill(0,0,0,26); p.rect(c.x+1.5,c.y+2.5,c.w,c.h,r);
      p.stroke(0,0,0,40); p.strokeWeight(on?3:1); if(on){ p.stroke(40); }
      p.fill(col[0],col[1],col[2]); p.rect(c.x,c.y,c.w,c.h,r); p.noStroke();
      const tc=textOn(col); p.fill(tc[0],tc[1],tc[2]);
      p.textStyle(p.BOLD); p.textSize(Math.max(13,U*0.34));
      p.text(n, c.x+c.w/2, c.y+c.h/2); });
  };

  function hitCap(mx,my){ return caps.find(c=> mx>=c.x&&mx<=c.x+c.w&&my>=c.y&&my<=c.y+c.h); }
  function hitPiano(mx,my){
    const b=blacks.find(k=> mx>=k.x&&mx<=k.x+k.w&&my>=k.y&&my<=k.y+k.h); if(b) return b;
    return whites.find(k=> mx>=k.x&&mx<=k.x+k.w&&my>=k.y&&my<=k.y+k.h); }
  function tap(mx,my){ const hit=hitCap(mx,my)||hitPiano(mx,my);
    if(hit){ pluck(hit.key); held.add(hit.key); setTimeout(()=>held.delete(hit.key),150); return hit; } }
  p.mousePressed=()=>{ tap(p.mouseX,p.mouseY); };
  p.touchStarted=()=>{ if(tap(p.mouseX,p.mouseY)) return false; };
  p.keyPressed=()=>{ const k=p.key.toLowerCase();
    if(KEYMAP[k] && !held.has(k)){ held.add(k); noteOn(k); } };
  p.keyReleased=()=>{ const k=p.key.toLowerCase();
    if(KEYMAP[k]){ held.delete(k); noteOff(k); } };
});
</script>
</body>
</html>

name: Xbox native latency
on:
  workflow_dispatch:
  push:
    paths:
      - "xbox/native-latency/**"
      - ".github/workflows/xbox-native-latency.yml"
jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Create assets and signing certificate
        shell: pwsh
        run: |
          $root = Join-Path $env:GITHUB_WORKSPACE 'xbox/native-latency'
          $assets = Join-Path $root 'Assets'
          New-Item -ItemType Directory -Force $assets | Out-Null
          Add-Type -AssemblyName System.Drawing
          function Write-Asset($name, $width, $height) {
            $bitmap = [Drawing.Bitmap]::new($width, $height)
            $graphics = [Drawing.Graphics]::FromImage($bitmap)
            $graphics.Clear([Drawing.Color]::FromArgb(18, 15, 26))
            $graphics.FillEllipse([Drawing.Brushes]::Gold, $width * .2, $height * .2, $width * .6, $height * .6)
            $bitmap.Save((Join-Path $assets $name), [Drawing.Imaging.ImageFormat]::Png)
            $graphics.Dispose(); $bitmap.Dispose()
          }
          Write-Asset 'Square150x150Logo.png' 150 150
          Write-Asset 'Square44x44Logo.png' 44 44
          Write-Asset 'Wide310x150Logo.png' 310 150
          Write-Asset 'SplashScreen.png' 620 300
          Write-Asset 'StoreLogo.png' 50 50
          $cert = New-SelfSignedCertificate -Type Custom -Subject 'CN=AestheticComputerDev' -KeyUsage DigitalSignature -FriendlyName 'AC Xbox CI' -CertStoreLocation 'Cert:\CurrentUser\My'
          $password = ConvertTo-SecureString 'aesthetic-xbox-ci' -AsPlainText -Force
          Export-PfxCertificate -Cert $cert -FilePath (Join-Path $root 'XboxLatency_TemporaryKey.pfx') -Password $password | Out-Null
      - name: Build signed x64 UWP package
        shell: cmd
        working-directory: xbox/native-latency
        run: >-
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe"
          XboxLatency.sln /restore /m /p:Configuration=Release /p:Platform=x64
          /p:GenerateAppxPackageOnBuild=true /p:AppxBundle=Never
          /p:PackageCertificatePassword=aesthetic-xbox-ci
          /p:AppxPackageDir=%GITHUB_WORKSPACE%\artifacts\
      - uses: actions/upload-artifact@v4
        with:
          name: xbox-native-latency-x64
          path: artifacts/**
          if-no-files-found: error

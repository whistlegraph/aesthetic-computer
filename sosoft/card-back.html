<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'YWFTProcessing-Regular';
    src: url('../system/public/type/webfonts/ywft-processing-regular.woff2') format('woff2');
    font-weight: normal; font-style: normal;
  }
  @font-face {
    font-family: 'YWFTProcessing-Bold';
    src: url('../system/public/type/webfonts/ywft-processing-bold.woff2') format('woff2');
    font-weight: normal; font-style: normal;
  }
  @font-face {
    font-family: 'YWFTProcessing-Light';
    src: url('../system/public/type/webfonts/ywft-processing-light.woff2') format('woff2');
    font-weight: normal; font-style: normal;
  }
  @font-face {
    font-family: 'Berkeley Mono Variable';
    src: url('../system/public/type/webfonts/BerkeleyMonoVariable-Regular.woff2') format('woff2');
    font-weight: normal; font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1794px;
    height: 2994px;
    overflow: hidden;
    background: #ffffff;
  }

  .card {
    width: 1794px;
    height: 2994px;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 144px;
    position: relative;
  }

  .info {
    text-align: center;
  }

  .artist-name {
    font-family: 'YWFTProcessing-Bold', monospace;
    font-size: 64px;
    color: #000000;
    letter-spacing: 0.02em;
    margin-bottom: 0.6em;
  }

  .score-title {
    font-family: 'Berkeley Mono Variable', monospace;
    font-size: 52px;
    color: #000000;
    font-style: italic;
    margin-bottom: 0.4em;
  }

  .score-date {
    font-family: 'Berkeley Mono Variable', monospace;
    font-size: 40px;
    color: #000000;
    margin-bottom: 2em;
  }

  .url {
    font-family: 'Berkeley Mono Variable', monospace;
    font-size: 36px;
    color: #000000;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="info">
    <div class="artist-name">Jeffrey Alan Scudder</div>
    <div class="score-title">prompt</div>
    <div class="score-date">2026</div>
    <div class="url">aesthetic.computer</div>
  </div>
</div>
</body>
</html>

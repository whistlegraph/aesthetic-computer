<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keeps Wallet - Confirm</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans Mono', 'SF Mono', 'Monaco', 'Menlo', 'Consolas', monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px;
    }

    @media (prefers-color-scheme: light) {
      body {
        background: #f7f7f7;
        color: #111;
      }
      .card {
        background: white;
        border-color: #ddd;
      }
      .detail-label {
        color: #666;
      }
      .detail-value {
        color: #333;
        background: #f0f0f0;
      }
      .btn-reject {
        background: #e8e8e8;
        color: #333;
      }
    }

    .header {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      color: rgb(205, 92, 155);
    }

    .card {
      background: #2d2d30;
      border: 1px solid #3e3e42;
      border-radius: 8px;
      padding: 20px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 16px;
    }

    .dapp-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .request-type {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgb(205, 92, 155);
      margin-bottom: 16px;
    }

    .detail-row {
      margin-bottom: 12px;
    }

    .detail-label {
      font-size: 11px;
      color: #858585;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 12px;
      color: #d4d4d4;
      background: #252526;
      padding: 8px 10px;
      border-radius: 4px;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
    }

    .operations-list {
      font-size: 12px;
    }

    .op-item {
      background: #252526;
      padding: 8px 10px;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .op-kind {
      font-weight: 600;
      color: rgb(205, 92, 155);
    }

    .op-detail {
      color: #858585;
      font-size: 11px;
      margin-top: 2px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 360px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn:active {
      opacity: 0.7;
    }

    .btn-approve {
      background: rgb(205, 92, 155);
      color: white;
    }

    .btn-reject {
      background: #3e3e42;
      color: #d4d4d4;
    }

    .loading {
      text-align: center;
      color: #858585;
      font-size: 13px;
      margin-top: 40px;
    }

    .error {
      text-align: center;
      color: #e74c3c;
      font-size: 13px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="header">Keeps Wallet</div>
  <div id="content">
    <div class="loading">Loading request...</div>
  </div>
  <script src="confirm.js"></script>
</body>
</html>
